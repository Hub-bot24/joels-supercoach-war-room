name: Update player data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *" # daily 6am AEST-ish depending DST

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update players.json
        run: python scripts/update_players.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add players.json
          git commit -m "Update player data" || echo "No changes"
          git push