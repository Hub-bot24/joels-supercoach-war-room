/* PHONE HD SCALED FIELD FIX - keeps the SuperCoach-style field, scales it to screen width */
.field-shell{position:relative;border-radius:14px;overflow:hidden;min-height:920px}
.field-shell>.field-wrap{width:100%;height:100%}
@media(max-width:1180px){
  .field-shell{min-height:840px}
}

  .team-layout{display:none;width:100%;overflow:hidden}

  .side-actions{grid-template-columns:1fr 1fr;gap:6px}

  .lbl-hok{top:34px}.lbl-frf{top:150px}.lbl-2rf{top:258px}.lbl-halves{top:366px}.lbl-ctw{top:510px}.lbl-flb{top:736px}
  .player-card{width:210px;min-width:0;height:112px;min-height:112px;grid-template-columns:76px minmax(0,1fr) 34px;gap:6px;padding:8px;border-radius:10px}

  .logo{width:24px;height:24px;font-size:9px}

/* Mobile Option B: Level 3 horizontal scroll + Bye Planner card-style (mobile only) */
@media(max-width:720px){
  #level3 .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px}
  #level3 .tbl-scroll table{min-width:600px;margin:0}
  #level3 .tbl-scroll th,#level3 .tbl-scroll td{white-space:nowrap}
  #bye table,#bye thead,#bye tbody,#bye tr,#bye th,#bye td{display:block}
  #bye thead{position:absolute;left:-9999px;top:-9999px}
  #bye tr{border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:8px 12px;background:linear-gradient(180deg,rgba(15,26,43,.96),rgba(7,14,26,.96))}
  #bye td{border:none;padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:10px}
  #bye td::before{content:attr(data-label);color:var(--muted);font-size:11px;font-weight:700}
  #bye td[data-label="Round"]{display:block;font-size:15px;font-weight:900;border-bottom:1px solid var(--line);padding:0 0 6px;margin-bottom:4px}
  #bye td[data-label="Round"]::before{content:"Round ";color:var(--text);font-size:15px;font-weight:900}
  #bye td[data-label="Missing"]{display:block;padding-top:6px}
  #bye td[data-label="Missing"]::before{display:block;margin-bottom:4px}

/* My Team quick action buttons: Swap + Trade on field/reserve cards */
#team .formation-actions{display:flex;gap:4px;align-items:center;justify-content:center;position:absolute;left:6px;right:6px;bottom:6px;z-index:5}
#team .formation-swap,#team .formation-trade{position:static;display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:8px;font-size:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:900;box-shadow:none;line-height:1}
#team .formation-swap{border-color:#22c55e;background:#0b3522}
#team .formation-reserve-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
#team .formation-reserve-swap,#team .formation-reserve-trade{display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:8px;font-size:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:900;box-shadow:none;line-height:1}
#team .formation-reserve-swap{border-color:#22c55e;background:#0b3522}
@media(max-width:720px){
  #team .formation-actions{position:static;order:4;margin-top:5px;width:100%;gap:4px;flex-wrap:nowrap}
  #team .formation-swap,#team .formation-trade{font-size:10px;padding:5px 7px;border-radius:8px;min-width:0;flex:1}
  #team .formation-field{padding-top:18px}
}


/* =========================================================
   WAR ROOM LANDSCAPE MY TEAM LAYOUT PATCH
   Scope: #team only. Layout + cards only.
   Does NOT touch Level 3 projection/scoring/status calculations.
   ========================================================= */
#team .wr-team-room{
  width:100%;
  max-width:1600px;
  margin:0 auto;
  min-width:1180px;
  padding:0 0 14px;
}
#team .wr-topbar{
  display:grid;
  grid-template-columns:190px 180px repeat(4,minmax(120px,1fr)) 110px;
  gap:0;
  align-items:stretch;
  min-height:96px;
  background:linear-gradient(180deg,rgba(4,7,12,.98),rgba(7,13,22,.96));
  border:1px solid rgba(148,163,184,.16);
  border-radius:0 0 18px 18px;
  box-shadow:0 18px 55px rgba(0,0,0,.35);
  overflow:hidden;
}
#team .wr-brand{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-right:1px solid rgba(148,163,184,.16);
}
#team .wr-logo-mark{
  width:58px;
  height:58px;
  display:grid;
  place-items:center;
  border:1px solid rgba(143,255,0,.75);
  color:#9cff00;
  font-weight:950;
  letter-spacing:-.08em;
  background:linear-gradient(135deg,rgba(156,255,0,.18),rgba(255,255,255,.03));
  clip-path:polygon(50% 0,100% 26%,100% 74%,50% 100%,0 74%,0 26%);
}
#team .wr-brand b{
  display:block;
  font-size:28px;
  line-height:.86;
  letter-spacing:.02em;
  color:#fff;
}
#team .wr-brand b::first-line{color:#fff}
#team .wr-title{
  padding:18px 22px;
  border-right:1px solid rgba(148,163,184,.16);
}
#team .wr-title h2{
  margin:0;
  font-size:30px;
  letter-spacing:.02em;
}
#team .wr-title span{
  display:block;
  color:#cbd5e1;
  margin-top:8px;
  font-weight:900;
  letter-spacing:.08em;
}
#team .wr-metric{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:7px;
  border-right:1px solid rgba(148,163,184,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.12));
}
#team .wr-metric span{
  color:#e5e7eb;
  font-size:12px;
  font-weight:950;
  letter-spacing:.06em;
  text-transform:uppercase;
}
#team .wr-metric b{
  color:#86d80f;
  font-size:34px;
  line-height:1;
  text-shadow:0 0 16px rgba(134,216,15,.22);
}
#team .wr-metric:nth-of-type(5) b{color:#2f8cff}
#team .wr-top-actions{
  display:grid;
  place-items:center;
  padding:14px;
}
#team .wr-top-actions button{
  border-radius:12px;
  padding:10px 14px;
}
#team .wr-action-panel{
  max-width:760px;
  margin:8px auto;
}
#team .formation-layout{
  display:grid;
  grid-template-columns:minmax(790px,1fr) 360px;
  gap:18px;
  align-items:stretch;
  margin-top:14px;
}
#team .formation-layout main{min-width:0}
#team .formation-field{
  min-height:790px;
  height:calc(100vh - 195px);
  max-height:900px;
  padding:20px 26px 22px;
  border-radius:0;
  border:1px solid rgba(132,204,22,.20);
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,255,255,.13),transparent 20%),
    radial-gradient(circle at 50% 45%,rgba(98,255,0,.18),transparent 38%),
    linear-gradient(180deg,rgba(2,6,13,.55),rgba(2,6,13,.12) 18%,rgba(5,75,24,.88) 45%,rgba(2,42,14,.98));
  box-shadow:inset 0 0 90px rgba(0,0,0,.42),0 24px 70px rgba(0,0,0,.40);
}
#team .formation-field:before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:0;
  background:
    linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px) 0 0/90px 100%,
    linear-gradient(180deg,rgba(255,255,255,.055) 1px,transparent 1px) 0 0/100% 78px,
    radial-gradient(ellipse at 50% -5%,rgba(165,243,252,.40),transparent 16%),
    radial-gradient(ellipse at 20% 10%,rgba(255,255,255,.16),transparent 22%),
    radial-gradient(ellipse at 82% 8%,rgba(255,255,255,.12),transparent 22%);
  pointer-events:none;
}
#team .formation-field:after{
  content:"";
  position:absolute;
  inset:42px 70px;
  border:1px solid rgba(255,255,255,.13);
  border-radius:50%;
  pointer-events:none;
}
#team .formation-grid{
  position:relative;
  z-index:2;
  height:100%;
  display:grid;
  grid-template-columns:repeat(5,minmax(132px,1fr));
  grid-template-rows:repeat(7,minmax(86px,1fr));
  gap:12px 20px;
  align-items:center;
  justify-items:center;
  overflow:visible;
}
#team .formation-slot{
  width:100%;
  max-width:260px;
  min-height:108px;
}
#team .formation-card{
  width:100%;
  min-height:106px;
  display:grid;
  grid-template-columns:76px minmax(0,1fr) 72px;
  grid-template-rows:auto auto auto;
  column-gap:10px;
  row-gap:2px;
  align-items:center;
  text-align:left;
  padding:13px 14px;
  border-radius:10px;
  background:
    radial-gradient(circle at 15% 50%,color-mix(in srgb,var(--accent,#22d3ee) 30%,transparent),transparent 38%),
    linear-gradient(180deg,rgba(18,20,24,.96),rgba(2,5,10,.98));
  border:1px solid color-mix(in srgb,var(--accent,#22d3ee) 76%,#ffffff 0%);
  box-shadow:0 14px 32px rgba(0,0,0,.62), inset 0 0 20px rgba(255,255,255,.035);
  cursor:pointer;
  position:relative;
  overflow:visible;
}
#team .formation-card.risk{--accent:#f59e0b}
#team .formation-card.out{--accent:#ef4444}
#team .formation-card.bye{--accent:#8b5cf6}
#team .wr-slot-tag{
  position:absolute;
  left:50%;
  top:-32px;
  transform:translateX(-50%);
  padding:5px 12px;
  border-radius:7px;
  background:linear-gradient(180deg,#151515,#050505);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;
  font-size:15px;
  font-weight:950;
  letter-spacing:.04em;
  box-shadow:0 8px 18px rgba(0,0,0,.45);
}
#team .wr-team-logo{
  grid-row:1 / 4;
  width:64px;
  height:64px;
  display:grid;
  place-items:center;
  border-radius:16px;
  color:#fff;
  background:
    radial-gradient(circle at 50% 25%,rgba(255,255,255,.18),transparent 30%),
    linear-gradient(135deg,color-mix(in srgb,var(--accent,#22d3ee) 38%,#020617),#020617);
  border:1px solid color-mix(in srgb,var(--accent,#22d3ee) 70%,#ffffff 0%);
  font-weight:950;
  font-size:18px;
  text-transform:uppercase;
}
#team .formation-name{
  grid-column:2 / 3;
  font-size:15px;
  line-height:1.05;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.02em;
  text-align:left;
  align-self:end;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#team .formation-score{
  grid-column:3 / 4;
  grid-row:1 / 3;
  position:static;
  justify-self:end;
  color:#f8fafc;
  font-size:38px;
  line-height:.9;
  font-weight:950;
  text-shadow:0 0 18px rgba(255,255,255,.18);
}
#team .formation-score small{display:none}
#team .formation-meta{
  grid-column:2 / 4;
  display:flex;
  gap:10px;
  align-items:center;
  color:#d7dee9;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
}
#team .wr-card-footer{
  grid-column:2 / 4;
  display:flex;
  align-items:center;
  gap:6px;
  color:#9ca3af;
  font-size:10px;
  font-weight:850;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#team .formation-pos,
#team .formation-face,
#team .formation-figure{display:none!important}
#team .formation-card .status-dot{
  position:absolute;
  right:10px;
  bottom:10px;
  width:10px;
  height:10px;
  margin:0;
}
#team .formation-actions{
  opacity:0;
  pointer-events:none;
  position:absolute;
  left:10px;
  right:auto;
  bottom:-14px;
  display:flex;
  gap:6px;
  transition:.15s ease;
}
#team .formation-card:hover .formation-actions,
#team .formation-card:focus-within .formation-actions{
  opacity:1;
  pointer-events:auto;
}
#team .formation-swap,
#team .formation-trade{
  font-size:10px;
  padding:4px 8px;
  border-radius:8px;
}
#team .wr-reserve-panel{
  min-height:790px;
  height:calc(100vh - 195px);
  max-height:900px;
  padding:18px;
  border-radius:10px;
  background:linear-gradient(180deg,rgba(5,11,17,.97),rgba(2,8,11,.98));
  border:1px solid rgba(148,163,184,.24);
  box-shadow:0 22px 65px rgba(0,0,0,.45), inset 0 0 28px rgba(134,216,15,.035);
  overflow:hidden;
}
#team .wr-reserve-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  padding-bottom:12px;
  border-bottom:1px solid rgba(148,163,184,.18);
}
#team .wr-reserve-head span{
  color:#86d80f;
  font-size:24px;
  font-weight:950;
  letter-spacing:.03em;
}
#team .wr-reserve-head b{
  color:#a3a3a3;
  font-size:20px;
}
#team .wr-reserve-list{
  display:grid;
  grid-template-rows:repeat(12,1fr);
  height:calc(100% - 58px);
}
#team .formation-reserve-card{
  min-height:0;
  display:grid;
  grid-template-columns:25px 38px minmax(0,1fr) 44px 12px;
  gap:10px;
  align-items:center;
  padding:6px 0;
  border:0;
  border-radius:0;
  border-bottom:1px solid rgba(148,163,184,.14);
  background:transparent;
  box-shadow:none;
  color:#fff;
  position:relative;
}
#team .formation-reserve-card:hover{
  background:rgba(255,255,255,.035);
}
#team .wr-reserve-no{
  color:#fff;
  font-size:15px;
  font-weight:950;
  text-align:right;
}
#team .wr-reserve-logo{
  width:34px;
  height:34px;
  border-radius:10px;
  display:grid;
  place-items:center;
  font-size:11px;
  font-weight:950;
  color:#fff;
  border:1px solid color-mix(in srgb,var(--accent,#22d3ee) 55%,#334155);
  background:linear-gradient(135deg,color-mix(in srgb,var(--accent,#22d3ee) 35%,#020617),#020617);
}
#team .formation-reserve-main{min-width:0}
#team .formation-reserve-name{
  font-size:15px;
  line-height:1.05;
  text-transform:none;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#team .formation-reserve-meta{
  font-size:10px;
  color:#94a3b8;
  margin-top:3px;
}
#team .formation-reserve-score{
  color:#86d80f;
  font-size:19px;
  font-weight:950;
  text-align:right;
}
#team .formation-reserve-score small{display:none}
#team .formation-reserve-face,
#team .formation-reserve-card .formation-figure{display:none!important}
#team .formation-reserve-card .status-dot{
  position:static;
  width:9px;
  height:9px;
  margin:0;
}
#team .formation-reserve-actions{
  display:none;
  position:absolute;
  right:18px;
  bottom:4px;
  gap:5px;
  background:#020617;
  padding:3px;
  border-radius:8px;
}
#team .formation-reserve-card:hover .formation-reserve-actions{
  display:flex;
}
#team .formation-reserve-swap,
#team .formation-reserve-trade{
  font-size:9px;
  padding:3px 6px;
  border-radius:7px;
}
#team .wr-status-legend{
  display:flex;
  justify-content:center;
  gap:28px;
  align-items:center;
  padding:12px 0 2px;
  color:#e5e7eb;
  font-weight:850;
  text-transform:uppercase;
}
#team .wr-status-legend span{
  display:flex;
  align-items:center;
  gap:8px;
}
#team .wr-status-legend .status-dot{
  margin:0;
}
@media(max-width:1250px){
  .screen{overflow-x:auto}
  #team .wr-team-room{min-width:1180px}
}
@media(max-width:720px){
  #team .wr-team-room{
    min-width:1180px;
    transform-origin:top left;
  }
  #team .formation-layout{
    grid-template-columns:minmax(790px,1fr) 360px;
  }
  #team .formation-field,
  #team .wr-reserve-panel{
    height:790px;
    min-height:790px;
  }
}

dualPositions:{players:{}},projectionCache:new Map(),active:'team',rendered:new Set(),round:Number(localStorage.getItem('sc_round')||14),roundSource:'stored',trustWarnings:[],lineup:null,drag:null};
const $=id=>document.getElementById(id);const safeNum=v=>Number.isFinite(Number(v))?Number(v):0;const money=n=>'$'+safeNum(n).toLocaleString();
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function playerSlug(name){return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')}
function playerPhotoCandidates(p){
 if(!p)return [];

 if(Array.isArray(mapped)) mapped.forEach(add); else if(mapped&&typeof mapped==='object'){for(const k of ['photo','photoUrl','image','imageUrl','headshot','headshotUrl','url']) add(mapped[k]);} else add(mapped);
 const slug=playerSlug(p.name);
 if(slug){
  add(`assets/players/${slug}.webp`);
  add(`assets/players/${slug}.png`);
  add(`assets/players/${slug}.jpg`);

}

 try{

}

const SLOT_DEFS=[
 {id:'FRF1',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'},

];

const POS_ALIAS={'HKR':'HOK','HOK':'HOK','FR':'FRF','FRF':'FRF','SRF':'2RF','2RF':'2RF','HFB':'HFB','HB':'HFB','5/8':'5/8','FE':'5/8','CTW':'CTW','WFB':'FLB','FB':'FLB','FLB':'FLB'};
function normalisePosList(value){
 if(value==null)return [];

 raw.toUpperCase().replace(/5\s*\/\s*8/g,'FE').split(/[|,\/ ]+/).forEach(x=>{

function positions(p){

function primaryGroup(p){const ps=positions(p);if(ps.includes('HOK'))return 'HOOKER';if(ps.includes('FRF'))return 'FRONT ROW';if(ps.includes('2RF'))return '2ND ROW / FORWARDS';if(ps.includes('HFB')||ps.includes('5/8'))return 'HALVES';if(ps.includes('CTW'))return 'CENTRES / WINGS';if(ps.includes('FLB'))return 'FULLBACK';return 'UTILITY'}

function cleanPlayer(p){

function reserveCount(){return reserves().length}

function datalists(){return `<datalist id="teamDataList">${App.myTeam.map(n=>`<option value="${esc(n)}">`).join('')}</datalist><datalist id="allDataList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist>`}
function fieldLabels(){return `<div class="row-label lbl-hok">HOOKER<br>HOK</div><div class="row-label lbl-frf">FRONT ROW<br>FRF</div><div class="row-label lbl-2rf">2ND ROW<br>2RF</div><div class="row-label lbl-halves">HALVES<br>HFB / 5-8</div><div class="row-label lbl-ctw">CENTRES / WINGS<br>CTW</div><div class="row-label lbl-flb">FULLBACK<br>FLB</div>`}
function fieldRows(){const rows=['row-flb','row-flex','row-ctw1','row-halves','row-2rf','row-frf','row-frf-extra'];return rows.map(r=>`<div class="slot-row ${r}">${SLOT_DEFS.filter(s=>s.row===r).map(slotCard).join('')}</div>`).join('')}
function cardStateClass(p){const st=availabilityStatus(p);return st.key==='bye'?'bye':st.key==='out'?'out':st.key==='risk'?'risk':''}
function eligibleOptions(slot,currentName=''){const list=App.myTeam.map(getPlayer).filter(Boolean).filter(p=>eligible(p,slot)).sort((a,b)=>roundProj(b).expected-roundProj(a).expected);return `<option value="">Change ${slot.short}...</option>`+list.map(p=>`<option value="${esc(p.name)}" ${p.name===currentName?'selected':''}>${esc(p.name)} — ${esc(p.pos||'')} ${esc(p.team||'')} Exp ${roundProj(p).expected}</option>`).join('')}
function setSlotPlayer(slotId,newName){const slot=slotById[slotId],incoming=getPlayer(newName);if(!slot||!incoming)return;if(!App.myTeam.includes(incoming.name)){toast('Player is not in your squad');return}if(!eligible(incoming,slot)){toast(`${incoming.name} cannot play ${slot.short}`);return}const old=App.lineup?.[slotId];for(const k of Object.keys(App.lineup||{})){if(App.lineup[k]===incoming.name)delete App.lineup[k]}App.lineup[slotId]=incoming.name;ensureLineup();saveLocal();renderTeam();toast(`${incoming.name} selected at ${slot.short}`)}
function slotCard(slot){const p=getPlayer(App.lineup?.[slot.id]);if(!p)return `<div class="player-card empty-card" data-slot="${slot.id}" ondragover="allowDropOnSlot(event,'${slot.id}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slot.id}')"><div class="logo">${slot.short}</div><div><div class="slot-role">${slot.short}</div><div class="slot-player">Empty ${slot.label}</div><div class="meta">Drop eligible player</div><select class="slot-select" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()" onchange="setSlotPlayer('${slot.id}',this.value)">${eligibleOptions(slot)}</select></div><div class="proj"><b>--</b></div></div>`;const pr=roundProj(p);const st=availabilityStatus(p);return `<div class="player-card ${cardStateClass(p)}" draggable="true" data-slot="${slot.id}" ondragstart="dragField(event,'${slot.id}','${window.jsq(p.name)}')" ondragover="allowDropOnSlot(event,'${slot.id}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slot.id}')"><div class="logo">${esc(slot.short)}</div><div><div class="slot-role">${esc(slot.short)}</div><div class="slot-player">${esc(p.name)}</div><div class="meta">Eligible: ${esc(p.pos||'')}</div><div class="meta">${esc(st.reason)}</div><select class="slot-select" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()" onchange="setSlotPlayer('${slot.id}',this.value)">${eligibleOptions(slot,p.name)}</select></div><div class="proj">Proj.<br><b>${pr.expected}</b>${statusDot(p)}</div></div>`}
function reserveGroupsHtml(list=reserves()){const players=[...list].sort((a,b)=>roundProj(b).expected-roundProj(a).expected);return `<div class="reserve-group" data-group="ALL RESERVES" ondragover="allowDropOnReserveGroup(event)" ondragleave="clearDrop(event)" ondrop="dropOnReserveGroup(event)"><div class="reserve-head">ALL RESERVES</div>${players.map(reserveCard).join('')}</div>`}
function reserveCard(p){const pr=roundProj(p),st=availabilityStatus(p);return `<div class="reserve-card ${cardStateClass(p)}" draggable="true" data-reserve="${esc(p.name)}" ondragstart="dragReserve(event,'${window.jsq(p.name)}')" ondragover="allowDropOnReserveCard(event,'${window.jsq(p.name)}')" ondragleave="clearDrop(event)" ondrop="dropOnReserveCard(event,'${window.jsq(p.name)}')"><div class="drag">⠿</div><div class="logo">${esc((p.team||'SC').slice(0,3))}</div><div><div class="reserve-name">${esc(p.name)}</div><div class="small">${esc(p.team||'')} | ${esc(p.pos||'')}</div><div class="small">${esc(st.reason)}</div></div><div class="proj">Proj.<br><b>${pr.expected}</b>${statusDot(p)}</div></div>`}
function mobileTile(p,pos,isReserve=false,slotId=''){
 const pr=roundProj(p),st=availabilityStatus(p),cls=st.key==='good'?'':st.key==='bye'?'bye':st.key==='risk'?'warn':'bad',click=!isReserve&&p&&slotId?` onclick="selectTeamSlot('${slotId}')"`:'';
 let actions='';
 if(!isReserve&&p&&slotId)actions=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"><button type="button" onclick="event.stopPropagation();teamActionSwap('${slotId}')" style="padding:5px 10px;border-radius:10px;border:1px solid #22c55e;background:#0b3522;color:#fff;font-weight:700;cursor:pointer">Swap</button><button type="button" onclick="event.stopPropagation();teamActionTradeOut('${slotId}')" style="padding:5px 10px;border-radius:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:700;cursor:pointer">Trade</button></div>`;
 if(isReserve&&p)actions=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"><button type="button" onclick="event.stopPropagation();reserveActionSwap('${window.jsq(p.name)}')" style="padding:5px 10px;border-radius:10px;border:1px solid #22c55e;background:#0b3522;color:#fff;font-weight:700;cursor:pointer">Swap</button><button type="button" onclick="event.stopPropagation();reserveActionTradeOut('${window.jsq(p.name)}')" style="padding:5px 10px;border-radius:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:700;cursor:pointer">Trade</button></div>`;
 return `<div class="mobile-player-tile ${isReserve?'mobile-reserve-tile':''}"${click}>${faceHtml(p,'mobile-face')}<div><div class="mobile-player-name">${esc(p?.name||'Empty')}</div><span class="mobile-pos-badge">${esc(pos)}</span>${actions}</div><div class="mobile-proj"><b>${pr.expected}</b><span class="status-dot ${cls}"></span></div></div>`
}
function reserveBucket(p){
 const ps=positions(p);

 if(ps.includes('HOK')) return 'HOOKER';
 if(ps.includes('FRF')) return 'FRONT ROWERS';
 if(ps.includes('2RF')) return '2ND ROW FORWARDS';
 if(ps.includes('HFB')) return 'HALFBACK';
 if(ps.includes('FE') || ps.includes('5/8')) return '5/8';

 // CTW/FLB duals stay with CTW.
 if(ps.includes('CTW')) return 'WINGS / CENTRES';

 // Pure fullbacks go here.
 if(ps.includes('FLB')) return 'FULLBACK';

 return 'FULLBACK';
}
function mobileSection(title,slotIds,fieldBySlot={}){return `<section class="mobile-team-section"><div class="mobile-section-title">${title}</div><div class="mobile-tile-list">${slotIds.map(id=>fieldBySlot[id]?mobileTile(getPlayer(fieldBySlot[id]),slotById[id]?.short||slotByTitle(title),false,id):'').join('')}</div></section>`}
function slotByTitle(title){return title==='HOOKER'?'HOK':title==='FRONT ROWERS'?'FRF':title==='2ND ROW FORWARDS'?'2RF':title==='HALFBACK'?'HFB':title==='5/8'?'5/8':title==='WINGS / CENTRES'?'CTW':title==='FULLBACK'?'FLB':'FLEX'}

const TEAM_LOGO_ALIAS={NQL:'NQC',BRO:'BRI',CRO:'SHA',NZL:'PAR'};
function teamLogoCode(p){const k=teamKey(p);return TEAM_LOGO_ALIAS[k]||k}
function teamIconHtml(p,cls){const k=teamLogoCode(p);const src=TEAM_LOGOS[k];return src?`<div class="${cls} team-logo-img"><img src="${src}" alt="${esc(k)}"></div>`:`<div class="${cls}">${esc(k)}</div>`}
function teamKey(p){return String(p?.team||p?.club||'SC').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,3)}
function teamAccent(p){return TEAM_ACCENTS[teamKey(p)]||'#00d5d5'}
function posAccent(pos){const s=String(pos||'').toUpperCase();if(s.includes('FRF')||s.includes('HOK')||s.includes('2RF'))return '#f5c542';if(s.includes('CTW')||s.includes('FLB')||s.includes('FB'))return '#a855f7';if(s.includes('FLEX'))return '#32d168';return '#00d5d5'}
function formationFigureHtml(cls='formation-face'){return `<div class="${cls}"><div class="formation-figure" aria-hidden="true"><span class="formation-arm left"></span><span class="formation-arm right"></span></div></div>`}
function shortName(name){const parts=String(name||'').trim().split(/\s+/).filter(Boolean);if(parts.length>=2)return `${parts[0][0]}. ${parts.slice(1).join(' ')}`;return String(name||'')}

function formationStatusClass(p){const st=availabilityStatus(p);return st.key==='bye'?'bye':st.key==='out'?'out':st.key==='risk'?'risk':''}
function formationSlot(slotId,gridArea){
 const slot=slotById[slotId],p=getPlayer(App.lineup?.[slotId]);
 if(!slot)return '';
 if(!p){
  return `<div class="formation-slot" style="grid-area:${gridArea}">
   <div class="formation-card formation-empty" style="--accent:#335074;--pos:#335074" data-slot="${slotId}" ondragover="allowDropOnSlot(event,'${slotId}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slotId}')">
    <div class="wr-slot-tag">${esc(slot.short)}</div>
    <div class="wr-team-logo">+</div>
    <div class="formation-name">Empty</div>
    <div class="formation-score">--</div>
    <div class="formation-meta">Drop player</div>
   </div>
  </div>`;
 }
 const pr=roundProj(p),st=availabilityStatus(p),cls=st.key==='good'?'':st.key==='bye'?'bye':st.key==='risk'?'warn':'bad';
 const accent=teamAccent(p),pa=posAccent(slot.short),opp=esc(p.opponent||p.opp||p.vs||'');
 const price=safeNum(p.price)?money(p.price):'';
 const be=safeNum(p.breakeven??p.breakEven??p.BE??p.be);
 const avg=safeNum(p.avg??p.average??p.seasonAvg);
 const team=esc((p.team||p.club||'SC').slice(0,3).toUpperCase());
 return `<div class="formation-slot" style="grid-area:${gridArea}">
  <div class="formation-card ${formationStatusClass(p)}" style="--accent:${accent};--pos:${pa}" draggable="true" data-slot="${slotId}" onpointerdown="pressDragStart(event,'field','${slotId}','${window.jsq(p.name)}')" ondragstart="dragField(event,'${slotId}','${window.jsq(p.name)}')" ondragover="allowDropOnSlot(event,'${slotId}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slotId}')">
   <div class="wr-slot-tag">${esc(slot.short)}</div>
   ${teamIconHtml(p,'wr-team-logo')}
   <div class="formation-name" title="${esc(p.name)}">${esc(shortName(p.name))}</div>
   <div class="formation-score">${pr.expected}</div>
   <div class="formation-meta">
    <span>${price}</span>
    <span>${be?`BE ${be}`:''}</span>
    <span>${avg?`AVG ${Math.round(avg)}`:''}</span>
   </div>
   <div class="wr-card-footer"><span class="status-dot ${cls}" title="${esc(st.reason)}"></span><span>${esc(st.label)}</span><span>R${App.round}${opp?' · '+opp:''}</span></div>
  </div>
 </div>`;
}
function formationFieldHtml(fieldBySlot={}){
 const slots=[
  ['FRF1','1 / 1 / 2 / 2'],['HOK1','1 / 3 / 2 / 4'],['FRF2','1 / 5 / 2 / 6'],
  ['2RF1','2 / 2 / 3 / 3'],['2RF2','2 / 4 / 3 / 5'],['2RF3','3 / 3 / 4 / 4'],
  ['HFB1','4 / 2 / 5 / 3'],['FE1','4 / 4 / 5 / 5'],
  ['CTW1','5 / 1 / 6 / 2'],['CTW2','5 / 2 / 6 / 3'],['CTW3','5 / 4 / 6 / 5'],['CTW4','5 / 5 / 6 / 6'],
  ['FLB1','6 / 3 / 7 / 4'],['FLEX1','7 / 3 / 8 / 4']
 ];
 return `<div class="formation-field"><div class="formation-watermark left">WAR</div><div class="formation-watermark right">ROOM</div><div class="formation-grid">${slots.map(([id,area])=>formationSlot(id,area)).join('')}</div></div>`
}
function formationReserveCard(p,idx=0){
 const pr=roundProj(p),st=availabilityStatus(p),cls=st.key==='good'?'':st.key==='bye'?'bye':st.key==='risk'?'warn':'bad';
 const accent=teamAccent(p),pa=posAccent(p.pos||''),opp=esc(p.opponent||p.opp||p.vs||'');
 const team=esc((p.team||p.club||'SC').slice(0,3).toUpperCase());
 return `<div class="formation-reserve-card ${formationStatusClass(p)}" style="--accent:${accent};--pos:${pa}" draggable="true" data-reserve="${esc(p.name)}" onpointerdown="pressDragStart(event,'reserve','', '${window.jsq(p.name)}')" ondragstart="dragReserve(event,'${window.jsq(p.name)}')" ondragover="allowDropOnReserveCard(event,'${window.jsq(p.name)}')" ondragleave="clearDrop(event)" ondrop="dropOnReserveCard(event,'${window.jsq(p.name)}')">
  <div class="wr-reserve-no">${idx}</div>
  ${teamIconHtml(p,'wr-reserve-logo')}
  <div class="formation-reserve-main">
   <div class="formation-reserve-name" title="${esc(p.name)}">${esc(shortName(p.name))}</div>
   <div class="formation-reserve-meta"><b style="color:var(--pos)">${esc(p.pos||'')}</b> · R${App.round}${opp?' · '+opp:''}</div>
  </div>
  <div class="formation-reserve-score">${pr.expected}</div>
  <span class="status-dot ${cls}" title="${esc(st.reason)}"></span>
 </div>`;
}
  function emptyFormationReserveCard(group,idx=0){
 return `<div class="formation-reserve-card formation-empty" style="--accent:#64748b;--pos:#94a3b8" onclick="emptyReserveTrade('${window.jsq(group)}')">

  </div>

        group==='FRONT ROWERS'?['FRF']:
        group==='2ND ROW FORWARDS'?['2RF']:
        group==='HALFBACK'?['HFB']:

 if(!p || App.myTeam.includes(p.name) || !accepts.some(pos=>positions(p).includes(pos))){

 else {for(const k of Object.keys(App.lineup||{})){if(App.lineup[k]===p.name)delete App.lineup[k]}App.lineup[slotId]=p.name;}
saveLocal();renderTeam();toast(`${p.name} moved to ${slot.short}`);return true}

function pressDragStart(ev,type,slotId,name){
 if(ev.target.closest('button,input,select,a'))return;
 const el=ev.currentTarget;
 const startX=ev.clientX,startY=ev.clientY;
 let started=false;
 let moved=false;
 const d={type:type==='field'?'field':'reserve',slotId,name};
 const startTimer=setTimeout(()=>{started=true;App.drag=d;el.classList.add('press-dragging');try{el.setPointerCapture(ev.pointerId)}catch(e){}},260);
 function cleanup(){clearTimeout(startTimer);window.removeEventListener('pointermove',move,{capture:true});window.removeEventListener('pointerup',up,{capture:true});window.removeEventListener('pointercancel',cancel,{capture:true});el.classList.remove('press-dragging');el.style.transform='';el.style.zIndex=''}
 function move(e){const dx=e.clientX-startX,dy=e.clientY-startY;if(Math.hypot(dx,dy)>7)moved=true;if(started){e.preventDefault();el.style.transform=`translate(${dx}px,${dy}px) scale(.98)`;el.style.zIndex='10000';}}
 function cancel(){cleanup()}
 function up(e){const wasStarted=started;cleanup();if(wasStarted){const target=document.elementFromPoint(e.clientX,e.clientY);const slot=target?.closest?.('[data-slot]')?.getAttribute('data-slot');const reserve=target?.closest?.('[data-reserve]')?.getAttribute('data-reserve');if(type==='reserve'&&slot){commitDragToSlot(d,slot);return}if(type==='field'&&reserve){commitDragToReserveCard(d,reserve);return}if(type==='field'&&target?.closest?.('.formation-reserves,.wr-reserve-panel')){commitDragToReserveGroup(d);return}toast('Drop on an eligible player/slot');return;}if(!moved){if(type==='field')selectTeamSlot(slotId);else selectReservePlayer(name);}}
 window.addEventListener('pointermove',move,{capture:true,passive:false});window.addEventListener('pointerup',up,{capture:true});window.addEventListener('pointercancel',cancel,{capture:true});
}

function optimizeLineup(){App.lineup={};const names=[...App.myTeam].sort((a,b)=>roundProj(getPlayer(b)).expected-roundProj(getPlayer(a)).expected);const used=new Set();for(const slot of SLOT_DEFS){const n=names.find(x=>!used.has(x)&&eligible(getPlayer(x),slot));if(n){App.lineup[slot.id]=n;used.add(n)}}saveLocal();renderTeam();toast('Optimized by projection and eligibility')}

async function resetTeamFromFile(){localStorage.removeItem('sc_myTeam');localStorage.removeItem('sc_lineup');const teamJson=await fetchJson('my_team.json',null);let names=teamJson?.players||teamJson?.team||[];if(!Array.isArray(names))names=[];names=names.map(x=>typeof x==='string'?x.trim():(x?.name||x?.player||'')).filter(Boolean);App.myTeam=[...new Set(names.filter(n=>App.playerMap.has(n)))];App.lineup={};ensureLineup();validateLineup();ensureLineup();saveLocal();renderTeam();toast('Team reset from my_team.json')}
function renderBye(){const tp=teamPlayers();const rounds=Array.from({length:27},(_,i)=>i+1);$('bye').innerHTML=`<div class="panel"><h2>Bye Planner</h2><table><thead><tr><th>Round</th><th>Confirmed</th><th>Risk</th><th>Out</th><th>Bye</th><th>Status</th><th>Missing</th></tr></thead><tbody>${rounds.map(r=>{const buckets={good:[],risk:[],out:[],bye:[]};tp.forEach(p=>{const st=availabilityStatus(p,r);buckets[st.key]?buckets[st.key].push(p):buckets.out.push(p)});const conf=buckets.good.length;const chip=(p,cls)=>`<span class="miss ${cls}">${esc(p.name)}</span>`;const miss=[...buckets.out.map(p=>chip(p,'bad')),...buckets.bye.map(p=>chip(p,'bye')),...buckets.risk.map(p=>chip(p,'warn'))].join(' ');return `<tr><td data-label="Round">${r}</td><td data-label="Confirmed">${conf}</td><td data-label="Risk">${buckets.risk.length?'<span class="pill warn">'+buckets.risk.length+'</span>':'-'}</td><td data-label="Out">${buckets.out.length?'<span class="pill bad">'+buckets.out.length+'</span>':'-'}</td><td data-label="Bye">${buckets.bye.length?'<span class="pill bye">'+buckets.bye.length+'</span>':'-'}</td><td data-label="Status">${conf>=17?'<span class="pill good">OK</span>':conf>=15?'<span class="pill warn">Thin</span>':'<span class="pill bad">Danger</span>'}</td><td data-label="Missing">${miss||'None'}</td></tr>`}).join('')}</tbody></table><p class="small bye-legend"><span class="miss bad">Out / Injured / Suspended</span> <span class="miss warn">Risk / Return Risk</span> <span class="miss bye">Bye</span> <span class="miss mute">Other / Unknown</span></p></div>`}
function renderLevel3(){const top=App.players.slice().sort((a,b)=>proj(b).expected-proj(a).expected).slice(0,100);$('level3').innerHTML=`<div class="panel"><h2>Level 3 Projections</h2><p class="small">Top 100 only for speed. Use Player Explorer for any player.</p><div class="tbl-scroll"><table><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Floor</th><th>Expected</th><th>Ceiling</th><th>Status R${App.round}</th></tr></thead><tbody>${top.map(p=>{const pr=roundProj(p);return `<tr><td>${esc(p.name)}</td><td>${esc(p.pos||'')}</td><td>${esc(p.team||'')}</td><td>${pr.floor}</td><td><b>${pr.expected}</b></td><td>${pr.ceiling}</td><td>${statusPill(p)}</td></tr>`}).join('')}</tbody></table></div></div>`}
let explorerTimer=null;function renderExplorer(){$('explorer').innerHTML=`<div class="panel"><h2>Player Explorer</h2><input id="explorerInput" placeholder="Search any player..." oninput="clearTimeout(explorerTimer);explorerTimer=setTimeout(updateExplorer,150)"><div id="explorerResults"></div></div>`}
function updateExplorer(){const q=norm($('explorerInput').value),box=$('explorerResults');if(!q){box.innerHTML='';return}const res=App.players.filter(p=>norm(p.name).includes(q)||norm(p.pos).includes(q)||norm(p.team).includes(q)).slice(0,20);box.innerHTML=res.map(p=>{const pr=roundProj(p),raw=proj(p),st=availabilityStatus(p),weather=weatherLine(p);return `<div class="result"><b>${esc(p.name)}</b> ${statusPill(p)} <span class="small">${esc(p.pos||'')} - ${esc(p.team||'')}</span><br>Price: ${money(p.price)} | Avg: ${safeNum(p.avg||p.average)} | BE: ${p.be??p.breakEven??'N/A'}<br>Floor ${pr.floor} / <b>Expected ${pr.expected}</b> / Ceiling ${pr.ceiling}<br>${weather?`<span class="small">${weather}</span><br>`:''}<span class="small">If available: ${raw.expected} | ${esc(st.reason)} | ${esc(raw.goal)}</span></div>`}).join('')||'<p class="small">No matches.</p>'}
function renderTrade(){$('trade').innerHTML=`<div class="grid"><div class="panel span4"><h2>Trade Lab</h2><label>Trade OUT</label><input id="tradeOut" list="teamList"><datalist id="teamList">${App.myTeam.map(n=>`<option value="${esc(n)}">`).join('')}</datalist><label>Trade IN</label><input id="tradeIn" list="allList"><datalist id="allList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist><button onclick="scoreTrade()">Score Trade</button><button onclick="applyTradeFromTradeLab()">Apply Trade</button></div><div class="panel span6"><h2>Trade Verdict</h2><div id="tradeVerdict" class="small">Select players to score the trade.</div></div></div>`}
function scoreTrade(){const out=getPlayer($('tradeOut').value),inn=getPlayer($('tradeIn').value),box=$('tradeVerdict');if(!out||!inn){box.innerHTML='Pick valid players.';return}const po=roundProj(out),pi=roundProj(inn);const pts=pi.expected-po.expected,cash=safeNum(out.price)-safeNum(inn.price),bye=(availabilityStatus(inn).available?1:0)-(availabilityStatus(out).available?1:0);let score=Math.max(0,Math.min(100,Math.round(50+pts*2+(cash/60000)+bye*12)));box.innerHTML=`<div class="metric ${score>=75?'good':score>=55?'warn':'bad'}">${score}/100</div><table><tbody><tr><td>Points this round</td><td>${pts>=0?'+':''}${pts}</td></tr><tr><td>Cash</td><td>${cash>=0?'+':''}${money(cash)}</td></tr><tr><td>Availability impact R${App.round}</td><td>${bye>=0?'+':''}${bye}</td></tr><tr><td>Verdict</td><td>${score>=75?'Strong trade':score>=55?'Decent, check byes':'Weak trade - probably emotional trash'}</td></tr></tbody></table>`}
function applyTradeFromTradeLab(){const out=$('tradeOut')?.value?.trim(),inn=$('tradeIn')?.value?.trim();if(!out||!inn){toast('Pick OUT and IN players');return}if(!App.myTeam.includes(out)||!App.playerMap.has(inn)){toast('Invalid trade');return}App.myTeam=App.myTeam.map(n=>n===out?inn:n);for(const k of Object.keys(App.lineup)){if(App.lineup[k]===out){if(eligible(getPlayer(inn),slotById[k]))App.lineup[k]=inn;else delete App.lineup[k]}}ensureLineup();saveLocal();renderTrade();toast(`Trade applied: ${out} → ${inn}`)}
boot();

// PHONE LANDSCAPE VIEWPORT/TAP NORMALISER
function warRoomViewportKick(){
  try{
    document.documentElement.style.height = window.innerHeight + 'px';
    document.body.style.height = window.innerHeight + 'px';
    const team = document.getElementById('team');
    if(team) team.style.minHeight = Math.max(1, window.innerHeight - (document.querySelector('nav')?.offsetHeight || 0)) + 'px';
    window.scrollTo(0,0);
    document.body.getBoundingClientRect();
  }catch(e){}
}
window.addEventListener('load', ()=>{warRoomViewportKick(); setTimeout(warRoomViewportKick,120); setTimeout(warRoomViewportKick,450);});
window.addEventListener('resize', ()=>{warRoomViewportKick(); setTimeout(warRoomViewportKick,200);});
window.addEventListener('orientationchange', ()=>{setTimeout(warRoomViewportKick,250); setTimeout(warRoomViewportKick,650);});
document.addEventListener('click', function(e){
  const closeBtn = e.target.closest && e.target.closest('.player-detail-head button, .player-detail-actions button:last-child');
  if(closeBtn && closeBtn.textContent.trim().toLowerCase().match(/close|cancel/)){
    e.preventDefault(); e.stopPropagation(); cancelTeamAction(); return false;
  }
}, true);

</script>
