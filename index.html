w:hidden;background:rgba(6,13,25,.75)}.reserve-head{background:linear-gradient(90deg,#176b3b,#23a455);padding:8px 12px;font-weight:950;letter-spacing:.3px}.reserve-card{display:grid;grid-template-columns:22px 36px 1fr 48px;gap:8px;align-items:center;padding:10px;border-top:1px solid var(--line);cursor:grab}.reserve-card:hover{background:rgba(88,166,255,.1)}.drag{font-size:18px;color:#cbd5e1}.reserve-name{font-weight:950}.tips{margin-top:14px;padding:14px;display:grid;grid-template-columns:120px repeat(3,1fr);gap:12px;align-items:center}.tip-card{background:rgba(13,28,49,.82);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--muted)}.tip-title{font-weight:950;color:white}.panel{padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.span12{grid-column:span 12}.span6{grid-column:span 6}.span4{grid-column:span 4}.result{padding:10px;border:1px solid var(--line);border-radius:12px;background:#081120;margin:8px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px}

.slot-row{position:absolute;left:20px;right:20px;display:flex;justify-content:center;align-items:center;gap:14px}.row-flb{top:34px}.row-flex{top:132px}.row-ctw1{top:250px;gap:10px}.row-halves{top:376px}.row-2rf{top:494px}.row-frf{top:612px}.row-frf-extra{top:730px}.row-hok,.row-ctw2{top:612px}.row-flb .player-card,.row-flex .player-card{width:230px}.row-ctw1 .player-card{width:165px}.row-halves .player-card,.row-2rf .player-card{width:230px}.row-frf .player-card,.row-frf-extra .player-card{width:220px}.slot-role{font-size:18px;font-weight:950;line-height:1;color:#fff;letter-spacing:.04em}.slot-player{font-size:13px;font-weight:900;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PHONE HD SCALED FIELD FIX - keeps the SuperCoach-style field, scales it to screen width */

.field-shell>.field-wrap{width:100%;height:100%}
@media(max-width:1180px){
  .field-shell{min-height:840px}
}
@media(max-width:720px){
  .screen{padding:8px;overflow-x:hidden}
  .team-layout{display:block;width:100%;overflow:hidden}
  .side{margin-bottom:8px;padding:10px}
  .side h2{font-size:18px}.metric{font-size:22px}
  .side-actions{grid-template-columns:1fr 1fr;gap:6px}

  .row-flb{top:25px}.row-flex{top:120px}.row-ctw1{top:230px}.row-halves{top:345px}.row-2rf{top:455px}.row-frf{top:570px}.row-frf-extra{top:680px}.row-hok,.row-ctw2{top:570px}

  .lbl-hok{top:34px}.lbl-frf{top:150px}.lbl-2rf{top:258px}.lbl-halves{top:366px}.lbl-ctw{top:510px}.lbl-flb{top:736px}
  .player-card{width:210px;min-width:0;min-height:74px;grid-template-columns:24px minmax(0,1fr) 34px;gap:6px;padding:8px;border-radius:10px}
  .logo{width:24px;height:24px;font-size:9px}
  .pname{font-size:12px;white-space:nowrap;line-height:1.1;overflow:hidden;text-overflow:ellipsis}
  .meta{font-size:10px;margin-top:2px}.proj{font-size:9px}.proj b{font-size:14px}
  .slot-select{font-size:10px;padding:5px;margin-top:5px;border-radius:8px}
  .reserves{margin-top:8px;padding:10px;max-height:none;overflow:visible;border-radius:12px}
  .reserves h2{font-size:18px}.reserve-group{margin:8px 0;border-radius:10px}.reserve-head{padding:7px 9px;font-size:12px}
  .reserve-card{grid-template-columns:18px 26px minmax(0,1fr) 34px;gap:6px;padding:8px}
  .reserve-name{font-size:12px;white-space:normal;line-height:1.1}.small{font-size:10px}
  .tips{grid-template-columns:1fr;margin-top:8px;padding:10px;gap:6px}.tip-card{padding:8px;font-size:11px}

/* Mobile Option B: Level 3 horizontal scroll + Bye Planner card-style (mobile only) */
@media(max-width:720px){
  #level3 .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px}
  #level3 .tbl-scroll table{min-width:600px;margin:0}
  #level3 .tbl-scroll th,#level3 .tbl-scroll td{white-space:nowrap}

  #bye td{border:none;padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:10px}

<nav>

<script>
'use strict';
const App={players:[],playerMap:new Map(),myTeam:[],weather:null,fixtures:null,goalKickers:null,teamRoles:null,availabilityOverrides:null,playerStatus:null,projectionCache:new Map(),active:'team',rendered:new Set(),round:Number(localStorage.getItem('sc_round')||14),lineup:null,drag:null};
const $=id=>document.getElementById(id);const safeNum=v=>Number.isFinite(Number(v))?Number(v):0;const money=n=>'$'+safeNum(n).toLocaleString();
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
window.jsq = function(value){const s=String(value==null?'':value);return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r/g,'\\r').replace(/\n/g,'\\n').replace(/\u2028/g,'\\u2028').replace(/\u2029/g,'\\u2029')}
function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9/\s'-]/g,' ').replace(/\s+/g,' ').trim()}
async function fetchJson(path,fallback){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path);return await r.json()}catch(e){return fallback}}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
const SLOT_DEFS=[
 {id:'FRF1',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'}, {id:'HOK1',label:'Hooker',short:'HOK',accept:['HOK','HKR'],row:'row-frf'}, {id:'FRF2',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'}, {id:'FRF3',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf-extra'},
 {id:'2RF1',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'}, {id:'2RF2',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'},
 {id:'HFB1',label:'Halfback',short:'HFB',accept:['HFB'],row:'row-halves'}, {id:'FE1',label:'Five-Eighth',short:'5/8',accept:['5/8'],row:'row-halves'},
 {id:'CTW1',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'}, {id:'CTW2',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'CTW3',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'}, {id:'CTW4',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'FLB1',label:'Fullback',short:'FLB',accept:['FLB','FB'],row:'row-flb'}, {id:'FLEX1',label:'Flex',short:'FLEX',accept:['ANY'],row:'row-flex'}
];
const slotById=Object.fromEntries(SLOT_DEFS.map(s=>[s.id,s]));
const POS_ALIAS={'HKR':'HOK','HOK':'HOK','FR':'FRF','FRF':'FRF','SRF':'2RF','2RF':'2RF','HFB':'HFB','HB':'HFB','5/8':'5/8','FE':'5/8','CTW':'CTW','WFB':'FLB','FB':'FLB','FLB':'FLB'};
function positions(p){return String(p?.pos||p?.position||'').toUpperCase().replace(/5\s*\/\s*8/g,'FE').split(/[|,\/ ]+/).map(x=>POS_ALIAS[x]||x).filter(Boolean)}
function eligible(p,slot){if(!p||!slot)return false;if(slot.accept.includes('ANY'))return true;const ps=positions(p);return slot.accept.some(a=>ps.includes(POS_ALIAS[a]||a))}
function primaryGroup(p){const ps=positions(p);if(ps.includes('HOK'))return 'HOOKER';if(ps.includes('FRF'))return 'FRONT ROW';if(ps.includes('2RF'))return '2ND ROW / FORWARDS';if(ps.includes('HFB')||ps.includes('5/8'))return 'HALVES';if(ps.includes('CTW'))return 'CENTRES / WINGS';if(ps.includes('FLB'))return 'FULLBACK';return 'UTILITY'}
function getPlayer(name){if(!name)return null;return App.playerMap.get(String(name).trim())||null}
function cleanPlayer(p){
 if(!p || typeof p !== 'object') return {name:'',pos:'',team:'',price:0,avg:0,proj:0,bye:[]};
 const rawName = p.name ?? p.player ?? p.fullName ?? p.playerName ?? '';
 const name = String(rawName).trim();
 const byeRaw = p.bye ?? p.byes ?? p.byeRounds ?? [];
 const bye = Array.isArray(byeRaw) ? byeRaw.map(Number).filter(Boolean) : (byeRaw ? String(byeRaw).split(/[,/ ]+/).map(Number).filter(Boolean) : []);
 return {...p,name,pos:p.pos||p.position||'',team:p.team||p.club||'',price:safeNum(p.price),avg:safeNum(p.avg??p.average??p.seasonAvg),proj:safeNum(p.proj??p.projected??p.expected),bye};
}
function teamPlayers(){return App.myTeam.map(getPlayer).filter(Boolean)}
function saveLocal(){localStorage.setItem('sc_round',String(App.round));localStorage.setItem('sc_myTeam',JSON.stringify(App.myTeam));localStorage.setItem('sc_lineup',JSON.stringify(App.lineup||{}))}
async function boot(){

function autoFillLineup(){App.lineup={};ensureLineup();renderTeam();toast('Auto-filled by eligibility')}
function optimizeLineup(){App.lineup={};const names=[...App.myTeam].sort((a,b)=>roundProj(getPlayer(b)).expected-roundProj(getPlayer(a)).expected);const used=new Set();for(const slot of SLOT_DEFS){const n=names.find(x=>!used.has(x)&&eligible(getPlayer(x),slot));if(n){App.lineup[slot.id]=n;used.add(n)}}saveLocal();renderTeam();toast('Optimized by projection and eligibility')}
function applyQuickTrade(){const out=$('quickOut')?.value?.trim(),inn=$('quickIn')?.value?.trim();if(!out||!inn){toast('Pick OUT and IN players');return}if(!App.myTeam.includes(out)){toast('OUT player is not in your team');return}if(!App.playerMap.has(inn)){toast('IN player is not in players.json');return}if(App.myTeam.includes(inn)){toast('IN player already in team');return}App.myTeam=App.myTeam.map(n=>n===out?inn:n);for(const k of Object.keys(App.lineup)){if(App.lineup[k]===out){const slot=slotById[k];if(eligible(getPlayer(inn),slot))App.lineup[k]=inn;else delete App.lineup[k]}}ensureLineup();saveLocal();renderTeam();toast(`Trade applied: ${out} → ${inn}`)}
function addAnyPlayer(){const n=$('quickAdd')?.value?.trim();if(!n||!App.playerMap.has(n)){toast('Pick a valid player');return}if(App.myTeam.includes(n)){toast('Player already in team');return}App.myTeam.push(n);ensureLineup();saveLocal();renderTeam();toast(`${n} added`) }
async function resetTeamFromFile(){localStorage.removeItem('sc_myTeam');localStorage.removeItem('sc_lineup');const teamJson=await fetchJson('my_team.json',null);let names=teamJson?.players||teamJson?.team||[];if(!Array.isArray(names))names=[];names=names.map(x=>typeof x==='string'?x.trim():(x?.name||x?.player||'')).filter(Boolean);App.myTeam=[...new Set(names.filter(n=>App.playerMap.has(n)))];App.lineup={};ensureLineup();saveLocal();renderTeam();toast('Team reset from my_team.json')}
function renderBye(){const tp=teamPlayers();const rounds=Array.from({length:27},(_,i)=>i+1);$('bye').innerHTML=`<div class="panel"><h2>Bye Planner</h2><table><thead><tr><th>Round</th><th>Confirmed</th><th>Risk</th><th>Out</th><th>Bye</th><th>Status</th><th>Missing</th></tr></thead><tbody>${rounds.map(r=>{const buckets={good:[],risk:[],out:[],bye:[]};tp.forEach(p=>{const st=availabilityStatus(p,r);buckets[st.key]?buckets[st.key].push(p):buckets.out.push(p)});const conf=buckets.good.length;const chip=(p,cls)=>`<span class="miss ${cls}">${esc(p.name)}</span>`;const miss=[...buckets.out.map(p=>chip(p,'bad')),...buckets.bye.map(p=>chip(p,'bye')),...buckets.risk.map(p=>chip(p,'warn'))].join(' ');return `<tr><td data-label="Round">${r}</td><td data-label="Confirmed">${conf}</td><td data-label="Risk">${buckets.risk.length?'<span class="pill warn">'+buckets.risk.length+'</span>':'-'}</td><td data-label="Out">${buckets.out.length?'<span class="pill bad">'+buckets.out.length+'</span>':'-'}</td><td data-label="Bye">${buckets.bye.length?'<span class="pill bye">'+buckets.bye.length+'</span>':'-'}</td><td data-label="Status">${conf>=17?'<span class="pill good">OK</span>':conf>=15?'<span class="pill warn">Thin</span>':'<span class="pill bad">Danger</span>'}</td><td data-label="Missing">${miss||'None'}</td></tr>`}).join('')}</tbody></table><p class="small bye-legend"><span class="miss bad">Out / Injured / Suspended</span> <span class="miss warn">Risk / Return Risk</span> <span class="miss bye">Bye</span> <span class="miss mute">Other / Unknown</span></p></div>`}
function renderLevel3(){const top=App.players.slice().sort((a,b)=>proj(b).expected-proj(a).expected).slice(0,100);$('level3').innerHTML=`<div class="panel"><h2>Level 3 Projections</h2><p class="small">Top 100 only for speed. Use Player Explorer for any player.</p><div class="tbl-scroll"><table><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Floor</th><th>Expected</th><th>Ceiling</th><th>Status R${App.round}</th></tr></thead><tbody>${top.map(p=>{const pr=roundProj(p);return `<tr><td>${esc(p.name)}</td><td>${esc(p.pos||'')}</td><td>${esc(p.team||'')}</td><td>${pr.floor}</td><td><b>${pr.expected}</b></td><td>${pr.ceiling}</td><td>${statusPill(p)}</td></tr>`}).join('')}</tbody></table></div></div>`}
let explorerTimer=null;function renderExplorer(){$('explorer').innerHTML=`<div class="panel"><h2>Player Explorer</h2><input id="explorerInput" placeholder="Search any player..." oninput="clearTimeout(explorerTimer);explorerTimer=setTimeout(updateExplorer,150)"><div id="explorerResults"></div></div>`}
function updateExplorer(){const q=norm($('explorerInput').value),box=$('explorerResults');if(!q){box.innerHTML='';return}const res=App.players.filter(p=>norm(p.name).includes(q)||norm(p.pos).includes(q)||norm(p.team).includes(q)).slice(0,20);box.innerHTML=res.map(p=>{const pr=roundProj(p),raw=proj(p),st=availabilityStatus(p),weather=weatherLine(p);return `<div class="result"><b>${esc(p.name)}</b> ${statusPill(p)} <span class="small">${esc(p.pos||'')} - ${esc(p.team||'')}</span><br>Price: ${money(p.price)} | Avg: ${safeNum(p.avg||p.average)} | BE: ${p.be??p.breakEven??'N/A'}<br>Floor ${pr.floor} / <b>Expected ${pr.expected}</b> / Ceiling ${pr.ceiling}<br>${weather?`<span class="small">${weather}</span><br>`:''}<span class="small">If available: ${raw.expected} | ${esc(st.reason)} | ${esc(raw.goal)}</span></div>`}).join('')||'<p class="small">No matches.</p>'}
function renderTrade(){$('trade').innerHTML=`<div class="grid"><div class="panel span4"><h2>Trade Lab</h2><label>Trade OUT</label><input id="tradeOut" list="teamList"><datalist id="teamList">${App.myTeam.map(n=>`<option value="${esc(n)}">`).join('')}</datalist><label>Trade IN</label><input id="tradeIn" list="allList"><datalist id="allList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist><button onclick="scoreTrade()">Score Trade</button><button onclick="applyTradeFromTradeLab()">Apply Trade</button></div><div class="panel span6"><h2>Trade Verdict</h2><div id="tradeVerdict" class="small">Select players to score the trade.</div></div></div>`}
function scoreTrade(){const out=getPlayer($('tradeOut').value),inn=getPlayer($('tradeIn').value),box=$('tradeVerdict');if(!out||!inn){box.innerHTML='Pick valid players.';return}const po=roundProj(out),pi=roundProj(inn);const pts=pi.expected-po.expected,cash=safeNum(out.price)-safeNum(inn.price),bye=(availabilityStatus(inn).available?1:0)-(availabilityStatus(out).available?1:0);let score=Math.max(0,Math.min(100,Math.round(50+pts*2+(cash/60000)+bye*12)));box.innerHTML=`<div class="metric ${score>=75?'good':score>=55?'warn':'bad'}">${score}/100</div><table><tbody><tr><td>Points this round</td><td>${pts>=0?'+':''}${pts}</td></tr><tr><td>Cash</td><td>${cash>=0?'+':''}${money(cash)}</td></tr><tr><td>Availability impact R${App.round}</td><td>${bye>=0?'+':''}${bye}</td></tr><tr><td>Verdict</td><td>${score>=75?'Strong trade':score>=55?'Decent, check byes':'Weak trade - probably emotional trash'}</td></tr></tbody></table>`}
function applyTradeFromTradeLab(){const out=$('tradeOut')?.value?.trim(),inn=$('tradeIn')?.value?.trim();if(!out||!inn){toast('Pick OUT and IN players');return}if(!App.myTeam.includes(out)||!App.playerMap.has(inn)){toast('Invalid trade');return}App.myTeam=App.myTeam.map(n=>n===out?inn:n);for(const k of Object.keys(App.lineup)){if(App.lineup[k]===out){if(eligible(getPlayer(inn),slotById[k]))App.lineup[k]=inn;else delete App.lineup[k]}}ensureLineup();saveLocal();renderTrade();toast(`Trade applied: ${out} → ${inn}`)}
boot();
</script>
