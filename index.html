<style>
:root{--bg:#050914;--panel:#0d1626;--panel2:#132139;--card:#071222;--line:#29405f;--text:#f8fafc;--muted:#bfd0e8;--blue:#58a6ff;--good:#32d168;--warn:#f5c542;--bad:#ff4d4d;--purple:#a855f7;--bye:#8b5cf6}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,#0b1a33,#050914 45%,#02040a);color:var(--text);font-family:Arial,Helvetica,sans-serif}button,input,select{font:inherit}button{background:linear-gradient(180deg,#1b2d4a,#111d31);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.22)}button.active{background:linear-gradient(180deg,#63b2ff,#348ef2);color:#031225}button:hover{filter:brightness(1.08)}input,select{background:#081120;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;width:100%}label{display:block;color:var(--muted);font-size:13px;margin:12px 0 6px}nav{position:sticky;top:0;z-index:20;display:flex;gap:10px;align-items:center;padding:12px 14px;background:rgba(3,7,15,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(14px);overflow:auto}.spacer{flex:1}.live{font-size:12px;font-weight:900}.badge{display:inline-flex;gap:6px;align-items:center;padding:4px 8px;border-radius:999px;background:#10213a;border:1px solid var(--line)}.on{background:#21c55d;color:#031225}.red{background:#ef4444}.tab{display:none}.tab.active-tab{display:block}.screen{min-height:calc(100vh - 66px);padding:14px}.team-layout{display:grid;grid-template-columns:245px minmax(720px,1fr) 360px;gap:14px;align-items:stretch}.side,.reserves,.tips,.panel{background:linear-gradient(180deg,rgba(15,26,43,.96),rgba(7,14,26,.96));border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.side{padding:16px}.side h2,.reserves h2{margin:0 0 14px;font-size:22px}.metric-label{color:var(--muted);font-size:13px;margin-top:15px}.metric{font-size:28px;font-weight:950;margin-top:4px}.metric.good{color:var(--good)}.side-actions{display:grid;gap:9px;margin-top:18px}.legend{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}.legend-row{display:flex;gap:9px;align-items:center;margin:10px 0;color:var(--muted);font-size:13px}.dot{width:13px;height:13px;border-radius:50%;display:inline-block;background:var(--good);box-shadow:0 0 12px currentColor}.dot.warn{background:var(--warn)}.dot.bad{background:var(--bad)}.dot.bye{background:var(--bye)}.hr{border:0;border-top:1px solid var(--line);margin:14px 0}.small{font-size:12px;color:var(--muted);line-height:1.35}.field-wrap{position:relative;border-radius:14px;overflow:hidden;border:1px solid #306840;box-shadow:inset 0 0 80px rgba(0,0,0,.35),0 20px 50px rgba(0,0,0,.32);min-height:920px;background:linear-gradient(180deg,rgba(21,112,52,.96),rgba(42,145,80,.92),rgba(30,120,60,.95));}.field-wrap:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.035) 0 72px,rgba(0,0,0,.045) 72px 144px),radial-gradient(circle at 30% 20%,rgba(255,255,255,.1),transparent 26%),radial-gradient(circle at 72% 80%,rgba(0,0,0,.15),transparent 30%);}.field-lines{position:absolute;inset:34px 72px;border:2px solid rgba(255,255,255,.38);}.field-lines:before{content:"";position:absolute;left:0;right:0;top:50%;border-top:2px solid rgba(255,255,255,.27)}.field-lines:after{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:2px dashed rgba(255,255,255,.18)}.zone-line{position:absolute;left:0;right:0;border-top:1px solid rgba(255,255,255,.23)}.z1{top:12.5%}.z2{top:25%}.z3{top:37.5%}.z4{top:62.5%}.z5{top:75%}.z6{top:87.5%}.field-inner{position:relative;z-index:2;height:920px;padding:36px 28px 28px 28px}.slot-row{position:absolute;left:20px;right:20px;display:flex;gap:18px;justify-content:center;align-items:center}.row-hok{top:34px}.row-frf{top:138px}.row-2rf{top:248px}.row-halves{top:358px}.row-ctw1{top:468px}.row-ctw2{top:578px}.row-flb{top:730px}.row-label{position:absolute;left:20px;width:96px;background:rgba(5,13,26,.94);border:1px solid rgba(255,255,255,.12);border-radius:10px;text-align:center;font-weight:950;padding:10px 5px;line-height:1.25;box-shadow:0 8px 22px rgba(0,0,0,.35)}.lbl-hok{top:43px}.lbl-frf{top:158px}.lbl-2rf{top:267px}.lbl-halves{top:376px}.lbl-ctw{top:520px}.lbl-flb{top:745px}.slot-select{margin-top:7px;padding:6px 8px;border-radius:9px;font-size:12px;background:#071222;color:white;border:1px solid #335074}.player-card{width:252px;min-height:84px;background:linear-gradient(180deg,#071222,#020814);border:1px solid #335074;border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:34px 1fr 46px;gap:9px;align-items:center;box-shadow:0 12px 24px rgba(0,0,0,.42);cursor:grab}.player-card:active,.reserve-card:active{cursor:grabbing}.player-card.drop-ok,.reserve-card.drop-ok,.reserve-group.drop-ok{outline:3px solid var(--good)}.player-card.drop-no,.reserve-card.drop-no,.reserve-group.drop-no{outline:3px solid var(--bad)}.empty-card{border-style:dashed;opacity:.86}.player-card.out,.reserve-card.out{border-color:rgba(255,77,77,.8);box-shadow:0 0 0 1px rgba(255,77,77,.25),0 12px 24px rgba(0,0,0,.42)}.player-card.bye,.reserve-card.bye{border-color:rgba(139,92,246,.95);box-shadow:0 0 0 1px rgba(139,92,246,.35),0 12px 24px rgba(0,0,0,.42)}.player-card.risk,.reserve-card.risk{border-color:rgba(245,197,66,.9);box-shadow:0 0 0 1px rgba(245,197,66,.28),0 12px 24px rgba(0,0,0,.42)}.logo{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;background:#10213a;border:1px solid #436180;font-size:11px;font-weight:950}.pname{font-size:15px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:#dbeafe;margin-top:3px}.proj{text-align:right;font-size:12px;color:#dbeafe}.proj b{font-size:18px;color:white}.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:4px;background:var(--good)}.status-dot.warn{background:var(--warn)}.status-dot.bad{background:var(--bad)}.status-dot.bye{background:var(--bye)}.reserves{padding:14px;max-height:920px;overflow:auto}.reserve-group{border:1px solid var(--line);border-radius:12px;margin:10px 0 14px;overflow:hidden;background:rgba(6,13,25,.75)}.reserve-head{background:linear-gradient(90deg,#176b3b,#23a455);padding:8px 12px;font-weight:950;letter-spacing:.3px}.reserve-card{display:grid;grid-template-columns:22px 36px 1fr 48px;gap:8px;align-items:center;padding:10px;border-top:1px solid var(--line);cursor:grab}.reserve-card:hover{background:rgba(88,166,255,.1)}.drag{font-size:18px;color:#cbd5e1}.reserve-name{font-weight:950}.tips{margin-top:14px;padding:14px;display:grid;grid-template-columns:120px repeat(3,1fr);gap:12px;align-items:center}.tip-card{background:rgba(13,28,49,.82);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--muted)}.tip-title{font-weight:950;color:white}.panel{padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.span12{grid-column:span 12}.span6{grid-column:span 6}.span4{grid-column:span 4}.result{padding:10px;border:1px solid var(--line);border-radius:12px;background:#081120;margin:8px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.bye{color:var(--bye)}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid var(--line);text-align:left}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#071222;border:1px solid var(--line);border-radius:999px;padding:10px 16px;z-index:99;box-shadow:0 20px 55px rgba(0,0,0,.45);display:none}.toast.show{display:block}.trade-row{display:grid;grid-template-columns:1fr;gap:8px}
@media(max-width:1180px){.team-layout{grid-template-columns:1fr}.field-wrap{min-height:840px}.field-inner{height:840px}.reserves{max-height:none}.tips{grid-template-columns:1fr}.player-card{width:220px}.row-label{display:none}.slot-row{left:8px;right:8px;gap:8px}.row-hok{top:25px}.row-frf{top:130px}.row-2rf{top:235px}.row-halves{top:340px}.row-ctw1{top:445px}.row-ctw2{top:550px}.row-flb{top:680px}}
@media(max-width:720px){nav{gap:6px}button{padding:9px 10px}.screen{padding:8px}.field-wrap{overflow:auto}.field-inner{width:780px;height:840px}.field-lines{left:44px;right:44px}.player-card{width:210px}.team-layout{gap:8px}.side,.reserves,.tips{border-radius:12px}}
</style>
</head>
<body>
<nav>
<button class="active" data-tab="team">My Team</button>
<button data-tab="bye">Bye Planner</button>
<button data-tab="level3">Level 3</button>
<button data-tab="explorer">Player Explorer</button>
<button data-tab="trade">Trade Lab</button>
<div class="spacer"></div><span class="live">SC PLUS</span><span class="badge red">LIVE</span><span class="badge on">ON</span>
</nav>
<div class="screen">
<section id="team" class="tab active-tab"></section>
<section id="bye" class="tab"></section>
<section id="level3" class="tab"></section>
<section id="explorer" class="tab"></section>
<section id="trade" class="tab"></section>
</div>
<div id="toast" class="toast"></div>
<script>
'use strict';
const App={players:[],playerMap:new Map(),myTeam:[],weather:null,fixtures:null,goalKickers:null,teamRoles:null,availabilityOverrides:null,projectionCache:new Map(),active:'team',rendered:new Set(),round:Number(localStorage.getItem('sc_round')||14),lineup:null,drag:null};
const $=id=>document.getElementById(id);const safeNum=v=>Number.isFinite(Number(v))?Number(v):0;const money=n=>'$'+safeNum(n).toLocaleString();
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9/\s'-]/g,' ').replace(/\s+/g,' ').trim()}
async function fetchJson(path,fallback){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path);return await r.json()}catch(e){return fallback}}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
const SLOT_DEFS=[
 {id:'HOK1',label:'Hooker',short:'HOK',accept:['HOK','HKR'],row:'row-hok'},
 {id:'FRF1',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'}, {id:'FRF2',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'}, {id:'FRF3',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'},
 {id:'2RF1',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'}, {id:'2RF2',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'},
 {id:'HFB1',label:'Halfback',short:'HFB',accept:['HFB'],row:'row-halves'}, {id:'FE1',label:'Five-Eighth',short:'5/8',accept:['5/8'],row:'row-halves'},
 {id:'CTW1',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'}, {id:'CTW2',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'CTW3',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw2'}, {id:'CTW4',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw2'},
 {id:'FLB1',label:'Fullback',short:'FLB',accept:['FLB','FB'],row:'row-flb'}
];
const slotById=Object.fromEntries(SLOT_DEFS.map(s=>[s.id,s]));
const POS_ALIAS={'HKR':'HOK','HOK':'HOK','FR':'FRF','FRF':'FRF','SRF':'2RF','2RF':'2RF','HFB':'HFB','HB':'HFB','5/8':'5/8','FE':'5/8','CTW':'CTW','WFB':'FLB','FB':'FLB','FLB':'FLB'};
function positions(p){return String(p?.pos||p?.position||'').toUpperCase().split(/[|,\/ ]+/).map(x=>POS_ALIAS[x]||x).filter(Boolean)}
function eligible(p,slot){if(!p||!slot)return false;const ps=positions(p);return slot.accept.some(a=>ps.includes(POS_ALIAS[a]||a))}
function primaryGroup(p){const ps=positions(p);if(ps.includes('HOK'))return 'HOOKER';if(ps.includes('FRF'))return 'FRONT ROW';if(ps.includes('2RF'))return '2ND ROW / FORWARDS';if(ps.includes('HFB')||ps.includes('5/8'))return 'HALVES';if(ps.includes('CTW'))return 'CENTRES / WINGS';if(ps.includes('FLB'))return 'FULLBACK';return 'UTILITY'}
function getPlayer(name){return App.playerMap.get(name)||null}
function cleanPlayer(p){return {...p,name:p.name||p.player||p.fullName||'',pos:p.pos||p.position||'',team:p.team||p.club||'',price:safeNum(p.price),avg:safeNum(p.avg??p.average??p.seasonAvg),proj:safeNum(p.proj??p.projected??p.expected),bye:Array.isArray(p.bye)?p.bye:(Array.isArray(p.byes)?p.byes:(p.bye?String(p.bye).split(/[,/ ]+/).map(Number).filter(Boolean):[]))}}
function teamPlayers(){return App.myTeam.map(getPlayer).filter(Boolean)}
function saveLocal(){localStorage.setItem('sc_round',String(App.round));localStorage.setItem('sc_myTeam',JSON.stringify(App.myTeam));localStorage.setItem('sc_lineup',JSON.stringify(App.lineup||{}))}
async function boot(){
 const rawPlayers=await fetchJson('players.json',[]);let arr=Array.isArray(rawPlayers)?rawPlayers:(Array.isArray(rawPlayers.players)?rawPlayers.players:[]);App.players=arr.map(cleanPlayer).filter(p=>p.name);App.playerMap=new Map(App.players.map(p=>[p.name,p]));
 App.weather=await fetchJson('weather.json',null);App.goalKickers=await fetchJson('goal_kickers.json',null);App.teamRoles=await fetchJson('team_roles.json',null);App.availabilityOverrides=await fetchJson('availability_overrides.json',{players:{}});
 const localTeam=JSON.parse(localStorage.getItem('sc_myTeam')||'null');const teamJson=await fetchJson('my_team.json',null);let names=localTeam||teamJson?.players||teamJson?.team||[];if(!Array.isArray(names))names=[];App.myTeam=[...new Set(names.filter(n=>App.playerMap.has(n)))];
 App.lineup=JSON.parse(localStorage.getItem('sc_lineup')||'{}')||{};ensureLineup();wireTabs();renderActive();
}
function wireTabs(){document.querySelectorAll('nav button[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active-tab'));App.active=b.dataset.tab;$(App.active).classList.add('active-tab');renderActive()})}
function ensureLineup(){if(!App.lineup)App.lineup={};const used=new Set(Object.values(App.lineup).filter(n=>App.myTeam.includes(n)));for(const id of Object.keys(App.lineup)){if(!App.myTeam.includes(App.lineup[id]))delete App.lineup[id]}
 const candidates=[...App.myTeam].filter(n=>!used.has(n)).sort((a,b)=>proj(getPlayer(b)).expected-proj(getPlayer(a)).expected);
 for(const slot of SLOT_DEFS){if(App.lineup[slot.id])continue;const n=candidates.find(x=>!used.has(x)&&eligible(getPlayer(x),slot));if(n){App.lineup[slot.id]=n;used.add(n)}}}
function renderActive(){if(App.active==='team')renderTeam();else if(App.active==='bye')renderBye();else if(App.active==='level3')renderLevel3();else if(App.active==='explorer')renderExplorer();else if(App.active==='trade')renderTrade()}
function overrideFor(p){return App.availabilityOverrides?.players?.[p.name]||App.availabilityOverrides?.[p.name]||null}
function availabilityStatus(p,round=App.round){const ov=overrideFor(p);const bye=(p.bye||[]).map(Number).includes(Number(round));if(bye)return {key:'bye',available:false,label:'Bye',reason:`Bye round ${round}`};if(ov){const s=String(ov.status||'').toLowerCase();if(['out','injured','suspended','unavailable'].includes(s))return {key:'out',available:false,label:s==='suspended'?'Suspended':'Out',reason:ov.reason||'Override: unavailable'};if(['doubtful','chance','risk'].includes(s)||safeNum(ov.playProbability)<60)return {key:'risk',available:true,label:'Risk',reason:ov.reason||'Override: risk'}}
 const s=String(p.injuryStatus||p.status||'fit').toLowerCase();if(['out','injured','suspended','unavailable'].includes(s))return {key:'out',available:false,label:s==='suspended'?'Suspended':'Out',reason:p.injuryNote||s};const prob=p.playProbability==null?100:safeNum(p.playProbability);if(prob<60||['doubtful','chance','risk'].includes(s))return {key:'risk',available:true,label:'Risk',reason:p.injuryNote||`${prob}% play chance`};return {key:'good',available:true,label:'Available',reason:'Available'}}
function statusDot(p){const st=availabilityStatus(p);return `<span class="status-dot ${st.key==='good'?'':st.key==='bye'?'bye':st.key==='risk'?'warn':'bad'}"></span>`}
function statusPill(p){const st=availabilityStatus(p);const cls=st.key==='good'?'good':st.key==='bye'?'bye':st.key==='risk'?'warn':'bad';return `<span class="pill ${cls}">${esc(st.label)}</span>`}
function proj(p){if(!p)return {floor:0,expected:0,ceiling:0,raw:0,goal:'No data'};if(App.projectionCache.has(p.name))return App.projectionCache.get(p.name);let base=safeNum(p.proj||p.avg||p.average||0);if(!base&&p.price)base=Math.round(p.price/9000);const recent=safeNum(p.last3Avg||p.last5Avg||0);if(recent)base=Math.round(base*.75+recent*.25);let goal='No GK boost';const gk=App.goalKickers?.players?.[p.name]||App.goalKickers?.[p.name];if(gk) {base+=3;goal='Goal kicker boost'}let role=safeNum(p.expectedMinutes||p.minutes||0);if(role&&role<45)base-=8;const out={floor:Math.max(0,Math.round(base*.68)),expected:Math.max(0,Math.round(base)),ceiling:Math.max(0,Math.round(base*1.45)),raw:Math.round(base),goal};App.projectionCache.set(p.name,out);return out}
function roundProj(p){const pr=proj(p),st=availabilityStatus(p);if(!st.available)return {...pr,expected:0,floor:0,ceiling:0};if(st.key==='risk')return {...pr,expected:Math.round(pr.expected*.72),floor:Math.round(pr.floor*.55),ceiling:Math.round(pr.ceiling*.9)};return pr}
function usedOnField(){return new Set(Object.values(App.lineup||{}).filter(Boolean))}
function reserves(){const used=usedOnField();return App.myTeam.map(getPlayer).filter(p=>p&&!used.has(p.name))}
function teamProjection(){return SLOT_DEFS.reduce((s,slot)=>s+roundProj(getPlayer(App.lineup?.[slot.id])).expected,0)}
function availableStarters(){return SLOT_DEFS.filter(slot=>availabilityStatus(getPlayer(App.lineup?.[slot.id])).available).length}
function renderTeam(){ensureLineup();saveLocal();const remaining=24600,avail=availableStarters();$('team').innerHTML=`<div class="team-layout"><aside class="side"><h2>My Team</h2><label>Round</label><select onchange="App.round=Number(this.value);saveLocal();renderTeam()">${Array.from({length:27},(_,i)=>`<option value="${i+1}" ${App.round===i+1?'selected':''}>Round ${i+1}</option>`).join('')}</select><div class="metric-label">Salary Remaining</div><div class="metric good">${money(remaining)}</div><div class="metric-label">Starting Projected</div><div class="metric">${teamProjection()}</div><div class="metric-label">Starting Available</div><div class="metric ${avail>=13?'good':'bad'}">${avail}/13</div><div class="side-actions"><button onclick="autoFillLineup()">Auto Fill</button><button onclick="optimizeLineup()">Optimize</button><button onclick="saveLocal();toast('Team saved')">Save Team</button></div><hr class="hr"><h3>Trade / Change Team</h3><div class="trade-row"><input id="quickOut" list="teamDataList" placeholder="Player OUT from your team"><input id="quickIn" list="allDataList" placeholder="Player IN from all players"><button onclick="applyQuickTrade()">Apply Trade</button><input id="quickAdd" list="allDataList" placeholder="Add any player to squad"><button onclick="addAnyPlayer()">Add Player</button></div>${datalists()}<div class="legend"><div class="legend-row"><span class="dot"></span>Available</div><div class="legend-row"><span class="dot warn"></span>Doubtful/Risk</div><div class="legend-row"><span class="dot bad"></span>Out / Injured</div><div class="legend-row"><span class="dot bye"></span>Bye this round</div></div><p class="small">Drag players between field and reserves. Dual positions are respected. Bye/out players change colour based on the selected round.</p></aside><main class="field-wrap"><div class="field-lines"><div class="zone-line z1"></div><div class="zone-line z2"></div><div class="zone-line z3"></div><div class="zone-line z4"></div><div class="zone-line z5"></div><div class="zone-line z6"></div></div><div class="field-inner">${fieldLabels()}${fieldRows()}</div></main><aside class="reserves"><h2>Reserves</h2>${reserveGroupsHtml()}</aside></div><div class="tips"><b>TIPS</b><div class="tip-card"><span class="tip-title">Drag swap</span><br>Reserve ↔ field and field ↔ reserve both work.</div><div class="tip-card"><span class="tip-title">Dual positions</span><br>Only legal positions can swap.</div><div class="tip-card"><span class="tip-title">Round colour</span><br>Bye players turn purple for the selected round.</div></div>`}
function datalists(){return `<datalist id="teamDataList">${App.myTeam.map(n=>`<option value="${esc(n)}">`).join('')}</datalist><datalist id="allDataList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist>`}
function fieldLabels(){return `<div class="row-label lbl-hok">HOOKER<br>HOK</div><div class="row-label lbl-frf">FRONT ROW<br>FRF</div><div class="row-label lbl-2rf">2ND ROW<br>2RF</div><div class="row-label lbl-halves">HALVES<br>HFB / 5-8</div><div class="row-label lbl-ctw">CENTRES / WINGS<br>CTW</div><div class="row-label lbl-flb">FULLBACK<br>FLB</div>`}
function fieldRows(){const rows=['row-hok','row-frf','row-2rf','row-halves','row-ctw1','row-ctw2','row-flb'];return rows.map(r=>`<div class="slot-row ${r}">${SLOT_DEFS.filter(s=>s.row===r).map(slotCard).join('')}</div>`).join('')}
function cardStateClass(p){const st=availabilityStatus(p);return st.key==='bye'?'bye':st.key==='out'?'out':st.key==='risk'?'risk':''}
function eligibleOptions(slot,currentName=''){const list=App.players.filter(p=>eligible(p,slot)).sort((a,b)=>roundProj(b).expected-roundProj(a).expected);return `<option value="">Change ${slot.short}...</option>`+list.map(p=>`<option value="${esc(p.name)}" ${p.name===currentName?'selected':''}>${esc(p.name)} — ${esc(p.pos||'')} ${esc(p.team||'')} Exp ${roundProj(p).expected}</option>`).join('')}
function setSlotPlayer(slotId,newName){const slot=slotById[slotId],incoming=getPlayer(newName);if(!slot||!incoming)return;if(!eligible(incoming,slot)){toast(`${incoming.name} cannot play ${slot.short}`);return}const old=App.lineup?.[slotId];for(const k of Object.keys(App.lineup||{})){if(App.lineup[k]===incoming.name)delete App.lineup[k]}if(!App.myTeam.includes(incoming.name)){if(old&&App.myTeam.includes(old))App.myTeam=App.myTeam.map(n=>n===old?incoming.name:n);else App.myTeam.push(incoming.name)}App.lineup[slotId]=incoming.name;ensureLineup();saveLocal();renderTeam();toast(`${incoming.name} selected at ${slot.short}`)}
function slotCard(slot){const p=getPlayer(App.lineup?.[slot.id]);if(!p)return `<div class="player-card empty-card" data-slot="${slot.id}" ondragover="allowDropOnSlot(event,'${slot.id}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slot.id}')"><div class="logo">${slot.short}</div><div><div class="pname">Empty ${slot.short}</div><div class="meta">Drop eligible player</div><select class="slot-select" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()" onchange="setSlotPlayer('${slot.id}',this.value)">${eligibleOptions(slot)}</select></div><div class="proj"><b>--</b></div></div>`;const pr=roundProj(p);const st=availabilityStatus(p);return `<div class="player-card ${cardStateClass(p)}" draggable="true" data-slot="${slot.id}" ondragstart="dragField(event,'${slot.id}','${esc(p.name)}')" ondragover="allowDropOnSlot(event,'${slot.id}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slot.id}')"><div class="logo">${esc((p.team||'SC').slice(0,3))}</div><div><div class="pname">${esc(p.name)}</div><div class="meta">${esc(p.team||'')} | ${esc(p.pos||'')}</div><div class="meta">${esc(st.reason)}</div><select class="slot-select" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()" onchange="setSlotPlayer('${slot.id}',this.value)">${eligibleOptions(slot,p.name)}</select></div><div class="proj">Proj.<br><b>${pr.expected}</b>${statusDot(p)}</div></div>`}
function reserveGroupsHtml(){const groupOrder=['HOOKER','FRONT ROW','2ND ROW / FORWARDS','HALVES','CENTRES / WINGS','FULLBACK','UTILITY'];const map={};for(const p of reserves()){const g=primaryGroup(p);(map[g]||(map[g]=[])).push(p)}return groupOrder.map(g=>`<div class="reserve-group" data-group="${g}" ondragover="allowDropOnReserveGroup(event)" ondragleave="clearDrop(event)" ondrop="dropOnReserveGroup(event)"><div class="reserve-head">${g}</div>${(map[g]||[]).sort((a,b)=>roundProj(b).expected-roundProj(a).expected).map(reserveCard).join('')||'<div class="small" style="padding:10px">Drop field player here</div>'}</div>`).join('')}
function reserveCard(p){const pr=roundProj(p),st=availabilityStatus(p);return `<div class="reserve-card ${cardStateClass(p)}" draggable="true" data-reserve="${esc(p.name)}" ondragstart="dragReserve(event,'${esc(p.name)}')" ondragover="allowDropOnReserveCard(event,'${esc(p.name)}')" ondragleave="clearDrop(event)" ondrop="dropOnReserveCard(event,'${esc(p.name)}')"><div class="drag">⠿</div><div class="logo">${esc((p.team||'SC').slice(0,3))}</div><div><div class="reserve-name">${esc(p.name)}</div><div class="small">${esc(p.team||'')} | ${esc(p.pos||'')}</div><div class="small">${esc(st.reason)}</div></div><div class="proj">Proj.<br><b>${pr.expected}</b>${statusDot(p)}</div></div>`}
function dragReserve(ev,name){App.drag={type:'reserve',name};ev.dataTransfer.setData('text/plain',JSON.stringify(App.drag))}
function dragField(ev,slotId,name){App.drag={type:'field',slotId,name};ev.dataTransfer.setData('text/plain',JSON.stringify(App.drag))}
function getDrag(ev){try{return JSON.parse(ev.dataTransfer.getData('text/plain'))||App.drag}catch(e){return App.drag}}
function clearDrop(ev){ev.currentTarget.classList.remove('drop-ok','drop-no')}
function allowDropOnSlot(ev,slotId){ev.preventDefault();const d=App.drag;const p=getPlayer(d?.name);const slot=slotById[slotId];const ok=!!p&&eligible(p,slot);ev.currentTarget.classList.toggle('drop-ok',ok);ev.currentTarget.classList.toggle('drop-no',!ok)}
function dropOnSlot(ev,slotId){ev.preventDefault();clearDrop(ev);const d=getDrag(ev),p=getPlayer(d?.name),slot=slotById[slotId];if(!p||!slot)return;if(!eligible(p,slot)){toast(`${p.name} cannot play ${slot.short}`);return}if(d.type==='field'){const from=d.slotId;if(from===slotId)return;const target=App.lineup[slotId];if(target&&!eligible(getPlayer(target),slotById[from])){toast(`${target} cannot swap into ${slotById[from].short}`);return}App.lineup[slotId]=p.name;if(target)App.lineup[from]=target;else delete App.lineup[from];}
 else {for(const k of Object.keys(App.lineup)){if(App.lineup[k]===p.name)delete App.lineup[k]}App.lineup[slotId]=p.name;}
saveLocal();renderTeam();toast(`${p.name} moved to ${slot.short}`)}
function allowDropOnReserveCard(ev,reserveName){ev.preventDefault();const d=App.drag;if(!d||d.type!=='field'){ev.currentTarget.classList.remove('drop-ok','drop-no');return}const fieldPlayer=getPlayer(d.name),reservePlayer=getPlayer(reserveName),fromSlot=slotById[d.slotId];const ok=!!fieldPlayer&&!!reservePlayer&&eligible(reservePlayer,fromSlot);ev.currentTarget.classList.toggle('drop-ok',ok);ev.currentTarget.classList.toggle('drop-no',!ok)}
function dropOnReserveCard(ev,reserveName){ev.preventDefault();clearDrop(ev);const d=getDrag(ev);if(!d||d.type!=='field')return;const reservePlayer=getPlayer(reserveName),fromSlot=slotById[d.slotId];if(!reservePlayer||!eligible(reservePlayer,fromSlot)){toast(`${reserveName} cannot play ${fromSlot.short}`);return}App.lineup[d.slotId]=reserveName;saveLocal();renderTeam();toast(`${reserveName} swapped into ${fromSlot.short}`)}
function allowDropOnReserveGroup(ev){ev.preventDefault();const d=App.drag;const ok=d?.type==='field';ev.currentTarget.classList.toggle('drop-ok',ok);ev.currentTarget.classList.toggle('drop-no',!ok)}
function dropOnReserveGroup(ev){ev.preventDefault();clearDrop(ev);const d=getDrag(ev);if(!d||d.type!=='field')return;delete App.lineup[d.slotId];ensureLineup();saveLocal();renderTeam();toast(`${d.name} moved to reserves`)}
function autoFillLineup(){App.lineup={};ensureLineup();renderTeam();toast('Auto-filled by eligibility')}
function optimizeLineup(){App.lineup={};const names=[...App.myTeam].sort((a,b)=>roundProj(getPlayer(b)).expected-roundProj(getPlayer(a)).expected);const used=new Set();for(const slot of SLOT_DEFS){const n=names.find(x=>!used.has(x)&&eligible(getPlayer(x),slot));if(n){App.lineup[slot.id]=n;used.add(n)}}saveLocal();renderTeam();toast('Optimized by projection and eligibility')}
function applyQuickTrade(){const out=$('quickOut')?.value?.trim(),inn=$('quickIn')?.value?.trim();if(!out||!inn){toast('Pick OUT and IN players');return}if(!App.myTeam.includes(out)){toast('OUT player is not in your team');return}if(!App.playerMap.has(inn)){toast('IN player is not in players.json');return}if(App.myTeam.includes(inn)){toast('IN player already in team');return}App.myTeam=App.myTeam.map(n=>n===out?inn:n);for(const k of Object.keys(App.lineup)){if(App.lineup[k]===out){const slot=slotById[k];if(eligible(getPlayer(inn),slot))App.lineup[k]=inn;else delete App.lineup[k]}}ensureLineup();saveLocal();renderTeam();toast(`Trade applied: ${out} → ${inn}`)}
function addAnyPlayer(){const n=$('quickAdd')?.value?.trim();if(!n||!App.playerMap.has(n)){toast('Pick a valid player');return}if(App.myTeam.includes(n)){toast('Player already in team');return}App.myTeam.push(n);ensureLineup();saveLocal();renderTeam();toast(`${n} added`) }
function renderBye(){const tp=teamPlayers();const rounds=Array.from({length:27},(_,i)=>i+1);$('bye').innerHTML=`<div class="panel"><h2>Bye Planner</h2><table><thead><tr><th>Round</th><th>Available</th><th>Status</th><th>Missing</th></tr></thead><tbody>${rounds.map(r=>{const av=tp.filter(p=>availabilityStatus(p,r).available),miss=tp.filter(p=>!availabilityStatus(p,r).available).slice(0,10).map(p=>p.name).join(', ');return `<tr><td>${r}</td><td>${av.length}</td><td>${av.length>=17?'<span class="pill good">OK</span>':av.length>=15?'<span class="pill warn">Thin</span>':'<span class="pill bad">Danger</span>'}</td><td>${esc(miss||'None')}</td></tr>`}).join('')}</tbody></table></div>`}
function renderLevel3(){const top=App.players.slice().sort((a,b)=>proj(b).expected-proj(a).expected).slice(0,100);$('level3').innerHTML=`<div class="panel"><h2>Level 3 Projections</h2><p class="small">Top 100 only for speed. Use Player Explorer for any player.</p><table><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Floor</th><th>Expected</th><th>Ceiling</th><th>Status R${App.round}</th></tr></thead><tbody>${top.map(p=>{const pr=roundProj(p);return `<tr><td>${esc(p.name)}</td><td>${esc(p.pos||'')}</td><td>${esc(p.team||'')}</td><td>${pr.floor}</td><td><b>${pr.expected}</b></td><td>${pr.ceiling}</td><td>${statusPill(p)}</td></tr>`}).join('')}</tbody></table></div>`}
let explorerTimer=null;function renderExplorer(){$('explorer').innerHTML=`<div class="panel"><h2>Player Explorer</h2><input id="explorerInput" placeholder="Search any player..." oninput="clearTimeout(explorerTimer);explorerTimer=setTimeout(updateExplorer,150)"><div id="explorerResults"></div></div>`}
function updateExplorer(){const q=norm($('explorerInput').value),box=$('explorerResults');if(!q){box.innerHTML='';return}const res=App.players.filter(p=>norm(p.name).includes(q)||norm(p.pos).includes(q)||norm(p.team).includes(q)).slice(0,20);box.innerHTML=res.map(p=>{const pr=roundProj(p),raw=proj(p),st=availabilityStatus(p);return `<div class="result"><b>${esc(p.name)}</b> ${statusPill(p)} <span class="small">${esc(p.pos||'')} - ${esc(p.team||'')}</span><br>Price: ${money(p.price)} | Avg: ${safeNum(p.avg||p.average)} | BE: ${p.be??p.breakEven??'N/A'}<br>Floor ${pr.floor} / <b>Expected ${pr.expected}</b> / Ceiling ${pr.ceiling}<br><span class="small">If available: ${raw.expected} | ${esc(st.reason)} | ${esc(raw.goal)}</span></div>`}).join('')||'<p class="small">No matches.</p>'}
function renderTrade(){$('trade').innerHTML=`<div class="grid"><div class="panel span4"><h2>Trade Lab</h2><label>Trade OUT</label><input id="tradeOut" list="teamList"><datalist id="teamList">${App.myTeam.map(n=>`<option value="${esc(n)}">`).join('')}</datalist><label>Trade IN</label><input id="tradeIn" list="allList"><datalist id="allList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist><button onclick="scoreTrade()">Score Trade</button><button onclick="applyTradeFromTradeLab()">Apply Trade</button></div><div class="panel span6"><h2>Trade Verdict</h2><div id="tradeVerdict" class="small">Select players to score the trade.</div></div></div>`}
function scoreTrade(){const out=getPlayer($('tradeOut').value),inn=getPlayer($('tradeIn').value),box=$('tradeVerdict');if(!out||!inn){box.innerHTML='Pick valid players.';return}const po=roundProj(out),pi=roundProj(inn);const pts=pi.expected-po.expected,cash=safeNum(out.price)-safeNum(inn.price),bye=(availabilityStatus(inn).available?1:0)-(availabilityStatus(out).available?1:0);let score=Math.max(0,Math.min(100,Math.round(50+pts*2+(cash/60000)+bye*12)));box.innerHTML=`<div class="metric ${score>=75?'good':score>=55?'warn':'bad'}">${score}/100</div><table><tbody><tr><td>Points this round</td><td>${pts>=0?'+':''}${pts}</td></tr><tr><td>Cash</td><td>${cash>=0?'+':''}${money(cash)}</td></tr><tr><td>Availability impact R${App.round}</td><td>${bye>=0?'+':''}${bye}</td></tr><tr><td>Verdict</td><td>${score>=75?'Strong trade':score>=55?'Decent, check byes':'Weak trade - probably emotional trash'}</td></tr></tbody></table>`}
function applyTradeFromTradeLab(){const out=$('tradeOut')?.value?.trim(),inn=$('tradeIn')?.value?.trim();if(!out||!inn){toast('Pick OUT and IN players');return}if(!App.myTeam.includes(out)||!App.playerMap.has(inn)){toast('Invalid trade');return}App.myTeam=App.myTeam.map(n=>n===out?inn:n);for(const k of Object.keys(App.lineup)){if(App.lineup[k]===out){if(eligible(getPlayer(inn),slotById[k]))App.lineup[k]=inn;else delete App.lineup[k]}}ensureLineup();saveLocal();renderTrade();toast(`Trade applied: ${out} → ${inn}`)}
boot();
</script>
</body>
