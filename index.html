/* PHONE HD SCALED FIELD FIX - keeps the SuperCoach-style field, scales it to screen width */
.field-shell{position:relative;border-radius:14px;overflow:hidden;min-height:920px}
.field-shell>.field-wrap{width:100%;height:100%}
@media(max-width:1180px){
  .field-shell{min-height:840px}
}

  .player-card{width:210px;min-width:0;height:112px;min-height:112px;grid-template-columns:76px minmax(0,1fr) 34px;gap:6px;padding:8px;border-radius:10px}

  .logo{width:24px;height:24px;font-size:9px}

/* Mobile Option B: Level 3 horizontal scroll + Bye Planner card-style (mobile only) */
@media(max-width:720px){
  #level3 .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px}
  #level3 .tbl-scroll table{min-width:600px;margin:0}
  #level3 .tbl-scroll th,#level3 .tbl-scroll td{white-space:nowrap}
  #bye table,#bye thead,#bye tbody,#bye tr,#bye th,#bye td{display:block}
  #bye thead{position:absolute;left:-9999px;top:-9999px}
  #bye tr{border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:8px 12px;background:linear-gradient(180deg,rgba(15,26,43,.96),rgba(7,14,26,.96))}
  #bye td{border:none;padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:10px}
  #bye td::before{content:attr(data-label);color:var(--muted);font-size:11px;font-weight:700}
  #bye td[data-label="Round"]{display:block;font-size:15px;font-weight:900;border-bottom:1px solid var(--line);padding:0 0 6px;margin-bottom:4px}
  #bye td[data-label="Round"]::before{content:"Round ";color:var(--text);font-size:15px;font-weight:900}
  #bye td[data-label="Missing"]{display:block;padding-top:6px}
  #bye td[data-label="Missing"]::before{display:block;margin-bottom:4px}

#team .formation-swap,#team .formation-trade{position:static;display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:8px;font-size:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:900;box-shadow:none;line-height:1}
#team .formation-swap{border-color:#22c55e;background:#0b3522}
#team .formation-reserve-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
#team .formation-reserve-swap,#team .formation-reserve-trade{display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:8px;font-size:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:900;box-shadow:none;line-height:1}
#team .formation-reserve-swap{border-color:#22c55e;background:#0b3522}
@media(max-width:720px){
  #team .formation-actions{position:static;order:4;margin-top:5px;width:100%;gap:4px;flex-wrap:nowrap}
  #team .formation-swap,#team .formation-trade{font-size:10px;padding:5px 7px;border-radius:8px;min-width:0;flex:1}
  #team .formation-field{padding-top:18px}
}

const $=id=>document.getElementById(id);const safeNum=v=>Number.isFinite(Number(v))?Number(v):0;const money=n=>'$'+safeNum(n).toLocaleString();
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
window.jsq = function(value){const s=String(value==null?'':value);return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r/g,'\\r').replace(/\n/g,'\\n').replace(/\u2028/g,'\\u2028').replace(/\u2029/g,'\\u2029')}

function playerPhotoCandidates(p){
 if(!p)return [];
 const out=[];
 const add=v=>{if(v&&!out.includes(String(v)))out.push(String(v))};
 for(const k of ['photo','photoUrl','image','imageUrl','headshot','headshotUrl','playerImage','image_url','photo_url','headshot_url','nrlPhoto','nrlPhotoUrl']) add(p[k]);

 if(Array.isArray(mapped)) mapped.forEach(add); else if(mapped&&typeof mapped==='object'){for(const k of ['photo','photoUrl','image','imageUrl','headshot','headshotUrl','url']) add(mapped[k]);} else add(mapped);
 const slug=playerSlug(p.name);
 if(slug){
  add(`assets/players/${slug}.webp`);
  add(`assets/players/${slug}.png`);
  add(`assets/players/${slug}.jpg`);

}
function photoListAttr(list){return esc(JSON.stringify(list)).replace(/'/g,'&#39;')}
function tryNextPlayerPhoto(img){
 try{
  const list=JSON.parse(img.getAttribute('data-photo-list')||'[]');
  const next=Number(img.getAttribute('data-photo-i')||0)+1;
  if(next<list.length){img.setAttribute('data-photo-i',String(next));img.src=list[next];return;}
 }catch(e){}

 const list=playerPhotoCandidates(p);
 if(!list.length)return `<div class="${cls}">${team}</div>`;

async function fetchJson(path,fallback){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path);return await r.json()}catch(e){return fallback}}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
const SLOT_DEFS=[
 {id:'FRF1',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'},
 {id:'HOK1',label:'Hooker',short:'HOK',accept:['HOK','HKR'],row:'row-frf'},
 {id:'FRF2',label:'Front Row',short:'FRF',accept:['FRF'],row:'row-frf'},
 {id:'2RF1',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'},
 {id:'2RF2',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'},
 {id:'2RF3',label:'2nd Row',short:'2RF',accept:['2RF'],row:'row-2rf'},
 {id:'HFB1',label:'Halfback',short:'HFB',accept:['HFB'],row:'row-halves'},
 {id:'FE1',label:'Five-Eighth',short:'5/8',accept:['5/8'],row:'row-halves'},
 {id:'CTW1',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'CTW2',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'CTW3',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'CTW4',label:'Centre/Wing',short:'CTW',accept:['CTW'],row:'row-ctw1'},
 {id:'FLB1',label:'Fullback',short:'FLB',accept:['FLB','FB'],row:'row-flb'},
 {id:'FLEX1',label:'Flex',short:'FLEX',accept:['ANY'],row:'row-flex'}
];
const slotById=Object.fromEntries(SLOT_DEFS.map(s=>[s.id,s]));
const POS_ALIAS={'HKR':'HOK','HOK':'HOK','FR':'FRF','FRF':'FRF','SRF':'2RF','2RF':'2RF','HFB':'HFB','HB':'HFB','5/8':'5/8','FE':'5/8','CTW':'CTW','WFB':'FLB','FB':'FLB','FLB':'FLB'};
function normalisePosList(value){
 if(value==null)return [];
 const raw=Array.isArray(value)?value.join('/'):String(value);
 const out=[];
 raw.toUpperCase().replace(/5\s*\/\s*8/g,'FE').split(/[|,\/ ]+/).forEach(x=>{
  const v=POS_ALIAS[x]||x;
  if(v&&!out.includes(v))out.push(v);
 });
 return out;
}
function positions(p){
 if(!p)return [];
 const override=App.dualPositions?.players?.[p.name];
 let ps=normalisePosList(override);
 if(ps.length)return ps;
 for(const key of ['positions','eligiblePositions','dualPositions','pos','position']){
  ps=normalisePosList(p[key]);
  if(ps.length)return ps;
 }
 return [];
}
function eligible(p,slot){if(!p||!slot)return false;if(slot.accept.includes('ANY'))return true;const ps=positions(p);return slot.accept.some(a=>ps.includes(POS_ALIAS[a]||a))}
function primaryGroup(p){const ps=positions(p);if(ps.includes('HOK'))return 'HOOKER';if(ps.includes('FRF'))return 'FRONT ROW';if(ps.includes('2RF'))return '2ND ROW / FORWARDS';if(ps.includes('HFB')||ps.includes('5/8'))return 'HALVES';if(ps.includes('CTW'))return 'CENTRES / WINGS';if(ps.includes('FLB'))return 'FULLBACK';return 'UTILITY'}
function getPlayer(name){if(!name)return null;return App.playerMap.get(String(name).trim())||null}
function cleanPlayer(p){
 if(!p || typeof p !== 'object') return {name:'',pos:'',team:'',price:0,avg:0,proj:0,bye:[]};
 const rawName = p.name ?? p.player ?? p.fullName ?? p.playerName ?? '';
 const name = String(rawName).trim();
 const byeRaw = p.bye ?? p.byes ?? p.byeRounds ?? [];
 const bye = Array.isArray(byeRaw) ? byeRaw.map(Number).filter(Boolean) : (byeRaw ? String(byeRaw).split(/[,/ ]+/).map(Number).filter(Boolean) : []);
 return {...p,name,pos:p.pos||p.position||'',team:p.team||p.club||'',price:safeNum(p.price),avg:safeNum(p.avg??p.average??p.seasonAvg),proj:safeNum(p.proj??p.projected??p.expected),bye};
}
function teamPlayers(){return App.myTeam.map(getPlayer).filter(Boolean)}
function saveLocal(){localStorage.setItem('sc_round',String(App.round));localStorage.setItem('sc_myTeam',JSON.stringify(App.myTeam));localStorage.setItem('sc_lineup',JSON.stringify(App.lineup||{}))}

function dateValue(v){if(!v)return NaN;const t=new Date(v).getTime();return Number.isFinite(t)?t:NaN}
function firstDate(obj){if(!obj||typeof obj!=='object')return NaN;for(const k of ['updated','updatedAt','lastUpdated','last_update','generatedAt','generated_at','timestamp','date','kickoffLocal','kickoff','startTime','start','matchDate']){const t=dateValue(obj[k]);if(Number.isFinite(t))return t}return NaN}
function recordAgeHours(rec){const t=firstDate(rec);return Number.isFinite(t)?(Date.now()-t)/36e5:9999}
function isFreshRecord(rec,maxHours=36){return recordAgeHours(rec)<=maxHours}
function dataAgeLabel(rec){const h=recordAgeHours(rec);if(!Number.isFinite(h)||h>9000)return 'unknown age';if(h<1)return 'updated under 1h ago';if(h<48)return `updated ${Math.round(h)}h ago`;return `updated ${Math.round(h/24)}d ago`}
function flattenFixtures(input,out=[]){if(Array.isArray(input)){input.forEach(x=>flattenFixtures(x,out));return out}if(input&&typeof input==='object'){const hasRound=input.round||input.roundNumber||input.round_number||input.scRound||input.nrlRound;const hasDate=input.kickoffLocal||input.kickoff||input.date||input.matchDate||input.startTime||input.start;if(hasRound&&hasDate)out.push(input);for(const v of Object.values(input)){if(v&&typeof v==='object')flattenFixtures(v,out)}}return out}
function inferCurrentRound(){const matches=flattenFixtures(App.fixtures||[]).map(m=>({round:Number(m.round||m.roundNumber||m.round_number||m.scRound||m.nrlRound),time:firstDate(m)})).filter(m=>Number.isFinite(m.round)&&Number.isFinite(m.time)).sort((a,b)=>a.time-b.time);if(!matches.length)return null;const now=Date.now();const buffer=10*60*60*1000;const upcoming=matches.find(m=>m.time+buffer>=now);if(upcoming)return upcoming.round;return matches[matches.length-1].round}
function syncCurrentRound(){const stored=Number(localStorage.getItem('sc_round')||0);const inferred=inferCurrentRound();App.trustWarnings=[];if(Number.isFinite(inferred)&&inferred>0){if(!stored||stored<inferred||stored>inferred+1){App.round=inferred;App.roundSource='fixtures auto';localStorage.setItem('sc_round',String(App.round));App.trustWarnings.push(`Round auto-set to R${App.round} from fixtures. Old stored round was ${stored||'blank'}.`)}else{App.round=stored;App.roundSource='stored'}}else{App.round=stored||App.round||14;App.roundSource='stored fallback';App.trustWarnings.push('Could not auto-detect current round from fixtures; check round manually.')}}
function trustBannerHtml(){const statusAge=dataAgeLabel(App.playerStatus||{}),statusStale=!isFreshRecord(App.playerStatus||{},36);const cls=statusStale?'bad':'good';const warnings=[...App.trustWarnings];if(statusStale)warnings.push(`Player status data may be stale (${statusAge}).`);return `<div style="margin:8px 0;padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#081120"><b>Trust check:</b> Round ${App.round} <span class="pill">${esc(App.roundSource||'')}</span> <span class="pill ${cls}">Status ${esc(statusAge)}</span>${warnings.length?`<br><span class="${statusStale?'bad':'warn'}">${warnings.map(esc).join(' ')}</span>`:''}<br><button onclick="setRound(App.round-1)">R-</button> <button onclick="setRound(App.round+1)">R+</button> <button onclick="refreshTrustDataNow()">Refresh status</button></div>`}
function setRound(r){App.round=Math.max(1,Math.min(27,Number(r)||App.round));App.roundSource='manual';App.projectionCache.clear();saveLocal();renderActive();toast(`Round set to ${App.round}`)}
async function boot(){
 const rawPlayers=await fetchJson('players.json',[]);let arr=Array.isArray(rawPlayers)?rawPlayers:(Array.isArray(rawPlayers.players)?rawPlayers.players:[]);App.players=arr.map(cleanPlayer).filter(p=>p.name);App.playerMap=new Map(App.players.map(p=>[p.name,p]));
 App.weather=await fetchJson('weather.json',null);App.goalKickers=await fetchJson('goal_kickers.json',null);App.teamRoles=await fetchJson('team_roles.json',null);App.availabilityOverrides=await fetchJson('availability_overrides.json',{players:{}});App.fixtures=await fetchJson('fixtures.json',null);App.playerStatus=await fetchJson('player_status.json',{players:{}});App.playerPhotos=await fetchJson('player_photos.json',{players:{}});App.dualPositions=await fetchJson('position_overrides.json',{players:{}});syncCurrentRound();
 const localTeam=JSON.parse(localStorage.getItem('sc_myTeam')||'null');const teamJson=await fetchJson('my_team.json',null);let names=Array.isArray(localTeam)&&localTeam.length?localTeam:(teamJson?.players||teamJson?.team||[]);if(!Array.isArray(names))names=[];
 names = names.map(x => typeof x === 'string' ? x.trim() : (x?.name || x?.player || '')).filter(Boolean);
 const missingNames = names.filter(n=>!App.playerMap.has(n));
 if(missingNames.length) console.warn('Players in my_team.json not found in players.json:', missingNames);
 App.myTeam=[...new Set(names.filter(n=>App.playerMap.has(n)))];
 App.lineup=JSON.parse(localStorage.getItem('sc_lineup')||'{}')||{};validateLineup();ensureLineup();wireTabs();renderActive();
 updateStatusFreshnessLabel();startLiveStatusRefresh();
}
function updateStatusFreshnessLabel(){const fe=$('statusFreshness');if(fe&&App.playerStatus?.updated){const d=new Date(App.playerStatus.updated);const src=(App.playerStatus.sources||[]).map(s=>s.name?.split('-')[0]).filter(Boolean).join('+');fe.textContent=`Status: ${d.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}${src?' · '+src:''}`} }
async function refreshTrustDataNow(){const oldUpdated=App.playerStatus?.updated||App.playerStatus?.generatedAt||'';App.playerStatus=await fetchJson('player_status.json',App.playerStatus||{players:{}});App.availabilityOverrides=await fetchJson('availability_overrides.json',App.availabilityOverrides||{players:{}});App.fixtures=await fetchJson('fixtures.json',App.fixtures||null);syncCurrentRound();App.projectionCache.clear();updateStatusFreshnessLabel();renderActive();const newUpdated=App.playerStatus?.updated||App.playerStatus?.generatedAt||'';if(newUpdated&&newUpdated!==oldUpdated)toast('Status data refreshed')}
function startLiveStatusRefresh(){if(App._statusRefreshTimer)return;App._statusRefreshTimer=setInterval(refreshTrustDataNow,10*60*1000)}

function scaleField(){
  const shell=document.querySelector('.field-shell');
  if(!shell) return;
  const w=shell.clientWidth || window.innerWidth;
  const base=780;
  const scale=Math.min(1, Math.max(0.42, w/base));
  shell.style.setProperty('--fieldScale', scale.toFixed(4));
}

window.addEventListener('resize', ()=>requestAnimationFrame(scaleField));

function wireTabs(){document.querySelectorAll('nav button[data-tab]').forEach(b=>b.onclick=()=>{
document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active-tab'));App.active=b.dataset.tab;$(App.active).classList.add('active-tab');renderActive()})}
function validateLineup(){if(!App.lineup)App.lineup={};const seen=new Set();for(const [id,name] of Object.entries(App.lineup)){const slot=slotById[id],p=name?getPlayer(name):null;if(!slot||!name||!p||!App.myTeam.includes(name)||!eligible(p,slot)||seen.has(name))delete App.lineup[id];else seen.add(name)}}
function ensureLineup(){if(!App.lineup)App.lineup={};validateLineup();const used=usedOnField();for(const id of Object.keys(App.lineup)){if(!slotById[id]||!App.myTeam.includes(App.lineup[id]))delete App.lineup[id]}
 const candidates=[...App.myTeam].filter(n=>!used.has(n)).sort((a,b)=>proj(getPlayer(b)).expected-proj(getPlayer(a)).expected);
 for(const slot of SLOT_DEFS){if(App.lineup[slot.id])continue;const n=candidates.find(x=>!used.has(x)&&eligible(getPlayer(x),slot));if(n){App.lineup[slot.id]=n;used.add(n)}}}
function renderActive(){try{if(App.active==='team')renderTeam();else if(App.active==='bye')renderBye();else if(App.active==='level3')renderLevel3();else if(App.active==='explorer')renderExplorer();else if(App.active==='trade')renderTrade()}catch(err){console.error(err);const el=$(App.active);if(el)el.innerHTML=`<div class="panel"><h2>Screen failed to render</h2><p class="bad">${esc(err.message||err)}</p><p class="small">This safety message prevents a blank page. Send a screenshot of this error if it appears.</p></div>`}}
function overrideFor(p){if(!p||!p.name)return null;return App.availabilityOverrides?.players?.[p.name]||App.availabilityOverrides?.[p.name]||null}
function statusFor(p){if(!p||!p.name)return null;return App.playerStatus?.players?.[p.name]||App.playerStatus?.[p.name]||null}

function isSoftRiskStatus(text){return ['doubtful','chance','risk','maybe','return risk','returnrisk','uncertain','monitor','watch','question mark','question-mark'].includes(String(text||'').toLowerCase().trim())}
function isHardOutStatus(text){return ['out','injured','suspended','unavailable','not selected','ruled out'].includes(String(text||'').toLowerCase().trim())}
function isPositiveStatus(text){return ['available','fit','cleared','named','confirmed','starting','final17','final 17','selected','playing','played','green'].includes(String(text||'').toLowerCase().trim())}
function freshPositiveStatus(text,rec,maxHours=36){return rec&&isFreshRecord(rec,maxHours)&&(isPositiveStatus(text)||rec.cleared===true||rec.named===true||rec.selected===true||rec.final17===true||rec.played===true)}
function recordBlob(rec){try{return JSON.stringify(rec||{}).toLowerCase()}catch(e){return String(rec||'').toLowerCase()}}
function isWeakRiskRecord(rec){const blob=recordBlob(rec);const conf=String(rec?.sourceConfidence||rec?.confidence||rec?.trust||'').toLowerCase();return blob.includes('question mark')||blob.includes('question-mark')||blob.includes('joel screenshot')||blob.includes('screenshot')||blob.includes('manual visual')||blob.includes('visual indicator')||blob.includes('question indicator')||blob.includes('questionable icon')||conf==='?'||conf==='low'||conf==='weak'||conf==='visual'}
function staleCleared(rec,type='status'){return {key:'good',available:true,label:'Available*',reason:`Old ${type} risk ignored because status data is stale (${dataAgeLabel(rec)}); verify official team list.`}}
function weakRiskCleared(rec,type='status'){return {key:'good',available:true,label:'Available*',reason:`Weak ${type} risk ignored. Question-mark/screenshot indicators are not trusted as player availability evidence; verify official team list.`}}
function positiveEvidenceFromPlayer(p,round=App.round){
 const fields=[p?.teamListStatus,p?.lineupStatus,p?.selectionStatus,p?.availability,p?.availabilityStatus,p?.status,p?.injuryStatus,p?.note,p?.injuryNote].map(x=>String(x||'').toLowerCase());
 if(fields.some(x=>isPositiveStatus(x)))return 'Player data says named/available';
 if(p?.cleared===true||p?.named===true||p?.selected===true||p?.starting===true||p?.final17===true||p?.inFinal17===true)return 'Player data says named/selected';
 const playedRound=Number(p?.playedRound||p?.lastPlayedRound||p?.lastRoundPlayed||p?.lastAppearanceRound||0);
 if(Number.isFinite(playedRound)&&playedRound>=Number(round)-1)return `Played recently in R${playedRound}`;
 return '';
}
function fallbackPlayerRiskRecord(p){return {status:p?.injuryStatus||p?.status||'',reason:p?.injuryNote||p?.statusNote||p?.note||p?.availabilityNote||'',sourceConfidence:p?.sourceConfidence||p?.confidence||'',playProbability:p?.playProbability,updated:p?.updated||p?.updatedAt||p?.lastUpdated||p?.generatedAt}}
function availabilityStatus(p,round=App.round){
 if(!p)return {key:'out',available:false,label:'Missing',reason:'Player not found in players.json'};
 const ss=statusFor(p),ov=overrideFor(p),bye=(p.bye||[]).map(Number).includes(Number(round));
 const statusText=String(ss?.status||'').toLowerCase().trim(),ovText=String(ov?.status||'').toLowerCase().trim();
 const freshStatus=isFreshRecord(ss,36),freshOverride=isFreshRecord(ov,72);
 const playerPositive=positiveEvidenceFromPlayer(p,round);
 // Bye is not an availability injury call. If the current round is a bye, purple wins.
 if(bye)return {key:'bye',available:false,label:'Bye',reason:`Bye round ${round}`};
 // Highest trust: fresh named/available/confirmed/final-17 style records.
 if(freshPositiveStatus(statusText,ss,36))return {key:'good',available:true,label:statusText.includes('named')?'Named':'Available',reason:ss.reason||`Fresh status: ${ss.status||'available'}`};
 if(freshPositiveStatus(ovText,ov,72))return {key:'good',available:true,label:ovText.includes('named')?'Named':'Available',reason:ov.reason||'Fresh override: available'};
 if(playerPositive)return {key:'good',available:true,label:'Available',reason:playerPositive};
 // Overrides next. Only fresh, trusted evidence can keep yellow/red.
 if(ov){
  const ovMinR=ov.returnWindowMinRound;
  if(isWeakRiskRecord(ov))return weakRiskCleared(ov,'override');
  if(!freshOverride&&(isSoftRiskStatus(ovText)||isHardOutStatus(ovText)||safeNum(ov.playProbability)<60)){
   if(ovMinR!=null&&Number(round)<Number(ovMinR))return {key:'out',available:false,label:'Out',reason:ov.reason||`Expected back around R${ovMinR}`};
   return staleCleared(ov,'override');
  }
  if(freshOverride&&isHardOutStatus(ovText))return {key:'out',available:false,label:ovText==='suspended'?'Suspended':'Out',reason:ov.reason||'Override: unavailable'};
  if(freshOverride&&(isSoftRiskStatus(ovText)||safeNum(ov.playProbability)<60))return {key:'risk',available:true,label:'Risk',reason:ov.reason||'Override: risk'};
 }
 // Player status feed. Screenshot/question-mark/manual visual hints are weak evidence, not true injury data.
 if(ss){
  const minR=ss.returnWindowMinRound;
  if(isWeakRiskRecord(ss))return weakRiskCleared(ss,'status');
  if(!freshStatus&&(isSoftRiskStatus(statusText)||isHardOutStatus(statusText)||safeNum(ss.playProbability)<60)){
   if(minR!=null&&Number(round)<Number(minR))return {key:'out',available:false,label:'Out',reason:ss.reason||`Expected back around R${minR}`};
   return staleCleared(ss,'status');
  }
  if(freshStatus&&isHardOutStatus(statusText)){
   if(minR!=null&&Number(round)>=Number(minR)){const note=ss.expectedReturn?`return risk (due ${ss.expectedReturn})`:'return risk';return {key:'risk',available:true,label:'Risk',reason:ss.reason?`${ss.reason} – ${note}`:note}}
   return {key:'out',available:false,label:statusText==='suspended'?'Suspended':'Out',reason:ss.reason||'Status: unavailable'};
  }
  if(freshStatus&&(isSoftRiskStatus(statusText)||safeNum(ss.playProbability)<60))return {key:'risk',available:true,label:'Risk',reason:ss.reason||'Status: risk'};

function teamRenderState(){
 const fieldSlots=[],fieldNames=[],fieldSet=new Set(),fieldBySlot={};

 for(const slot of SLOT_DEFS){
  const name=String(App.lineup?.[slot.id]||'').trim();
  if(!name||fieldSet.has(name)||!App.myTeam.includes(name)||!getPlayer(name))continue;

  fieldNames.push(name);
  fieldBySlot[slot.id]=name;
  fieldSlots.push({slot,name,player:getPlayer(name)});

  '2ND ROW FORWARDS',
  'HALFBACK',

  'WINGS / CENTRES',
  'FULLBACK'

   .filter(name=>!usedReserve.has(name))

function renderLevel3(){const top=App.players.slice().sort((a,b)=>proj(b).expected-proj(a).expected).slice(0,100);$('level3').innerHTML=`<div class="panel"><h2>Level 3 Projections</h2><p class="small">Top 100 only for speed. Use Player Explorer for any player.</p><div class="tbl-scroll"><table><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Floor</th><th>Expected</th><th>Ceiling</th><th>Status R${App.round}</th></tr></thead><tbody>${top.map(p=>{const pr=roundProj(p);return `<tr><td>${esc(p.name)}</td><td>${esc(p.pos||'')}</td><td>${esc(p.team||'')}</td><td>${pr.floor}</td><td><b>${pr.expected}</b></td><td>${pr.ceiling}</td><td>${statusPill(p)}</td></tr>`}).join('')}</tbody></table></div></div>`}
let explorerTimer=null;function renderExplorer(){$('explorer').innerHTML=`<div class="panel"><h2>Player Explorer</h2><input id="explorerInput" placeholder="Search any player..." oninput="clearTimeout(explorerTimer);explorerTimer=setTimeout(updateExplorer,150)"><div id="explorerResults"></div></div>`}
function updateExplorer(){const q=norm($('explorerInput').value),box=$('explorerResults');if(!q){box.innerHTML='';return}const res=App.players.filter(p=>norm(p.name).includes(q)||norm(p.pos).includes(q)||norm(p.team).includes(q)).slice(0,20);box.innerHTML=res.map(p=>{const pr=roundProj(p),raw=proj(p),st=availabilityStatus(p),weather=weatherLine(p);return `<div class="result"><b>${esc(p.name)}</b> ${statusPill(p)} <span class="small">${esc(p.pos||'')} - ${esc(p.team||'')}</span><br>Price: ${money(p.price)} | Avg: ${safeNum(p.avg||p.average)} | BE: ${p.be??p.breakEven??'N/A'}<br>Floor ${pr.floor} / <b>Expected ${pr.expected}</b> / Ceiling ${pr.ceiling}<br>${weather?`<span class="small">${weather}</span><br>`:''}<span class="small">If available: ${raw.expected} | ${esc(st.reason)} | ${esc(raw.goal)}</span></div>`}).join('')||'<p class="small">No matches.</p>'}
function renderTrade(){$('trade').innerHTML=`<div class="grid"><div class="panel span4"><h2>Trade Lab</h2><label>Trade OUT</label><input id="tradeOut" list="teamList"><datalist id="teamList">${App.myTeam.map(n=>`<option value="${esc(n)}">`).join('')}</datalist><label>Trade IN</label><input id="tradeIn" list="allList"><datalist id="allList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist><button onclick="scoreTrade()">Score Trade</button><button onclick="applyTradeFromTradeLab()">Apply Trade</button></div><div class="panel span6"><h2>Trade Verdict</h2><div id="tradeVerdict" class="small">Select players to score the trade.</div></div></div>`}
function scoreTrade(){const out=getPlayer($('tradeOut').value),inn=getPlayer($('tradeIn').value),box=$('tradeVerdict');if(!out||!inn){box.innerHTML='Pick valid players.';return}const po=roundProj(out),pi=roundProj(inn);const pts=pi.expected-po.expected,cash=safeNum(out.price)-safeNum(inn.price),bye=(availabilityStatus(inn).available?1:0)-(availabilityStatus(out).available?1:0);let score=Math.max(0,Math.min(100,Math.round(50+pts*2+(cash/60000)+bye*12)));box.innerHTML=`<div class="metric ${score>=75?'good':score>=55?'warn':'bad'}">${score}/100</div><table><tbody><tr><td>Points this round</td><td>${pts>=0?'+':''}${pts}</td></tr><tr><td>Cash</td><td>${cash>=0?'+':''}${money(cash)}</td></tr><tr><td>Availability impact R${App.round}</td><td>${bye>=0?'+':''}${bye}</td></tr><tr><td>Verdict</td><td>${score>=75?'Strong trade':score>=55?'Decent, check byes':'Weak trade - probably emotional trash'}</td></tr></tbody></table>`}
function applyTradeFromTradeLab(){const out=$('tradeOut')?.value?.trim(),inn=$('tradeIn')?.value?.trim();if(!out||!inn){toast('Pick OUT and IN players');return}if(!App.myTeam.includes(out)||!App.playerMap.has(inn)){toast('Invalid trade');return}App.myTeam=App.myTeam.map(n=>n===out?inn:n);for(const k of Object.keys(App.lineup)){if(App.lineup[k]===out){if(eligible(getPlayer(inn),slotById[k]))App.lineup[k]=inn;else delete App.lineup[k]}}ensureLineup();saveLocal();renderTrade();toast(`Trade applied: ${out} → ${inn}`)}
boot();
</script>
