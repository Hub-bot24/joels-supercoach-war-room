#team .team-score-hero span{font-size:12px;font-weight:950;color:#bfd0e8;text-transform:uppercase;letter-spacing:.06em}
#team .team-score-hero b{font-size:34px;line-height:1;color:#66ff35;text-shadow:0 0 16px rgba(102,255,53,.28)}
@media(max-width:720px){#team .mobile-team-head{position:static;top:auto;z-index:auto}#team .formation-field{margin-top:12px}#team .team-score-hero{padding:10px 12px}#team .team-score-hero b{font-size:32px}}


/* My Team quick action buttons: Swap + Trade on field/reserve cards */
#team .formation-actions{display:flex;gap:4px;align-items:center;justify-content:center;position:absolute;left:6px;right:6px;bottom:6px;z-index:5}
#team .formation-swap,#team .formation-trade{position:static;display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:8px;font-size:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:900;box-shadow:none;line-height:1}
#team .formation-swap{border-color:#22c55e;background:#0b3522}
#team .formation-reserve-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
#team .formation-reserve-swap,#team .formation-reserve-trade{display:inline-flex;align-items:center;justify-content:center;padding:3px 7px;border-radius:8px;font-size:10px;border:1px solid #58a6ff;background:#12345a;color:#fff;font-weight:900;box-shadow:none;line-height:1}
#team .formation-reserve-swap{border-color:#22c55e;background:#0b3522}
@media(max-width:720px){
  #team .formation-actions{position:static;order:4;margin-top:5px;width:100%;gap:4px;flex-wrap:nowrap}
  #team .formation-swap,#team .formation-trade{font-size:10px;padding:5px 7px;border-radius:8px;min-width:0;flex:1}
  #team .formation-field{padding-top:18px}
}


/* =========================================================
   WAR ROOM LANDSCAPE MY TEAM LAYOUT PATCH
   Scope: #team only. Layout + cards only.
   Does NOT touch Level 3 projection/scoring/status calculations.
   ========================================================= */
#team .wr-team-room{
  width:100%;
  max-width:1600px;
  margin:0 auto;
  min-width:1180px;
  padding:0 0 14px;
}
#team .wr-topbar{
  display:grid;
  grid-template-columns:190px 180px repeat(4,minmax(120px,1fr)) 110px;
  gap:0;
  align-items:stretch;
  min-height:96px;
  background:linear-gradient(180deg,rgba(4,7,12,.98),rgba(7,13,22,.96));
  border:1px solid rgba(148,163,184,.16);
  border-radius:0 0 18px 18px;
  box-shadow:0 18px 55px rgba(0,0,0,.35);
  overflow:hidden;
}
#team .wr-brand{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-right:1px solid rgba(148,163,184,.16);
}
#team .wr-logo-mark{
  width:58px;
  height:58px;
  display:grid;
  place-items:center;
  border:1px solid rgba(143,255,0,.75);
  color:#9cff00;
  font-weight:950;
  letter-spacing:-.08em;
  background:linear-gradient(135deg,rgba(156,255,0,.18),rgba(255,255,255,.03));
  clip-path:polygon(50% 0,100% 26%,100% 74%,50% 100%,0 74%,0 26%);
}
#team .wr-brand b{
  display:block;
  font-size:28px;
  line-height:.86;
  letter-spacing:.02em;
  color:#fff;
}
#team .wr-brand b::first-line{color:#fff}
#team .wr-title{
  padding:18px 22px;
  border-right:1px solid rgba(148,163,184,.16);
}
#team .wr-title h2{
  margin:0;
  font-size:30px;
  letter-spacing:.02em;
}
#team .wr-title span{
  display:block;
  color:#cbd5e1;
  margin-top:8px;
  font-weight:900;
  letter-spacing:.08em;
}
#team .wr-metric{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:7px;
  border-right:1px solid rgba(148,163,184,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.12));
}
#team .wr-metric span{
  color:#e5e7eb;
  font-size:12px;
  font-weight:950;
  letter-spacing:.06em;
  text-transform:uppercase;
}
#team .wr-metric b{
  color:#86d80f;
  font-size:34px;
  line-height:1;
  text-shadow:0 0 16px rgba(134,216,15,.22);
}
#team .wr-metric:nth-of-type(5) b{color:#2f8cff}
#team .wr-top-actions{
  display:grid;
  place-items:center;
  padding:14px;
}
#team .wr-top-actions button{
  border-radius:12px;
  padding:10px 14px;
}
#team .wr-freshness-row{
  display:flex;
  width:100%;
  position:static;
  clear:both;
  grid-column:1 / -1;
  transform:none;
  margin:0;
  min-height:22px;
  padding:3px 12px;
  align-items:center;
  justify-content:flex-end;
  box-sizing:border-box;
  border:1px solid rgba(148,163,184,.16);
  border-top:0;
  background:rgba(7,18,34,.96);
  overflow:visible;
  font-size:12px;
}
#team .wr-freshness-row .dataFreshnessText{font-weight:850;color:#dbeafe}
#team .wr-freshness-row button{flex:0 0 auto}
@media (orientation:landscape) and (max-height:620px){
 #team .wr-freshness-row{justify-content:flex-start!important;font-size:11px!important;min-height:22px!important;padding:2px 8px!important}
}
#team .wr-action-panel{
  max-width:760px;
  margin:8px auto;
}
#team .formation-layout{
  display:grid;
  grid-template-columns:minmax(790px,1fr) 360px;
  gap:18px;
  align-items:stretch;
  margin-top:14px;
}
#team .formation-layout main{min-width:0}
#team .formation-field{
  min-height:790px;
  height:calc(100vh - 195px);
  max-height:900px;
  padding:20px 26px 22px;
  border-radius:0;
  border:1px solid rgba(132,204,22,.20);
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,255,255,.13),transparent 20%),
    radial-gradient(circle at 50% 45%,rgba(98,255,0,.18),transparent 38%),
    linear-gradient(180deg,rgba(2,6,13,.55),rgba(2,6,13,.12) 18%,rgba(5,75,24,.88) 45%,rgba(2,42,14,.98));
  box-shadow:inset 0 0 90px rgba(0,0,0,.42),0 24px 70px rgba(0,0,0,.40);
}
#team .formation-field:before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:0;
  background:
    linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px) 0 0/90px 100%,
    linear-gradient(180deg,rgba(255,255,255,.055) 1px,transparent 1px) 0 0/100% 78px,
    radial-gradient(ellipse at 50% -5%,rgba(165,243,252,.40),transparent 16%),
    radial-gradient(ellipse at 20% 10%,rgba(255,255,255,.16),transparent 22%),
    radial-gradient(ellipse at 82% 8%,rgba(255,255,255,.12),transparent 22%);
  pointer-events:none;
}
#team .formation-field:after{
  content:"";
  position:absolute;
  inset:42px 70px;
  border:1px solid rgba(255,255,255,.13);
  border-radius:50%;
  pointer-events:none;
}
#team .formation-grid{
  position:relative;
  z-index:2;
  height:100%;
  display:grid;
  grid-template-columns:repeat(5,minmax(132px,1fr));
  grid-template-rows:repeat(7,minmax(86px,1fr));
  gap:12px 20px;
  align-items:center;
  justify-items:center;
  overflow:visible;
}
#team .formation-slot{
  width:100%;
  max-width:260px;
  min-height:108px;
}
#team .formation-card{
  width:100%;
  min-height:106px;
  display:grid;
  grid-template-columns:76px minmax(0,1fr) 72px;
  grid-template-rows:auto auto auto;
  column-gap:10px;
  row-gap:2px;
  align-items:center;
  text-align:left;
  padding:13px 14px;
  border-radius:10px;
  background:
    radial-gradient(circle at 15% 50%,color-mix(in srgb,var(--accent,#22d3ee) 30%,transparent),transparent 38%),
    linear-gradient(180deg,rgba(18,20,24,.96),rgba(2,5,10,.98));
  border:1px solid color-mix(in srgb,var(--accent,#22d3ee) 76%,#ffffff 0%);
  box-shadow:0 14px 32px rgba(0,0,0,.62), inset 0 0 20px rgba(255,255,255,.035);
  cursor:pointer;
  position:relative;
  overflow:visible;
}
#team .formation-card.risk{--accent:#f59e0b}
#team .formation-card.out{--accent:#ef4444}
#team .formation-card.bye{--accent:#8b5cf6}
#team .wr-slot-tag{
  position:absolute;
  left:50%;
  top:-32px;
  transform:translateX(-50%);
  padding:5px 12px;
  border-radius:7px;
  background:linear-gradient(180deg,#151515,#050505);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;
  font-size:15px;
  font-weight:950;
  letter-spacing:.04em;
  box-shadow:0 8px 18px rgba(0,0,0,.45);
}
#team .wr-team-logo{
  grid-row:1 / 4;
  width:64px;
  height:64px;
  display:grid;
  place-items:center;
  border-radius:16px;
  color:#fff;
  background:
    radial-gradient(circle at 50% 25%,rgba(255,255,255,.18),transparent 30%),
    linear-gradient(135deg,color-mix(in srgb,var(--accent,#22d3ee) 38%,#020617),#020617);
  border:1px solid color-mix(in srgb,var(--accent,#22d3ee) 70%,#ffffff 0%);
  font-weight:950;
  font-size:18px;
  text-transform:uppercase;
}
#team .formation-name{
  grid-column:2 / 3;
  font-size:15px;
  line-height:1.05;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.02em;
  text-align:left;
  align-self:end;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#team .formation-score{
  grid-column:3 / 4;
  grid-row:1 / 3;
  position:static;
  justify-self:end;
  color:#f8fafc;
  font-size:38px;
  line-height:.9;
  font-weight:950;
  text-shadow:0 0 18px rgba(255,255,255,.18);
}
#team .formation-score small{display:none}
#team .formation-meta{
  grid-column:2 / 4;
  display:flex;
  gap:10px;
  align-items:center;
  color:#d7dee9;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
}
#team .wr-card-footer{
  grid-column:2 / 4;
  display:flex;
  align-items:center;
  gap:6px;
  color:#9ca3af;
  font-size:10px;
  font-weight:850;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#team .formation-pos,
#team .formation-face,
#team .formation-figure{display:none!important}
#team .formation-card .status-dot{
  position:absolute;
  right:10px;
  bottom:10px;
  width:10px;
  height:10px;
  margin:0;
}
#team .formation-actions{
  opacity:0;
  pointer-events:none;
  position:absolute;
  left:10px;
  right:auto;
  bottom:-14px;
  display:flex;
  gap:6px;
  transition:.15s ease;
}
#team .formation-card:hover .formation-actions,
#team .formation-card:focus-within .formation-actions{
  opacity:1;
  pointer-events:auto;
}
#team .formation-swap,
#team .formation-trade{
  font-size:10px;
  padding:4px 8px;
  border-radius:8px;
}
#team .wr-reserve-panel{
  min-height:790px;
  height:calc(100vh - 195px);
  max-height:900px;
  padding:18px;
  border-radius:10px;
  background:linear-gradient(180deg,rgba(5,11,17,.97),rgba(2,8,11,.98));
  border:1px solid rgba(148,163,184,.24);
  box-shadow:0 22px 65px rgba(0,0,0,.45), inset 0 0 28px rgba(134,216,15,.035);
  overflow:hidden;
}
#team .wr-reserve-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  padding-bottom:12px;
  border-bottom:1px solid rgba(148,163,184,.18);
}
#team .wr-reserve-head span{
  color:#86d80f;
  font-size:24px;
  font-weight:950;
  letter-spacing:.03em;
}
#team .wr-reserve-head b{
  color:#a3a3a3;
  font-size:20px;
}
#team .wr-reserve-list{
  display:grid;
  grid-template-rows:repeat(12,1fr);
  height:calc(100% - 58px);
}
#team .formation-reserve-card{
  min-height:0;
  display:grid;
  grid-template-columns:25px 38px minmax(0,1fr) 44px 12px;
  gap:10px;
  align-items:center;
  padding:6px 0;
  border:0;
  border-radius:0;
  border-bottom:1px solid rgba(148,163,184,.14);
  background:transparent;
  box-shadow:none;
  color:#fff;
  position:relative;
}
#team .formation-reserve-card:hover{
  background:rgba(255,255,255,.035);
}
#team .wr-reserve-no{
  color:#fff;
  font-size:15px;
  font-weight:950;
  text-align:right;
}
#team .wr-reserve-logo{
  width:34px;
  height:34px;
  border-radius:10px;
  display:grid;
  place-items:center;
  font-size:11px;
  font-weight:950;
  color:#fff;
  border:1px solid color-mix(in srgb,var(--accent,#22d3ee) 55%,#334155);
  background:linear-gradient(135deg,color-mix(in srgb,var(--accent,#22d3ee) 35%,#020617),#020617);
}
#team .formation-reserve-main{min-width:0}
#team .formation-reserve-name{
  font-size:15px;
  line-height:1.05;
  text-transform:none;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#team .formation-reserve-meta{
  font-size:10px;
  color:#94a3b8;
  margin-top:3px;
}
#team .formation-reserve-score{
  color:#86d80f;
  font-size:19px;
  font-weight:950;
  text-align:right;
}
#team .formation-reserve-score small{display:none}
#team .formation-reserve-face,
#team .formation-reserve-card .formation-figure{display:none!important}
#team .formation-reserve-card .status-dot{
  position:static;
  width:9px;
  height:9px;
  margin:0;
}
#team .formation-reserve-actions{
  display:none;
  position:absolute;
  right:18px;
  bottom:4px;
  gap:5px;
  background:#020617;
  padding:3px;
  border-radius:8px;
}
#team .formation-reserve-card:hover .formation-reserve-actions{
  display:flex;
}
#team .formation-reserve-swap,
#team .formation-reserve-trade{
  font-size:9px;
  padding:3px 6px;
  border-radius:7px;
}
#team .wr-status-legend{
  display:flex;
  justify-content:center;
  gap:28px;
  align-items:center;
  padding:12px 0 2px;
  color:#e5e7eb;
  font-weight:850;
  text-transform:uppercase;
}
#team .wr-status-legend span{
  display:flex;
  align-items:center;
  gap:8px;
}
#team .wr-status-legend .status-dot{
  margin:0;
}
@media(max-width:1250px){
  .screen{overflow-x:auto}
  #team .wr-team-room{min-width:1180px}
}
@media(max-width:720px){
  #team .wr-team-room{
    min-width:1180px;
    transform-origin:top left;
  }
  #team .formation-layout{
    grid-template-columns:minmax(790px,1fr) 360px;
  }
  #team .formation-field,
  #team .wr-reserve-panel{
    height:790px;
    min-height:790px;
  }
}

    App.round = generatedRound;
    App.roundSource = App.currentRoundMeta?.round ? 'current_round.json' : 'status_truth.json';
    try{ localStorage.setItem('sc_round', String(App.round)); }catch(e){}
    if(App.projectionCache && typeof App.projectionCache.clear === 'function') App.projectionCache.clear();
  }
}

function setSlotPlayer(slotId,newName){const slot=slotById[slotId],incoming=getPlayer(newName);if(!slot||!incoming)return;if(!App.myTeam.includes(incoming.name)){toast('Player is not in your squad');return}if(!eligible(incoming,slot)){toast(`${incoming.name} cannot play ${slot.short}`);return}const old=App.lineup?.[slotId];for(const k of Object.keys(App.lineup||{})){if(App.lineup[k]===incoming.name)delete App.lineup[k]}App.lineup[slotId]=incoming.name;ensureLineup();saveLocal();renderTeam();toast(`${incoming.name} selected at ${slot.short}`)}

function reserveBucket(p){
 const ps=positions(p);

 if(ps.includes('HOK')) return 'HOOKER';

 if(ps.includes('2RF')) return '2ND ROW FORWARDS';
 if(ps.includes('HFB')) return 'HALFBACK';

 // CTW/FLB duals stay with CTW.

 if(ps.includes('FLB')) return 'FULLBACK';

 return 'FULLBACK';
}

const TEAM_LOGO_ALIAS={NQL:'NQC',BRO:'BRI',CRO:'SHA',NZL:'PAR'};
function teamLogoCode(p){const k=teamKey(p);return TEAM_LOGO_ALIAS[k]||k}
function teamIconHtml(p,cls){const k=teamLogoCode(p);const src=TEAM_LOGOS[k];return src?`<div class="${cls} team-logo-img"><img src="${src}" alt="${esc(k)}"></div>`:`<div class="${cls}">${esc(k)}</div>`}
function teamKey(p){return String(p?.team||p?.club||'SC').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,3)}
function teamAccent(p){return TEAM_ACCENTS[teamKey(p)]||'#00d5d5'}
function posAccent(pos){const s=String(pos||'').toUpperCase();if(s.includes('FRF')||s.includes('HOK')||s.includes('2RF'))return '#f5c542';if(s.includes('CTW')||s.includes('FLB')||s.includes('FB'))return '#a855f7';if(s.includes('FLEX'))return '#32d168';return '#00d5d5'}
function formationFigureHtml(cls='formation-face'){return `<div class="${cls}"><div class="formation-figure" aria-hidden="true"><span class="formation-arm left"></span><span class="formation-arm right"></span></div></div>`}
function shortName(name){const parts=String(name||'').trim().split(/\s+/).filter(Boolean);if(parts.length>=2)return `${parts[0][0]}. ${parts.slice(1).join(' ')}`;return String(name||'')}

function formationStatusClass(p){const st=availabilityStatus(p);return st.key==='bye'?'bye':(st.key==='injured'||st.key==='suspended'||st.key==='notnamed'||st.key==='out')?'out':(st.key==='expected'||st.key==='origin'||st.key==='risk')?'risk':''}
function formationSlot(slotId,gridArea){
 const slot=slotById[slotId],p=getPlayer(App.lineup?.[slotId]);
 if(!slot)return '';
 if(!p){
  return `<div class="formation-slot" style="grid-area:${gridArea}">
   <div class="formation-card formation-empty" style="--accent:#335074;--pos:#335074" data-slot="${slotId}" ondragover="allowDropOnSlot(event,'${slotId}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slotId}')">
    <div class="wr-slot-tag">${esc(slot.short)}</div>
    <div class="wr-team-logo">+</div>
    <div class="formation-name">Empty</div>
    <div class="formation-score">--</div>
    <div class="formation-meta">Drop player</div>
   </div>
  </div>`;
 }
 const pr=roundProj(p),st=availabilityStatus(p),cls=statusDotClass(st);
 const accent=teamAccent(p),pa=posAccent(slot.short),opp=esc(p.opponent||p.opp||p.vs||'');
 const price=safeNum(p.price)?money(p.price):'';
 const be=safeNum(p.breakeven??p.breakEven??p.BE??p.be);
 const avg=safeNum(p.avg??p.average??p.seasonAvg);
 const team=esc((p.team||p.club||'SC').slice(0,3).toUpperCase());
 const playerPosText=positionText(p,slot.short);
 return `<div class="formation-slot" style="grid-area:${gridArea}">
  <div class="formation-card ${formationStatusClass(p)}" style="--accent:${accent};--pos:${pa}" draggable="true" data-slot="${slotId}" onpointerdown="pressDragStart(event,'field','${slotId}','${window.jsq(p.name)}')" ondragstart="dragField(event,'${slotId}','${window.jsq(p.name)}')" ondragover="allowDropOnSlot(event,'${slotId}')" ondragleave="clearDrop(event)" ondrop="dropOnSlot(event,'${slotId}')">
   <div class="wr-slot-tag" title="${esc(slot.short)} slot">${esc(playerPosText)}</div>
   ${teamIconHtml(p,'wr-team-logo')}
   <div class="formation-name player-name-link" title="${esc(p.name)}" role="button" tabindex="0" onpointerdown="event.preventDefault();event.stopPropagation();event.stopImmediatePropagation()" onclick="event.preventDefault();event.stopPropagation();event.stopImmediatePropagation();openPlayerCard('${window.jsq(p.name)}')">${esc(p.name)}</div>
   <div class="formation-score">${pr.expected}</div>
   <div class="formation-meta">
    <span>${price}</span>
    <span>${be?`BE ${be}`:''}</span>
    <span>${avg?`AVG ${Math.round(avg)}`:''}</span>
   </div>
   ${projectionBoxHtml(p)}
   <span class="status-dot ${cls}" title="${esc(st.reason||st.label||'')}" aria-label="${esc(st.label||'status')}"></span>
   <div class="wr-card-footer"><span class="status-dot ${cls}" title="${esc(st.reason)}"></span><span>${esc(st.label)}</span><span>R${App.round}${opp?' · '+opp:''}</span></div>
  </div>
 </div>`;
}
function formationFieldHtml(fieldBySlot={}){
 const slots=[
  ['FRF1','1 / 1 / 2 / 2'],['HOK1','1 / 3 / 2 / 4'],['FRF2','1 / 5 / 2 / 6'],
  ['2RF1','2 / 2 / 3 / 3'],['2RF2','2 / 4 / 3 / 5'],['2RF3','3 / 3 / 4 / 4'],
  ['HFB1','4 / 2 / 5 / 3'],['FE1','4 / 4 / 5 / 5'],
  ['CTW1','5 / 1 / 6 / 2'],['CTW2','5 / 2 / 6 / 3'],['CTW3','5 / 4 / 6 / 5'],['CTW4','5 / 5 / 6 / 6'],
  ['FLB1','6 / 3 / 7 / 4'],['FLEX1','7 / 3 / 8 / 4']
 ];
 return `<div class="formation-field"><div class="formation-watermark left">WAR</div><div class="formation-watermark right">ROOM</div><div class="formation-grid">${slots.map(([id,area])=>formationSlot(id,area)).join('')}</div></div>`
}
function formationReserveCard(p,idx=0,slotId=""){
 const pr=roundProj(p),st=availabilityStatus(p),cls=statusDotClass(st);
 const reservePosList=(typeof positions==='function'?positions(p):[]).filter(Boolean);
 const reservePosText=reservePosList.length?reservePosList.join('/'):(p.pos||p.position||"");
 const accent=teamAccent(p),pa=posAccent(reservePosText),opp=esc(p.opponent||p.opp||p.vs||"");
 const team=esc((p.team||p.club||"SC").slice(0,3).toUpperCase());
 return `<div class="formation-reserve-card ${formationStatusClass(p)}" style="--accent:${accent};--pos:${pa}" draggable="true" data-reserve-slot="${esc(slotId)}" data-reserve="${esc(p.name)}" onpointerdown="pressDragStart(event,'reserve','${window.jsq(slotId)}','${window.jsq(p.name)}')" ondragstart="dragReserve(event,'${window.jsq(p.name)}')" ondragover="allowDropOnReserveCard(event,'${window.jsq(slotId)}')" ondragleave="clearDrop(event)" ondrop="dropOnReserveCard(event,'${window.jsq(slotId)}')">
  <div class="wr-reserve-no">${idx}</div>
  ${teamIconHtml(p,'wr-reserve-logo')}

function wrPhotoKey(v){

function wrUsablePhotoUrl(url){
  const u=String(url||"");
  if(!u)return false;
  if(/index\.php\?player=/i.test(u))return false;
  if(/previewMain|preview-main|placeholder|logo|badge|crest|favicon|default/i.test(u))return false;
  if(/remote\.axd$/i.test(u))return false;
  return /rugbyimages\.statsperform\.com|Player%20Bodyshots|Player\+Bodyshots|remote\.axd\?/i.test(u) || /\.(png|jpg|jpeg|webp)(\?|$)/i.test(u);
}
function wrCardPlayerPhotoUrl(p){
  if(!p)return "";
  const rec=lookupPlayerPhotoRecord(p);
  const url=playerPhotoRecordUrl(rec);
  if(wrUsablePhotoUrl(url))return url;
  const fallback=p.photo||p.image||p.headshot||p.nrlPhoto||p.playerPhoto||"";
  return wrUsablePhotoUrl(fallback)?fallback:"";
}

function wrCardNum(v){
  const n = Number(v);
  return Number.isFinite(n) && n > 0 ? n : 0;
}
function wrCardScores(p){
  const lists = [p?.scores,p?.recentScores,p?.lastScores,p?.gameScores,p?.history,p?.matches];
  for(const raw of lists){
    if(!Array.isArray(raw)) continue;
    const arr = raw.map(x=>{
      if(typeof x === "number") return x;
      if(!x || typeof x !== "object") return NaN;
      return Number(x.score ?? x.sc ?? x.points ?? x.supercoach ?? x.total);
    }).filter(Number.isFinite);
    if(arr.length) return arr;
  }
  return [];
}
function wrCardRecentAverage(p,count){
  const direct = count === 3
    ? wrCardNum(p?.last3Avg ?? p?.avg3 ?? p?.l3Avg)
    : wrCardNum(p?.last5Avg ?? p?.avg5 ?? p?.l5Avg);

  if(direct) return Math.round(direct);

  const loose = count === 3
    ? wrCardNum(p?.last3 ?? p?.lastThree ?? p?.l3)
    : wrCardNum(p?.last5 ?? p?.lastFive ?? p?.l5);

  if(loose) return Math.round(loose);

  const scores = wrCardScores(p);
  if(scores.length >= count){
    const recent = scores.slice(-count);
    return Math.round(recent.reduce((s,n)=>s+n,0) / recent.length);
  }

  return "-";
}

 if(d.type==="field"){

 }

function renderBye(){
 const tp=teamPlayers();
 const currentRound=Number(App.round||1);
 const rounds=Array.from({length:27-currentRound+1},(_,i)=>currentRound+i);
 const classifyByeStatus=(st)=>{
  const key=String(st?.key||'').toLowerCase().replace(/[\s-]+/g,'_');
  if(key==='good'||key==='named'||key==='played'||key==='locked')return 'good';
  if(key==='bye')return 'bye';
  if(key==='notnamed'||key==='not_named'||key==='omitted'||key==='out_of_side')return 'notnamed';
  if(key==='expected'||key==='expected_reference')return 'risk';
  if(key==='extended'||key==='reserve'||key==='risk'||key==='origin'||key==='origin_risk')return 'risk';
  if(key==='injured'||key==='injury'||key==='suspended'||key==='suspension'||key==='susp'||key==='out')return 'out';
  return st?.available?'risk':'notnamed';
 };
 $('bye').innerHTML=`<div class="panel"><h2>Bye Planner</h2><table><thead><tr><th>Round</th><th>Confirmed</th><th>Risk</th><th>Out</th><th>Not Named</th><th>Bye</th><th>Status</th><th>Missing</th></tr></thead><tbody>${rounds.map(r=>{
  const buckets={good:[],risk:[],out:[],notnamed:[],bye:[]};
  tp.forEach(p=>{
   const playerByeRounds = (p.bye||p.byes||p.byeRounds||[]).map(Number).filter(Boolean);
   const trueBye = playerByeRounds.includes(Number(r));
   const st = availabilityStatus(p,r);
   let k = classifyByeStatus(st);

   // Bye Planner core rule:
   // Future planner BYE must come from the player's actual bye rounds only.
   // Do not carry current-round status_truth BYE into non-bye future rounds.
   if(k==='bye' && !trueBye){
    k = 'good';
   }

   (buckets[k]||buckets.notnamed).push(p);
  });
  const conf=buckets.good.length;
  const chip=(p,cls)=>`<span class="miss ${cls}">${esc(p.name)}</span>`;
  const miss=[...buckets.out.map(p=>chip(p,'bad')),...buckets.notnamed.map(p=>chip(p,'notnamed')),...buckets.bye.map(p=>chip(p,'bye')),...buckets.risk.map(p=>chip(p,'warn'))].join(' ');
  return `<tr><td data-label="Round">${r}</td><td data-label="Confirmed">${conf}</td><td data-label="Risk">${buckets.risk.length?'<span class="pill warn">'+buckets.risk.length+'</span>':'-'}</td><td data-label="Out">${buckets.out.length?'<span class="pill bad">'+buckets.out.length+'</span>':'-'}</td><td data-label="Not Named">${buckets.notnamed.length?'<span class="pill">'+buckets.notnamed.length+'</span>':'-'}</td><td data-label="Bye">${buckets.bye.length?'<span class="pill bye">'+buckets.bye.length+'</span>':'-'}</td><td data-label="Status">${conf>=17?'<span class="pill good">OK</span>':conf>=15?'<span class="pill warn">Thin</span>':'<span class="pill bad">Danger</span>'}</td><td data-label="Missing">${miss||'None'}</td></tr>`}).join('')}</tbody></table><p class="small bye-legend"><span class="miss bad">Injured / Suspended / Out</span> <span class="miss notnamed">Not Named</span> <span class="miss warn">Expected / Extended / Risk</span> <span class="miss bye">Bye</span></p></div>`
}

function truthRecordAnyRound(p){
  if(!p||!p.name||!App.statusTruth)return null;
  const players=App.statusTruth.players||App.statusTruth;
  if(!players||typeof players!=='object')return null;
  let rec=players[p.name];
  if(!rec){
    const key=playerKeyName(p.name);
    for(const [name,value] of Object.entries(players)){if(playerKeyName(name)===key){rec=value;break;}}
  }
  return rec&&typeof rec==='object'?rec:null;
}
function injuryWindowPhaseFromTruth(rec,round){
  const r=Number(round||0);
  const recRound=Number(rec?.round||App.statusTruth?.round||0);
  const redUntil=Number(rec?.injuryRedUntilRound||0);
  const riskUntil=Number(rec?.injuryRiskUntilRound||0);
  const hasWindow=Boolean(redUntil||riskUntil||rec?.expectedReturnRoundMin||rec?.expectedReturnRoundMax||rec?.injuryReturnKnown===true);
  const isInjury=truthKeyFromRecord(rec)==='injured'||!!rec?.injuryNote||!!rec?.injuryType||!!rec?.expectedReturnText;
  if(!isInjury)return '';
  if(r&&redUntil&&r<=redUntil)return 'red';
  if(r&&riskUntil&&r<=riskUntil)return 'yellow';
  if(r&&riskUntil&&r>riskUntil)return '';
  // Critical rule: do not copy a current-round injury chip through every future Bye Planner round
  // when the source has no known return window. Show it for the current truth round only.
  if(!hasWindow && r && recRound && r!==recRound)return '';
  return truthKeyFromRecord(rec)==='injured'?'red':'';
}

function suspensionWindowPhaseFromTruth(rec,round){
  const r=Number(round||0);
  const recRound=Number(rec?.round||App.statusTruth?.round||0);
  const start=Number(rec?.suspensionStartRound||rec?.round||0);
  const end=Number(rec?.suspensionEndRound||0);
  const isSusp=truthKeyFromRecord(rec)==='suspended'||!!rec?.suspensionMatches||!!rec?.suspensionEndRound;
  if(!isSusp||!r)return '';
  if(start&&r<start)return '';
  if(end&&r<=end)return 'pink';
  // No known suspension window: do not carry it beyond the current truth round.
  if(!end&&recRound&&r===recRound)return 'pink';
  return '';
}
function truthSuspensionText(rec){
  if(!rec)return '';
  const isSusp=truthKeyFromRecord(rec)==='suspended'||!!rec.suspensionMatches||!!rec.suspensionEndRound;
  if(!isSusp)return '';
  const bits=[];
  if(rec.suspensionMatches)bits.push(`Suspension: ${rec.suspensionMatches} match${Number(rec.suspensionMatches)===1?'':'es'}`);
  else bits.push('Suspended');
  if(rec.suspensionEndRound)bits.push(`Pink through R${rec.suspensionEndRound}`);
  if(rec.expectedReturnText)bits.push(`Return: ${rec.expectedReturnText}`);
  const src=truthSourceText(rec);
  if(src)bits.push(`Source: ${src}`);
  return bits.join(' · ');
}

function truthSourceText(rec){
  const srcs=Array.isArray(rec?.sources)?rec.sources:[];
  const names=srcs.map(s=>s?.name||s?.source||s?.url).filter(Boolean);
  return [...new Set(names)].slice(0,3).join(' + ');
}
function truthInjuryText(rec){
  const bits=[];
  const type=rec?.injuryType || rec?.injuryNote || (truthKeyFromRecord(rec)==='injured'?rec?.reason:'');
  if(type)bits.push(`Injury: ${type}`);
  if(rec?.expectedReturnText)bits.push(`Return: ${rec.expectedReturnText}`);
  else if(rec?.expectedReturnRoundMin&&rec?.expectedReturnRoundMax&&rec.expectedReturnRoundMin!==rec.expectedReturnRoundMax)bits.push(`Return: R${rec.expectedReturnRoundMin}–R${rec.expectedReturnRoundMax}`);
  else if(rec?.expectedReturnRoundMin)bits.push(`Return: R${rec.expectedReturnRoundMin}`);
  if(rec?.injuryRedUntilRound)bits.push(`Red through R${rec.injuryRedUntilRound}`);
  if(rec?.injuryRiskUntilRound&&rec?.injuryRiskUntilRound!==rec?.injuryRedUntilRound)bits.push(`Risk until R${rec.injuryRiskUntilRound}`);
  const src=truthSourceText(rec);
  if(src)bits.push(`Source: ${src}`);

function truthTeamListText(rec){

function enhancedStatusFromTruth(p,round=App.round){
  const exact=statusTruthRecordFor(p,round);
  const any=truthRecordAnyRound(p);
  const rec=exact||any;
  if(!rec)return null;
  const recRound=Number(rec.round||App.statusTruth?.round||0);
  const requested=Number(round||App.round||0);
  const phase=injuryWindowPhaseFromTruth(rec,round);
  const suspPhase=suspensionWindowPhaseFromTruth(rec,round);
  // Future bye planner rounds must not reuse old NAMED truth, but injury/suspension windows are allowed to project.
  if(!exact && requested && recRound && requested!==recRound){
    if(phase==='red')return {key:'injured',available:false,label:'INJURED',reason:richStatusReasonFromTruth(rec,round),source:'data/status_truth.json',truth:rec};
    if(phase==='yellow')return {key:'expected',available:true,label:'EXPECTED',reason:richStatusReasonFromTruth(rec,round),source:'data/status_truth.json',truth:rec};
    if(suspPhase==='pink')return {key:'suspended',available:false,label:'SUSPENDED',reason:richStatusReasonFromTruth(rec,round)||'Suspension window active',source:'data/status_truth.json',truth:rec};
    return null;
  }
  let key=truthKeyFromRecord(rec);

  const missingTruthText = `${rec?.selectionStatus||''} ${rec?.displayStatus||''} ${rec?.status||''} ${rec?.reason||''} ${truthSourceText(rec)||''}`.toLowerCase();
  const isMissingTeamListTruth = key==='notnamed' && (
    missingTruthText.includes('source missing') ||
    missingTruthText.includes('not confirmed') ||
    missingTruthText.includes('no current club team-list truth')
  );

  if(isMissingTeamListTruth){
    return {
      key:'expected',
      available:true,
      label:'EXPECTED',
      reason:richStatusReasonFromTruth(rec,round)||'Current club team-list truth missing; treated as expected, not confirmed NOT NAMED.',
      source:'data/status_truth.json',
      truth:rec
    };
  }
  if(key==='injured'){
    if(phase==='yellow')key='expected';
    if(phase==='red')key='injured';
  }
  if(key==='suspended' && suspPhase!=='pink' && requested && recRound && requested!==recRound){
    return null;
  }
  const available = rec.available!=null ? Boolean(rec.available) : (key==='good'||key==='expected'||key==='origin');
  return {key,available,label:compactStatusLabel({key}),reason:richStatusReasonFromTruth(rec,round)||rec.reason||`Status truth: ${rec.displayStatus||rec.status||key}`,source:'data/status_truth.json',truth:rec};

const __baseAvailabilityStatusV18 = availabilityStatus;
statusFromTruth = enhancedStatusFromTruth;
availabilityStatus = function(p,round=App.round){
  if(!p)return {key:'out',available:false,label:'Missing',reason:'Player not found in players.json'};
  const requested=Number(round||App.round||0);
  const truthRound=Number(App.statusTruth?.round||App.round||0);
  const bye=(p.bye||[]).map(Number).includes(requested);
  if(bye)return {key:'bye',available:false,label:'BYE',reason:`Bye round ${requested}`};

  const rec=truthRecordAnyRound(p);
  const phase=rec?injuryWindowPhaseFromTruth(rec,requested):'';
  const suspPhase=rec?suspensionWindowPhaseFromTruth(rec,requested):'';

  // Bye Planner future-round rule:
  // Current team-list statuses (NAMED / NOT_NAMED / EXPECTED / Origin-out) only apply to the current truth round.
  // They must NOT be copied across every future round. Future rounds should only carry:
  // - actual bye rounds
  // - active injury red window
  // - injury return-risk yellow window
  if(requested && truthRound && requested!==truthRound){
    if(phase==='red')return {key:'injured',available:false,label:'INJURED',reason:richStatusReasonFromTruth(rec,requested)||'Injury window active',source:'data/status_truth.json',truth:rec};
    if(phase==='yellow')return {key:'expected',available:true,label:'EXPECTED',reason:richStatusReasonFromTruth(rec,requested)||'Injury return-risk window',source:'data/status_truth.json',truth:rec};
    if(suspPhase==='pink')return {key:'suspended',available:false,label:'SUSPENDED',reason:richStatusReasonFromTruth(rec,requested)||'Suspension window active',source:'data/status_truth.json',truth:rec};
    return {key:'expected',available:true,label:'Projected available',reason:`Future round ${requested}: current R${truthRound} team-list status not carried forward`};
  }

const wrOriginalAvailabilityStatusV41 = availabilityStatus;
const wrOriginalRoundProjV41 = roundProj;
const wrOriginalProjectionRiskPillV41 = projectionRiskPill;

function wrV41Text(v){return String(v==null?'':v)}
function wrV41Num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function wrV41Key(v){return wrV41Text(v).toLowerCase().replace(/[\s-]+/g,'_')}
function wrV41Truth(p){try{return typeof truthRecordAnyRound==='function'?(truthRecordAnyRound(p)||{}):{}}catch{return {}}}
function wrV41StatusRec(p){try{return typeof statusFor==='function'?(statusFor(p)||{}):{}}catch{return {}}}

function wrV41Jersey(rec,p){return wrV41Num(rec?.jersey||rec?.shirtNo||rec?.number||p?.jersey||p?.shirtNo||p?.number)}
function wrV41InjuryText(rec){try{return typeof truthInjuryText==='function'?(truthInjuryText(rec)||''):''}catch{return ''}}

function wrV41RedThroughRound(text){

function wrV41HardUnavailableForRound(p,round,base){
  const rec=wrV41Truth(p), ss=wrV41StatusRec(p), ov=wrV41OverrideRec(p);

  const lower=text.toLowerCase();
  const minRounds=[rec?.returnWindowMinRound,ss?.returnWindowMinRound,ov?.returnWindowMinRound,wrV41ReturnRound(text)].map(Number).filter(Number.isFinite);
  const redThrough=wrV41RedThroughRound(text);
  const selected=Number(round||App.round||0);
  const playableRole=String(rec?.lineupRole||rec?.selectionRole||'').toLowerCase();
  const playableNamed=(rec?.available!==false)&&String(rec?.displayStatus||rec?.status||'').toUpperCase()==='NAMED'&&(playableRole==='starter'||playableRole==='interchange');
  if(lower.includes('suspended'))return {kind:'suspended',reason:text||'Suspended'};
  if(playableNamed)return null;
  if(redThrough!=null&&selected<=redThrough)return {kind:'injured',reason:text||`Unavailable through R${redThrough}`};
  if(minRounds.some(r=>selected<r)&&(lower.includes('injur')||lower.includes('calf')||lower.includes('hamstring')||lower.includes('knee')||lower.includes('shoulder')||lower.includes('return')||lower.includes('red through'))){

function wrV41ArbitrateStatus(p,round,base){
  if(!p||!base)return base;
  const rec=wrV41Truth(p);
  // Absolute status precedence: BYE is final and cannot be relabelled as injured/suspended
  // by old injury text, player notes, or fallback status fields.
  const baseKey=wrV41Key(base.key||base.label);
  const recKey=(typeof truthKeyFromRecord==='function') ? truthKeyFromRecord(rec) : '';
  const recColour=wrV41Text(rec?.colour||rec?.color).toLowerCase().trim();
  const recSelection=wrV41Key(rec?.selectionStatus||rec?.displayStatus||rec?.status);
  if(baseKey==='bye'||baseKey.includes('bye')||recKey==='bye'||recColour==='purple'||recSelection==='bye'){

      ...base,
      key:'bye',
      available:false,
      label:'BYE',
      reason:base.reason||rec.reason||`Bye round ${round}`,
      source:base.source||'data/status_truth.json',
      truth:base.truth||rec

  }
  const jersey=wrV41Jersey(rec,p);
  const hard=wrV41HardUnavailableForRound(p,round,base);

    if(hard.kind==='suspended')return {...base,key:'suspended',available:false,label:'Suspended',reason:hard.reason||base.reason||'Suspended'};
    return {...base,key:'injured',available:false,label:'Injured',reason:hard.reason||base.reason||'Injured/unavailable for selected round'};
  }
  const key=wrV41Key(base.key);
  if((key==='good'||key==='named'||base.available===true)&&jersey>=18&&jersey<=19){
    return {...base,key:'risk',available:true,label:'Emergency',reason:`Emergency jersey ${jersey}; not a confirmed playable 17`};
