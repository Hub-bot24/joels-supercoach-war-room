<html lang="en">

<style>
:root{--bg:#050914;--panel:#0d1626;--panel2:#132139;--card:#081120;--line:#263a58;--text:#f8fafc;--muted:#bfd0e8;--blue:#58a6ff;--good:#32d168;--warn:#f5c542;--bad:#ff4d4d;--purple:#a855f7;--field1:#1f7a39;--field2:#2a9150}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,#0b1a33,#050914 45%,#02040a);color:var(--text);font-family:Arial,Helvetica,sans-serif}button,input,select{font:inherit}button{background:linear-gradient(180deg,#1b2d4a,#111d31);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.22)}button.active{background:linear-gradient(180deg,#63b2ff,#348ef2);color:#031225}button:hover{filter:brightness(1.08)}input,select{background:#081120;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;width:100%}nav{position:sticky;top:0;z-index:20;display:flex;gap:10px;align-items:center;padding:12px 14px;background:rgba(3,7,15,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(14px);overflow:auto}.spacer{flex:1}.live{font-size:12px;font-weight:900}.badge{display:inline-flex;gap:6px;align-items:center;padding:4px 8px;border-radius:999px;background:#10213a;border:1px solid var(--line)}.on{background:#21c55d;color:#031225}.red{background:#ef4444}.tab{display:none}.tab.active-tab{display:block}.screen{min-height:calc(100vh - 66px);padding:14px}.team-layout{display:grid;grid-template-columns:210px minmax(650px,1fr) 350px;gap:14px;align-items:stretch}.side,.reserves,.tips,.panel{background:linear-gradient(180deg,rgba(15,26,43,.96),rgba(7,14,26,.96));border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.side{padding:16px}.side h2,.reserves h2{margin:0 0 14px;font-size:22px}.side label{display:block;color:var(--muted);font-size:13px;margin:14px 0 7px}.metric-label{color:var(--muted);font-size:13px;margin-top:16px}.metric{font-size:30px;font-weight:950;margin-top:5px}.metric.good{color:var(--good)}.side-actions{display:grid;gap:10px;margin-top:22px}.legend{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}.legend-row{display:flex;gap:9px;align-items:center;margin:10px 0;color:var(--muted);font-size:13px}.dot{width:13px;height:13px;border-radius:50%;display:inline-block;background:var(--good);box-shadow:0 0 12px currentColor}.dot.warn{background:var(--warn)}.dot.bad{background:var(--bad)}.dot.purple{background:var(--purple)}
.field-wrap{position:relative;border-radius:14px;overflow:hidden;border:1px solid #306840;box-shadow:inset 0 0 80px rgba(0,0,0,.35),0 20px 50px rgba(0,0,0,.32);min-height:900px;background:linear-gradient(180deg,rgba(21,112,52,.96),rgba(42,145,80,.92),rgba(30,120,60,.95));}.field-wrap:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.035) 0 72px,rgba(0,0,0,.045) 72px 144px),radial-gradient(circle at 30% 20%,rgba(255,255,255,.1),transparent 26%),radial-gradient(circle at 72% 80%,rgba(0,0,0,.15),transparent 30%);}.field-lines{position:absolute;inset:34px 72px;border:2px solid rgba(255,255,255,.38);}.field-lines:before{content:"";position:absolute;left:0;right:0;top:50%;border-top:2px solid rgba(255,255,255,.27)}.field-lines:after{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:2px dashed rgba(255,255,255,.18)}.zone-line{position:absolute;left:0;right:0;border-top:1px solid rgba(255,255,255,.23)}.z1{top:12.5%}.z2{top:25%}.z3{top:37.5%}.z4{top:62.5%}.z5{top:75%}.z6{top:87.5%}.field-inner{position:relative;z-index:2;height:900px;padding:36px 28px 28px 28px}.slot-row{position:absolute;left:20px;right:20px;display:flex;gap:18px;justify-content:center;align-items:center}.row-hok{top:36px}.row-frf{top:140px}.row-2rf{top:250px}.row-halves{top:360px}.row-ctw1{top:470px}.row-ctw2{top:580px}.row-flb{top:720px}.row-label{position:absolute;left:20px;width:92px;background:rgba(5,13,26,.92);border:1px solid rgba(255,255,255,.12);border-radius:10px;text-align:center;font-weight:950;padding:10px 5px;line-height:1.25;box-shadow:0 8px 22px rgba(0,0,0,.35)}.lbl-hok{top:43px}.lbl-frf{top:158px}.lbl-2rf{top:267px}.lbl-halves{top:376px}.lbl-ctw{top:520px}.lbl-flb{top:735px}.player-card{width:250px;min-height:82px;background:linear-gradient(180deg,#071222,#020814);border:1px solid #335074;border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:34px 1fr 46px;gap:9px;align-items:center;box-shadow:0 12px 24px rgba(0,0,0,.42);cursor:grab}.player-card:active{cursor:grabbing}.player-card.drop-ok{outline:3px solid var(--good)}.player-card.drop-no{outline:3px solid var(--bad)}.empty-card{border-style:dashed;opacity:.8}.logo{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;background:#10213a;border:1px solid #436180;font-size:11px;font-weight:950}.pname{font-size:15px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:#dbeafe;margin-top:3px}.proj{text-align:right;font-size:12px;color:#dbeafe}.proj b{font-size:18px;color:white}.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:4px;background:var(--good)}.status-dot.warn{background:var(--warn)}.status-dot.bad{background:var(--bad)}.reserves{padding:14px;max-height:900px;overflow:auto}.reserve-group{border:1px solid var(--line);border-radius:12px;margin:10px 0 14px;overflow:hidden;background:rgba(6,13,25,.75)}.reserve-head{background:linear-gradient(90deg,#176b3b,#23a455);padding:8px 12px;font-weight:950;letter-spacing:.3px}.reserve-card{display:grid;grid-template-columns:22px 36px 1fr 48px;gap:8px;align-items:center;padding:10px;border-top:1px solid var(--line);cursor:grab}.reserve-card:hover{background:rgba(88,166,255,.1)}.drag{font-size:18px;color:#cbd5e1}.small{font-size:12px;color:var(--muted)}.reserve-name{font-weight:950}.reserve-card.out{opacity:.75}.tips{margin-top:14px;padding:14px;display:grid;grid-template-columns:120px repeat(3,1fr);gap:12px;align-items:center}.tip-card{background:rgba(13,28,49,.82);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--muted)}.tip-title{font-weight:950;color:white}.panel{padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.span12{grid-column:span 12}.span6{grid-column:span 6}.span4{grid-column:span 4}.hidden{display:none!important}.result{padding:10px;border:1px solid var(--line);border-radius:12px;background:#081120;margin:8px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid var(--line);text-align:left}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#071222;border:1px solid var(--line);border-radius:999px;padding:10px 16px;z-index:99;box-shadow:0 20px 55px rgba(0,0,0,.45);display:none}.toast.show{display:block}
@media(max-width:1150px){.team-layout{grid-template-columns:1fr}.field-wrap{min-height:820px}.field-inner{height:820px}.reserves{max-height:none}.tips{grid-template-columns:1fr}.player-card{width:220px}.row-label{display:none}.slot-row{left:8px;right:8px;gap:8px}.row-hok{top:25px}.row-frf{top:130px}.row-2rf{top:235px}.row-halves{top:340px}.row-ctw1{top:445px}.row-ctw2{top:550px}.row-flb{top:670px}}
@media(max-width:680px){nav{gap:6px}button{padding:9px 10px}.screen{padding:8px}.field-wrap{overflow:auto}.field-inner{width:760px;height:820px}.field-lines{left:44px;right:44px}.player-card{width:210px}.team-layout{gap:8px}.side,.reserves,.tips{border-radius:12px}}
</style>
</head>
<body>
<nav>
<button class="active" data-tab="team">My Team</button>
<button data-tab="bye">Bye Planner</button>
<button data-tab="level3">Level 3</button>
<button data-tab="explorer">Player Explorer</button>
<button data-tab="trade">Trade Lab</button>
<div class="spacer"></div><span class="live">SC PLUS</span><span class="badge red">LIVE</span><span class="badge on">ON</span>
</nav>
<div class="screen">
<section id="team" class="tab active-tab"></section>
<section id="bye" class="tab"></section>
<section id="level3" class="tab"></section>
<section id="explorer" class="tab"></section>
<section id="trade" class="tab"></section>
</div>
<div id="toast" class="toast"></div>
<script>
'use strict';
const App={players:[],playerMap:new Map(),myTeam:[],weather:null,fixtures:null,goalKickers:null,teamRoles:null,availabilityOverrides:null,projectionCache:new Map(),active:'team',rendered:new Set(),round:Number(localStorage.getItem('sc_round')||14),lineup:null};
const $=id=>document.getElementById(id);const safeNum=v=>Number.isFinite(Number(v))?Number(v):0;const money=n=>'$'+safeNum(n).toLocaleString();
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9/\s'-]/g,' ').replace(/\s+/g,' ').trim()}
async function fetchJson(path,fallback){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path);return await r.json()}catch(e){return fallback}}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
const SLOT_DEFS=[
 {id:'HOK1',label:'Hooker',short:'HOK',accept:['HOK','HKR'],row:'row-hok'},
 {id:'FRF1',label:'Front Row',short:'FRF',accept:['FRF','FR'],row:'row-frf'}, {id:'FRF2',label:'Front Row',short:'FRF',accept:['FRF','FR'],row:'row-frf'}, {id:'FRF3',label:'Front Row',short:'FRF',accept:['FRF','FR'],row:'row-frf'},
 {id:'2RF1',label:'2nd Row',short:'2RF',accept:['2RF','SRF'],row:'row-2rf'}, {id:'2RF2',label:'2nd Row',short:'2RF',accept:['2RF','SRF'],row:'row-2rf'},
 {id:'HFB1',label:'Halfback',short:'HFB',accept:['HFB','HB'],row:'row-halves'}, {id:'FE1',label:'5/8',short:'5/8',accept:['5/8','FE','FIVE EIGHTH'],row:'row-halves'},
 {id:'CTW1',label:'Centre/Wing',short:'CTW',accept:['CTW','WFB','W','C'],row:'row-ctw1'}, {id:'CTW2',label:'Centre/Wing',short:'CTW',accept:['CTW','WFB','W','C'],row:'row-ctw1'},
 {id:'CTW3',label:'Centre/Wing',short:'CTW',accept:['CTW','WFB','W','C'],row:'row-ctw2'}, {id:'CTW4',label:'Centre/Wing',short:'CTW',accept:['CTW','WFB','W','C'],row:'row-ctw2'},
 {id:'FLB1',label:'Fullback',short:'FLB',accept:['FLB','FB','WFB'],row:'row-flb'}
];
function getPlayer(name){return App.playerMap.get(name)||null}function teamPlayers(){return App.myTeam.map(getPlayer).filter(Boolean)}
function posTokens(p){return String(p?.pos||'').toUpperCase().replace(/HALF BACK/g,'HFB').replace(/FULLBACK/g,'FLB').replace(/HOOKER/g,'HOK').split(/[\/|,\s]+/).filter(Boolean)}
function eligible(p,slot){const t=posTokens(p);return slot.accept.some(a=>t.includes(a))}
function primaryGroup(p){const t=posTokens(p);if(t.some(x=>['HOK','HKR'].includes(x)))return 'HOOKER';if(t.some(x=>['FRF','FR'].includes(x)))return 'FRONT ROW';if(t.some(x=>['2RF','SRF'].includes(x)))return '2ND ROW / FORWARDS';if(t.some(x=>['HFB','5/8','FE','HB'].includes(x)))return 'HALVES';if(t.some(x=>['CTW','WFB','W','C'].includes(x)))return 'CENTRES / WINGS';if(t.some(x=>['FLB','FB'].includes(x)))return 'FULLBACK';return 'UTILITY'}
function loadLocal(){try{const t=JSON.parse(localStorage.getItem('warroom_fast_team')||'[]');if(Array.isArray(t))App.myTeam=t}catch(e){}try{const l=JSON.parse(localStorage.getItem('warroom_hd_lineup')||'null');if(l&&typeof l==='object')App.lineup=l}catch(e){}}
function saveLocal(){localStorage.setItem('warroom_fast_team',JSON.stringify(App.myTeam));localStorage.setItem('sc_round',String(App.round));localStorage.setItem('warroom_hd_lineup',JSON.stringify(App.lineup||{}))}
async function boot(){
 $('team').innerHTML='<div class="panel"><h2>Loading HD field...</h2><p class="small">Loading data once. No heavy render loop.</p></div>';
 const [playersRaw,myTeamRaw,weather,fixtures,goalKickers,teamRoles,availabilityOverrides]=await Promise.all([fetchJson('players.json',[]),fetchJson('my_team.json',null),fetchJson('weather.json',null),fetchJson('fixtures.json',null),fetchJson('goal_kickers.json',null),fetchJson('team_roles.json',null),fetchJson('availability_overrides.json',null)]);
 App.players=Array.isArray(playersRaw)?playersRaw:(Array.isArray(playersRaw.players)?playersRaw.players:[]);App.players=App.players.filter(p=>p&&p.name).map(p=>({...p,name:String(p.name)})).sort((a,b)=>String(a.name).localeCompare(String(b.name)));App.playerMap=new Map(App.players.map(p=>[p.name,p]));
 loadLocal();if(!App.myTeam.length&&myTeamRaw&&Array.isArray(myTeamRaw.players))App.myTeam=myTeamRaw.players.filter(n=>App.playerMap.has(n));
 App.weather=weather;App.fixtures=fixtures;App.goalKickers=goalKickers;App.teamRoles=teamRoles;App.availabilityOverrides=availabilityOverrides;applyAvailabilityOverrides();buildProjectionCache();ensureLineup();renderActive(true);
}
function applyAvailabilityOverrides(){const src=App.availabilityOverrides;if(!src)return;if(src.currentRound&&!localStorage.getItem('sc_round'))App.round=Number(src.currentRound)||App.round;const overrides=src.players||src.overrides||{};for(const [name,ov] of Object.entries(overrides)){const p=getPlayer(name);if(!p||!ov)continue;const s=String(ov.status||ov.injuryStatus||ov.availability||'').toLowerCase();if(s)p.injuryStatus=s;if(ov.reason)p.injuryNote=ov.reason;if(ov.note)p.injuryNote=ov.note;if(ov.playProbability!==undefined)p.playProbability=Number(ov.playProbability);if(ov.expectedReturnRound!==undefined)p.expectedReturnRound=Number(ov.expectedReturnRound);if(ov.suspensionStatus!==undefined)p.suspensionStatus=ov.suspensionStatus;p._availabilityOverride=true;}}
function availabilityStatus(p,r=App.round){if(!p)return{label:'Empty',cls:'bad',available:false,reason:'No player'};const bye=p.bye||p.byes||p.byeRounds||[];if(Array.isArray(bye)&&bye.map(Number).includes(Number(r)))return{label:'Bye',cls:'purple',available:false,reason:'Team bye'};const s=String(p.availability||p.injuryStatus||p.status||'fit').toLowerCase();const susp=String(p.suspensionStatus||'').toLowerCase();const prob=(p.playProbability===undefined||p.playProbability===null)?100:Number(p.playProbability);const ret=Number(p.expectedReturnRound||0);if(susp.includes('suspend')||s.includes('suspend'))return{label:'Suspended',cls:'bad',available:false,reason:p.injuryNote||'Suspended'};if(s==='out'||s.includes('out')||s.includes('unavailable'))return{label:'Out',cls:'bad',available:false,reason:p.injuryNote||'Unavailable'};if(s.includes('injur'))return{label:'Injured',cls:'bad',available:false,reason:p.injuryNote||'Injured'};if(ret&&ret>Number(r))return{label:'Out',cls:'bad',available:false,reason:'Expected back R'+ret};if(prob<40)return{label:'Out',cls:'bad',available:false,reason:p.injuryNote||'Low play probability'};if(prob<70||s.includes('doubt'))return{label:'Doubtful',cls:'warn',available:false,reason:p.injuryNote||'Doubtful'};if(prob<95||s.includes('chance'))return{label:'Risk',cls:'warn',available:true,reason:p.injuryNote||'Monitor'};return{label:'Available',cls:'good',available:true,reason:p.injuryNote||'Available'}}
function statusDot(p){const st=availabilityStatus(p);return `<span class="status-dot ${st.cls==='bad'?'bad':st.cls==='warn'?'warn':st.cls==='purple'?'purple':''}"></span>`}
function statusPill(p){const st=availabilityStatus(p);return `<span class="pill ${st.cls}">${st.label}</span>`}
function goalAdj(p){let adj=0,note='No GK boost';if(p.goalKicker===true||p.isGoalKicker===true){adj=3;note='Goal kicker +3'} if(App.goalKickers){const txt=JSON.stringify(App.goalKickers).toLowerCase();if(txt.includes(String(p.name).toLowerCase())){adj=3;note='Goal kicker +3'}}return{adj,note}}
function roleAdj(p){let adj=0;const mins=safeNum(p.expectedMinutes||p.minutes||p.avgMinutes);if(mins>=75)adj+=3;else if(mins&&mins<50)adj-=5;const s=String(p.injuryStatus||p.status||'fit').toLowerCase();if(s.includes('injur')||s.includes('out')||s.includes('suspend'))adj-=12;if(s.includes('doubt')||s.includes('chance'))adj-=5;return adj}
function calcProjection(p){const avg=safeNum(p.avg||p.average||p.seasonAvg);const last3=safeNum(p.last3Avg||p.last3);const last5=safeNum(p.last5Avg||p.last5);const raw=safeNum(p.proj||p.projected||p.projection);let base=raw||(avg*.55+(last3||avg)*.25+(last5||avg)*.20)||avg||35;const ppm=safeNum(p.ppm||p.PPM),mins=safeNum(p.expectedMinutes||p.minutes||p.avgMinutes);if(ppm&&mins>=45&&ppm<1.6)base=base*.75+(ppm*mins)*.25;const g=goalAdj(p);let expected=Math.round(base+g.adj+roleAdj(p));expected=Math.max(0,Math.min(130,expected));const volatility=String(p.pos||'').match(/CTW|FLB|5\/8|HFB/)?28:20;return{floor:Math.max(0,Math.round(expected-volatility*.8)),expected,ceiling:Math.round(expected+volatility*1.15),goal:g.note,confidence:expected>=60?'High':expected>=40?'Medium':'Low'}}
function buildProjectionCache(){App.projectionCache.clear();App.players.forEach(p=>App.projectionCache.set(p.name,calcProjection(p)))}function proj(p){return App.projectionCache.get(p.name)||calcProjection(p)}function roundProj(p,r=App.round){const pr=proj(p),st=availabilityStatus(p,r);return{...pr,expected:st.available?pr.expected:0,floor:st.available?pr.floor:0,ceiling:st.available?pr.ceiling:0,status:st}}
function ensureLineup(){const validNames=new Set(App.myTeam.filter(n=>App.playerMap.has(n)));let l=App.lineup||{};for(const k of Object.keys(l)){if(!validNames.has(l[k]))delete l[k]}const used=new Set(Object.values(l));const unplaced=App.myTeam.filter(n=>validNames.has(n)&&!used.has(n));for(const slot of SLOT_DEFS){if(l[slot.id]&&eligible(getPlayer(l[slot.id]),slot))continue;const idx=unplaced.findIndex(n=>eligible(getPlayer(n),slot));if(idx>=0){l[slot.id]=unplaced.splice(idx,1)[0]}}
 App.lineup=l;saveLocal()}
function starters(){return Object.values(App.lineup||{}).filter(Boolean)}function reserves(){const used=new Set(starters());return App.myTeam.filter(n=>!used.has(n)).map(getPlayer).filter(Boolean)}function teamProjection(){return starters().map(getPlayer).filter(Boolean).reduce((s,p)=>s+roundProj(p).expected,0)}
function renderActive(force=false){const id=App.active;({team:renderTeam,bye:renderBye,level3:renderLevel3,explorer:renderExplorer,trade:renderTrade}[id])();}
document.querySelectorAll('nav button[data-tab]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.tab').forEach(s=>s.classList.remove('active-tab'));App.active=btn.dataset.tab;$(App.active).classList.add('active-tab');renderActive(true)});
function renderTeam(){ensureLineup();const tp=teamPlayers();const avail=starters().map(getPlayer).filter(p=>availabilityStatus(p).available).length;const remaining=24000; $('team').innerHTML=`<div class="team-layout"><aside class="side"><h2>My Team</h2><label>Round</label><select id="roundSel" onchange="App.round=Number(this.value);saveLocal();renderTeam()">${Array.from({length:27},(_,i)=>`<option value="${i+1}" ${App.round===i+1?'selected':''}>Round ${i+1}</option>`).join('')}</select><div class="metric-label">Salary Remaining</div><div class="metric good">${money(remaining)}</div><div class="metric-label">Total Projected</div><div class="metric">${teamProjection()}</div><div class="metric-label">Starting Available</div><div class="metric ${avail>=13?'good':'bad'}">${avail}/13</div><div class="side-actions"><button onclick="autoFillLineup()">Auto Fill</button><button onclick="optimizeLineup()">Optimize</button><button onclick="clearSavedLineup()">Clear Team</button><button onclick="saveLocal();toast('Team saved')">Save Team</button></div><div class="legend"><div class="legend-row"><span class="dot"></span>Available</div><div class="legend-row"><span class="dot warn"></span>Doubtful/Risk</div><div class="legend-row"><span class="dot bad"></span>Out / Injured</div><div class="legend-row"><span class="dot purple"></span>Bye this round</div></div><p class="small">Drag a reserve onto a field spot to swap. Position eligibility is enforced.</p></aside><main class="field-wrap"><div class="field-lines"><div class="zone-line z1"></div><div class="zone-line z2"></div><div class="zone-line z3"></div><div class="zone-line z4"></div><div class="zone-line z5"></div><div class="zone-line z6"></div></div><div class="field-inner">${fieldLabels()}${fieldRows()}</div></main><aside class="reserves"><h2>Reserves</h2>${reserveGroupsHtml()}</aside></div><div class="tips"><b>TIPS</b><div class="tip-card"><span class="tip-title">Drag swap</span><br>Drag reserve to a starting position.</div><div class="tip-card"><span class="tip-title">Eligibility</span><br>Only legal positions will swap.</div><div class="tip-card"><span class="tip-title">Fast</span><br>Only this page redraws. No full app rebuild.</div></div>`}
function fieldLabels(){return `<div class="row-label lbl-hok">HOOKER<br>HOK</div><div class="row-label lbl-frf">FRONT ROW<br>FRF</div><div class="row-label lbl-2rf">2ND ROW<br>2RF</div><div class="row-label lbl-halves">HALVES<br>HFB/5-8</div><div class="row-label lbl-ctw">CENTRES / WINGS<br>CTW</div><div class="row-label lbl-flb">FULLBACK<br>FLB</div>`}
function fieldRows(){const rows=['row-hok','row-frf','row-2rf','row-halves','row-ctw1','row-ctw2','row-flb'];return rows.map(r=>`<div class="slot-row ${r}">${SLOT_DEFS.filter(s=>s.row===r).map(slotCard).join('')}</div>`).join('')}
function slotCard(slot){const p=getPlayer(App.lineup?.[slot.id]);if(!p)return `<div class="player-card empty-card" data-slot="${slot.id}" ondragover="allowDrop(event,'${slot.id}')" ondrop="dropOnSlot(event,'${slot.id}')"><div class="logo">${slot.short}</div><div><div class="pname">Empty ${slot.short}</div><div class="meta">Drop eligible player</div></div><div class="proj"><b>--</b></div></div>`;const pr=roundProj(p);return `<div class="player-card" data-slot="${slot.id}" ondragover="allowDrop(event,'${slot.id}')" ondragleave="this.classList.remove('drop-ok','drop-no')" ondrop="dropOnSlot(event,'${slot.id}')"><div class="logo">${esc((p.team||'SC').slice(0,3))}</div><div><div class="pname">${esc(p.name)}</div><div class="meta">${esc(p.team||'')} | ${esc(p.pos||'')}</div><div class="meta">${money(p.price)}</div></div><div class="proj">Proj.<br><b>${pr.expected}</b>${statusDot(p)}</div></div>`}
function reserveGroupsHtml(){const groupOrder=['HOOKER','FRONT ROW','2ND ROW / FORWARDS','HALVES','CENTRES / WINGS','FULLBACK','UTILITY'];const map={};for(const p of reserves()){const g=primaryGroup(p);(map[g]||(map[g]=[])).push(p)}return groupOrder.filter(g=>map[g]?.length).map(g=>`<div class="reserve-group"><div class="reserve-head">${g}</div>${map[g].sort((a,b)=>roundProj(b).expected-roundProj(a).expected).map(reserveCard).join('')}</div>`).join('')||'<p class="small">No reserves found. Add more players to my_team.json.</p>'}
function reserveCard(p){const pr=roundProj(p),st=availabilityStatus(p);return `<div class="reserve-card ${st.available?'':'out'}" draggable="true" ondragstart="dragReserve(event,'${esc(p.name)}')"><div class="drag">⠿</div><div class="logo">${esc((p.team||'SC').slice(0,3))}</div><div><div class="reserve-name">${esc(p.name)}</div><div class="small">${esc(p.team||'')} | ${esc(p.pos||'')}</div><div class="small">${money(p.price)}</div></div><div class="proj">Proj.<br><b>${pr.expected}</b>${statusDot(p)}</div></div>`}
function dragReserve(ev,name){ev.dataTransfer.setData('text/player',name)}
function allowDrop(ev,slotId){ev.preventDefault();const name=ev.dataTransfer.getData('text/player');const p=getPlayer(name);const slot=SLOT_DEFS.find(s=>s.id===slotId);ev.currentTarget.classList.toggle('drop-ok',!!p&&eligible(p,slot));ev.currentTarget.classList.toggle('drop-no',!!p&&!eligible(p,slot))}
function dropOnSlot(ev,slotId){ev.preventDefault();ev.currentTarget.classList.remove('drop-ok','drop-no');const name=ev.dataTransfer.getData('text/player');const p=getPlayer(name),slot=SLOT_DEFS.find(s=>s.id===slotId);if(!p||!slot)return;if(!eligible(p,slot)){toast(`${p.name} cannot play ${slot.short}`);return;}const old=App.lineup[slotId];for(const k of Object.keys(App.lineup)){if(App.lineup[k]===name)delete App.lineup[k]}App.lineup[slotId]=name;if(old&&old!==name){/* old becomes reserve automatically */}saveLocal();renderTeam();toast(`${p.name} moved to ${slot.short}`)}
function autoFillLineup(){App.lineup={};ensureLineup();renderTeam();toast('Auto-filled by eligibility')}
function optimizeLineup(){App.lineup={};const names=[...App.myTeam].sort((a,b)=>proj(getPlayer(b)).expected-proj(getPlayer(a)).expected);const used=new Set();for(const slot of SLOT_DEFS){const n=names.find(x=>!used.has(x)&&eligible(getPlayer(x),slot));if(n){App.lineup[slot.id]=n;used.add(n)}}saveLocal();renderTeam();toast('Optimized by projection and eligibility')}
function clearSavedLineup(){if(confirm('Clear lineup and saved team?')){App.myTeam=[];App.lineup={};saveLocal();renderTeam()}}
function renderBye(){const tp=teamPlayers();const rounds=Array.from({length:27},(_,i)=>i+1);$('bye').innerHTML=`<div class="panel"><h2>Bye Planner</h2><table><thead><tr><th>Round</th><th>Available</th><th>Status</th><th>Missing</th></tr></thead><tbody>${rounds.map(r=>{const av=tp.filter(p=>availabilityStatus(p,r).available),miss=tp.filter(p=>!availabilityStatus(p,r).available).slice(0,10).map(p=>p.name).join(', ');return `<tr><td>${r}</td><td>${av.length}</td><td>${av.length>=17?'<span class="pill good">OK</span>':av.length>=15?'<span class="pill warn">Thin</span>':'<span class="pill bad">Danger</span>'}</td><td>${esc(miss||'None')}</td></tr>`}).join('')}</tbody></table></div>`}
function renderLevel3(){const top=App.players.slice().sort((a,b)=>proj(b).expected-proj(a).expected).slice(0,100);$('level3').innerHTML=`<div class="panel"><h2>Level 3 Projections</h2><p class="small">Top 100 only for speed. Use Player Explorer for any player.</p><table><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Floor</th><th>Expected</th><th>Ceiling</th><th>Status</th></tr></thead><tbody>${top.map(p=>{const pr=roundProj(p);return `<tr><td>${esc(p.name)}</td><td>${esc(p.pos||'')}</td><td>${esc(p.team||'')}</td><td>${pr.floor}</td><td><b>${pr.expected}</b></td><td>${pr.ceiling}</td><td>${statusPill(p)}</td></tr>`}).join('')}</tbody></table></div>`}
let explorerTimer=null;function renderExplorer(){$('explorer').innerHTML=`<div class="panel"><h2>Player Explorer</h2><input id="explorerInput" placeholder="Search any player..." oninput="clearTimeout(explorerTimer);explorerTimer=setTimeout(updateExplorer,160)"><div id="explorerResults"></div></div>`}
function updateExplorer(){const q=norm($('explorerInput').value),box=$('explorerResults');if(!q){box.innerHTML='';return;}const res=App.players.filter(p=>norm(p.name).includes(q)||norm(p.pos).includes(q)||norm(p.team).includes(q)).slice(0,20);box.innerHTML=res.map(p=>{const pr=roundProj(p),raw=proj(p),st=availabilityStatus(p);return `<div class="result"><b>${esc(p.name)}</b> ${statusPill(p)} <span class="small">${esc(p.pos||'')} - ${esc(p.team||'')}</span><br>Price: ${money(p.price)} | Avg: ${safeNum(p.avg||p.average)} | BE: ${p.be??p.breakEven??'N/A'}<br>Floor ${pr.floor} / <b>Expected ${pr.expected}</b> / Ceiling ${pr.ceiling}<br><span class="small">If available: ${raw.expected} | ${esc(st.reason)} | ${esc(raw.goal)}</span></div>`}).join('')||'<p class="small">No matches.</p>'}
function renderTrade(){$('trade').innerHTML=`<div class="grid"><div class="panel span4"><h2>Trade Lab</h2><label>Trade OUT</label><input id="tradeOut" list="teamList"><datalist id="teamList">${teamPlayers().map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist><label>Trade IN</label><input id="tradeIn" list="allList"><datalist id="allList">${App.players.map(p=>`<option value="${esc(p.name)}">`).join('')}</datalist><button onclick="scoreTrade()">Score Trade</button></div><div class="panel span6"><h2>Trade Verdict</h2><div id="tradeVerdict" class="small">Select players to score the trade.</div></div></div>`}
function scoreTrade(){const out=getPlayer($('tradeOut').value),inn=getPlayer($('tradeIn').value),box=$('tradeVerdict');if(!out||!inn){box.innerHTML='Pick valid players.';return;}const po=roundProj(out),pi=roundProj(inn);const pts=pi.expected-po.expected,cash=safeNum(out.price)-safeNum(inn.price),bye=(availabilityStatus(inn).available?1:0)-(availabilityStatus(out).available?1:0);let score=Math.max(0,Math.min(100,Math.round(50+pts*2+(cash/60000)+bye*12)));box.innerHTML=`<div class="metric ${score>=75?'good':score>=55?'warn':'bad'}">${score}/100</div><table><tbody><tr><td>Points this round</td><td>${pts>=0?'+':''}${pts}</td></tr><tr><td>Cash</td><td>${cash>=0?'+':''}${money(cash)}</td></tr><tr><td>Availability impact R${App.round}</td><td>${bye>=0?'+':''}${bye}</td></tr><tr><td>Verdict</td><td>${score>=75?'Strong trade':score>=55?'Decent, check byes':'Weak trade - probably emotional trash'}</td></tr></tbody></table>`}
boot();
</script>
</body>
</html>
