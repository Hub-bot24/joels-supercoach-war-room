name: Update Fixtures

"on":
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fixtures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update fixtures
        run: node scripts/update-fixtures.mjs

      - name: Commit fixtures
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add fixtures.json fixtures_update_report.json
          git commit -m "Update full fixture draw and byes" || echo "No changes"
          git push