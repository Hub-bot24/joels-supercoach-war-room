name: Update Weather Data

"on":
  workflow_dispatch:
  schedule:
    # Runs every hour during likely NRL activity window.
    # GitHub Actions uses UTC. This roughly covers Australian afternoon/evening checks.
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run weather updater
        run: python scripts/update_weather.py

      - name: Commit weather.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add weather.json
          git commit -m "Update NRL game-window weather" || echo "No changes"
          git push
