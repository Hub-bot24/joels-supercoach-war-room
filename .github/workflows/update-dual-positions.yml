name: Update Dual Positions

on:
  workflow_dispatch:
  schedule:
    # Runs every Tuesday morning AEST-ish during season.
    - cron: "0 20 * * 1"

permissions:
  contents: write

jobs:
  update-dual-positions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update dual positions
        run: python scripts/update_dual_positions.py

      - name: Commit dual positions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update dual positions
          file_pattern: dual_positions.json
