name: Team-list parser fixture tests

on:
  workflow_dispatch:
  push:
    branches:
      - test/structured-teamlist-fixture
    paths:
      - "tests/**"
      - ".github/workflows/test-teamlist-parsers.yml"

permissions:
  contents: read

jobs:
  fixture-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run structured team-list fixture tests
        run: node --test tests/teamlists/*.test.mjs