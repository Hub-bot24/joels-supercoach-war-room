name: Update Team Roles

"on":
  workflow_dispatch:
  schedule:
    # Team-list/later-week refresh. Times are UTC.
    - cron: "0 8 * * TUE"
    - cron: "0 8 * * THU"
    - cron: "0 8 * * SAT"

permissions:
  contents: write

jobs:
  update-team-roles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update team roles
        run: python scripts/update_team_roles.py

      - name: Commit updated team roles
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add team_roles.json team_roles_update_report.json
          git commit -m "Update team roles and goal kicker status" || echo "No changes"
          git push
