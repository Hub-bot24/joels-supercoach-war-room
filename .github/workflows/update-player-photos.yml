name: Update Player Photos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-player-photos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build player photos
        run: node scripts/update-player-photos.mjs

      - name: Commit player photos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add player_photos.json
          git diff --cached --quiet && echo "No photo changes" || git commit -m "Update NRL player photos"
          git push
