name: Update SuperCoach Data

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        run: node scripts/update-players.mjs
      - name: Commit updated players.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add players.json
          git commit -m "Update SuperCoach price and BE data" || echo "No changes"
          git pull --rebase origin main
          git push

