name: Update SuperCoach Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run updater
        run: python scripts/update_players.py
      - name: Commit updated players.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add players.json
          git commit -m "Run SuperCoach data updater" || echo "No changes"
          git push
