name: Update Player Status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-player-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run team-list and Origin status updater
        run: node scripts/update_player_status_from_teamlists.mjs

      - name: Commit updated status files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update player availability status from team lists
          file_pattern: player_status.json status_update_report.json
