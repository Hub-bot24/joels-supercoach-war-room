name: Update Player Status

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

permissions:
  contents: write

jobs:
  update-player-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml requests

      - name: Run player status updater
        run: python scripts/update_player_status.py

      - name: Commit player_status.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update player availability status
          file_pattern: player_status.json
