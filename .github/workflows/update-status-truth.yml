name: Update Status Truth

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      active_round:
        description: "NRL/SuperCoach round to build. Leave blank to infer from files."
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  update-status-truth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run core status truth updater
        env:
          ACTIVE_ROUND: ${{ github.event.inputs.active_round }}
        run: node scripts/update-status.mjs

      - name: Show generated contract files
        run: |
          ls -la data || true
          test -f data/weather.json && echo "FOUND data/weather.json" || echo "MISSING data/weather.json"
          test -f data/official_teamlists.json && echo "FOUND data/official_teamlists.json" || echo "MISSING data/official_teamlists.json"
          test -f data/origin_unavailable.json && echo "FOUND data/origin_unavailable.json" || echo "MISSING data/origin_unavailable.json"
          git status --short
          git add data/weather.json data/official_teamlists.json data/origin_unavailable.json || true
          git status --short

      - name: Commit updated truth files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update status truth data
          file_pattern: |
            data/status_truth.json
            data/teamlists.json
            data/weather.json
            data/official_teamlists.json
            data/origin_unavailable.json
            data/injuries.json
            data/suspensions.json
            data/current_round.json
            data/origin.json
            data/status_previous.json
            data/teamlist_baseline_tuesday.json
            data/teamlist_changes.json
            data/notifications.json
            data/notification_message.md
            data/source_audit.json
            data/history/*.json

      - name: Create notification issue for new changes
        if: hashFiles('data/notification_message.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "War Room status changes - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body-file data/notification_message.md || true

