name: Update Status Truth

on:
  workflow_dispatch:
    inputs:
      active_round:
        description: "NRL/SuperCoach round to build. Leave blank to infer from files."
        required: false
        default: "15"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-status-truth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run status truth updater
        run: node scripts/update-status.mjs
        env:
          ACTIVE_ROUND: ${{ github.event.inputs.active_round || '15' }}

      - name: Commit updated truth files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update status truth data
          file_pattern: |
            data/status_truth.json
            data/status_previous.json
            data/teamlists.json
            data/injuries.json
            data/suspensions.json
            data/origin.json
            data/current_round.json
            data/teamlist_baseline_tuesday.json
            data/teamlist_changes.json
            data/notifications.json
