name: Audit Positions

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * 1"

permissions:
  contents: write

jobs:
  audit-positions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run position audit
        run: python scripts/audit_positions.py

      - name: Commit position audit outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Audit and lock trusted player positions
          file_pattern: dual_positions.json position_audit_report.json
